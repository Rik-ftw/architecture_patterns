<svg width="900" height="600" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1B3A6B"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0F6E56"/>
    </marker>
  </defs>

  <!-- Title Bar -->
  <rect width="900" height="44" fill="#1B3A6B" rx="0"/>
  <text x="20" y="16" fill="white" font-size="11" font-weight="normal" opacity="0.75">Application &amp; Integration · Tier 2 — Logical</text>
  <text x="20" y="32" fill="white" font-size="15" font-weight="700">Service Mesh for Microservices</text>

  <!-- Background -->
  <rect y="44" width="900" height="556" fill="#EAF1FB"/>

  <!-- Istio Control Plane (center-top) -->
  <rect x="340" y="70" width="220" height="60" rx="8" fill="white" stroke="#1B3A6B" stroke-width="2"/>
  <rect x="340" y="70" width="220" height="18" rx="8" fill="#1B3A6B"/>
  <rect x="340" y="80" width="220" height="8" fill="#1B3A6B"/>
  <text x="450" y="83" fill="white" font-size="10" font-weight="600" text-anchor="middle">CONTROL PLANE</text>
  <text x="450" y="108" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">Istio Service Mesh</text>
  <text x="450" y="122" fill="#64748b" font-size="10" text-anchor="middle">Traffic mgmt &amp; policy</text>

  <!-- Envoy Sidecar -->
  <rect x="100" y="210" width="190" height="60" rx="8" fill="white" stroke="#0F6E56" stroke-width="2"/>
  <rect x="100" y="210" width="190" height="18" rx="8" fill="#0F6E56"/>
  <rect x="100" y="220" width="190" height="8" fill="#0F6E56"/>
  <text x="195" y="223" fill="white" font-size="10" font-weight="600" text-anchor="middle">DATA PLANE</text>
  <text x="195" y="248" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">Envoy Sidecar Proxy</text>
  <text x="195" y="262" fill="#64748b" font-size="10" text-anchor="middle">Routing &amp; mTLS</text>

  <!-- Jaeger -->
  <rect x="340" y="210" width="190" height="60" rx="8" fill="white" stroke="#BA7517" stroke-width="2"/>
  <rect x="340" y="210" width="190" height="18" rx="8" fill="#BA7517"/>
  <rect x="340" y="220" width="190" height="8" fill="#BA7517"/>
  <text x="435" y="223" fill="white" font-size="10" font-weight="600" text-anchor="middle">TRACING</text>
  <text x="435" y="248" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">Jaeger</text>
  <text x="435" y="262" fill="#64748b" font-size="10" text-anchor="middle">Distributed traces</text>

  <!-- Kiali -->
  <rect x="580" y="210" width="190" height="60" rx="8" fill="white" stroke="#1B3A6B" stroke-width="2"/>
  <rect x="580" y="210" width="190" height="18" rx="8" fill="#1B3A6B"/>
  <rect x="580" y="220" width="190" height="8" fill="#1B3A6B"/>
  <text x="675" y="223" fill="white" font-size="10" font-weight="600" text-anchor="middle">OBSERVABILITY</text>
  <text x="675" y="248" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">Kiali</text>
  <text x="675" y="262" fill="#64748b" font-size="10" text-anchor="middle">Service topology viz</text>

  <!-- Prometheus & Grafana -->
  <rect x="340" y="360" width="220" height="60" rx="8" fill="white" stroke="#0F6E56" stroke-width="2"/>
  <rect x="340" y="360" width="220" height="18" rx="8" fill="#0F6E56"/>
  <rect x="340" y="370" width="220" height="8" fill="#0F6E56"/>
  <text x="450" y="373" fill="white" font-size="10" font-weight="600" text-anchor="middle">METRICS</text>
  <text x="450" y="398" fill="#1e293b" font-size="12" font-weight="700" text-anchor="middle">Prometheus &amp; Grafana</text>
  <text x="450" y="412" fill="#64748b" font-size="10" text-anchor="middle">Collection &amp; dashboards</text>

  <!-- Arrows -->
  <!-- Istio → Envoy (injection) -->
  <line x1="370" y1="130" x2="220" y2="210" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="5,3"/>
  <text x="270" y="168" fill="#1B3A6B" font-size="9" text-anchor="middle">1 inject</text>

  <!-- Envoy → Jaeger -->
  <line x1="290" y1="240" x2="340" y2="240" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="315" y="234" fill="#BA7517" font-size="9" text-anchor="middle">5</text>

  <!-- Istio → Kiali -->
  <line x1="530" y1="130" x2="640" y2="210" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="605" y="168" fill="#1B3A6B" font-size="9" text-anchor="middle">6</text>

  <!-- Istio → Envoy (VirtualService) -->
  <line x1="380" y1="130" x2="230" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Envoy → Prometheus -->
  <line x1="195" y1="270" x2="380" y2="360" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="268" y="325" fill="#0F6E56" font-size="9" text-anchor="middle">7 scrape</text>

  <!-- Istio → Prometheus -->
  <line x1="450" y1="130" x2="450" y2="360" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Jaeger → Kiali -->
  <line x1="530" y1="240" x2="580" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Prometheus → Kiali -->
  <line x1="560" y1="390" x2="675" y2="270" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Step labels box -->
  <rect x="20" y="350" width="270" height="130" rx="8" fill="white" stroke="#1B3A6B" stroke-width="1" opacity="0.9"/>
  <text x="30" y="368" fill="#1B3A6B" font-size="11" font-weight="700">Flow Steps</text>
  <text x="30" y="385" fill="#64748b" font-size="9">1 · Envoy injected via admission webhook</text>
  <text x="30" y="399" fill="#64748b" font-size="9">2 · Service calls intercepted + mTLS</text>
  <text x="30" y="413" fill="#64748b" font-size="9">3 · VirtualService manages canary splits</text>
  <text x="30" y="427" fill="#64748b" font-size="9">4 · DestinationRules: circuit-break &amp; retry</text>
  <text x="30" y="441" fill="#64748b" font-size="9">5–7 · Traces, topology &amp; metrics collected</text>
  <line x1="20" y1="374" x2="290" y2="374" stroke="#EAF1FB" stroke-width="1"/>

  <!-- Related Patterns -->
  <rect x="20" y="498" width="200" height="48" rx="8" fill="none" stroke="#1B3A6B" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="120" y="516" fill="#1B3A6B" font-size="10" font-weight="700" text-anchor="middle">NW-001</text>
  <text x="120" y="530" fill="#64748b" font-size="9" text-anchor="middle">Hub-Spoke Network</text>
  <text x="120" y="542" fill="#64748b" font-size="9" text-anchor="middle">Runs within</text>

  <rect x="240" y="498" width="200" height="48" rx="8" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="516" fill="#0F6E56" font-size="10" font-weight="700" text-anchor="middle">CP-001</text>
  <text x="340" y="530" fill="#64748b" font-size="9" text-anchor="middle">Azure Landing Zone</text>
  <text x="340" y="542" fill="#64748b" font-size="9" text-anchor="middle">Deployed on</text>

  <text x="20" y="492" fill="#64748b" font-size="10" font-weight="600">Related Patterns</text>
</svg>