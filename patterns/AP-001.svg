<svg width="900" height="600" viewBox="0 0 900 600" font-family="system-ui, -apple-system, sans-serif" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1B3A6B"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0F6E56"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="600" fill="#EAF1FB"/>

  <!-- Title Bar -->
  <rect width="900" height="48" fill="#1B3A6B" rx="0"/>
  <text x="24" y="20" fill="white" font-size="11" font-weight="600" opacity="0.7">APPLICATION &amp; INTEGRATION · LAYER 2 — LOGICAL</text>
  <text x="24" y="38" fill="white" font-size="16" font-weight="700">API Gateway Pattern</text>

  <!-- Row 1: Consumer + Front Door -->
  <!-- API Consumer -->
  <rect x="30" y="90" width="150" height="52" rx="8" fill="white" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="105" y="112" text-anchor="middle" fill="#1B3A6B" font-size="11" font-weight="700">API Consumer</text>
  <text x="105" y="128" text-anchor="middle" fill="#64748b" font-size="10">(App / Partner)</text>

  <!-- Arrow: Consumer → AD B2C -->
  <line x1="180" y1="116" x2="248" y2="116" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="214" y="110" text-anchor="middle" fill="#64748b" font-size="9">1. OAuth2</text>

  <!-- Azure AD B2C -->
  <rect x="250" y="90" width="155" height="52" rx="8" fill="white" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="327" y="112" text-anchor="middle" fill="#1B3A6B" font-size="11" font-weight="700">Azure AD B2C</text>
  <text x="327" y="128" text-anchor="middle" fill="#64748b" font-size="10">Identity Federation</text>

  <!-- Arrow: AD B2C returns JWT to consumer -->
  <line x1="327" y1="142" x2="327" y2="162" stroke="#1B3A6B" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="334" y="157" fill="#64748b" font-size="9">JWT</text>

  <!-- Arrow: Consumer → Front Door (step 2) -->
  <line x1="105" y1="142" x2="105" y2="200" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="112" y="178" fill="#64748b" font-size="9">2. Request</text>

  <!-- Azure Front Door -->
  <rect x="30" y="200" width="160" height="52" rx="8" fill="#E8F5F0" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="110" y="222" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Azure Front Door</text>
  <text x="110" y="238" text-anchor="middle" fill="#64748b" font-size="10">WAF + Global LB</text>

  <!-- Arrow: Front Door → API Management (step 3) -->
  <line x1="190" y1="226" x2="258" y2="226" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="224" y="220" text-anchor="middle" fill="#64748b" font-size="9">3. Validate</text>

  <!-- Azure API Management (center) -->
  <rect x="260" y="190" width="190" height="72" rx="8" fill="#1B3A6B" stroke="#1B3A6B" stroke-width="2"/>
  <text x="355" y="218" text-anchor="middle" fill="white" font-size="12" font-weight="700">Azure API Management</text>
  <text x="355" y="234" text-anchor="middle" fill="#a8c4e8" font-size="10">Policy Engine · Gateway</text>
  <text x="355" y="250" text-anchor="middle" fill="#a8c4e8" font-size="10">Rate Limit · Routing</text>

  <!-- Arrow: API Mgmt → Backend (step 4) -->
  <line x1="450" y1="226" x2="530" y2="226" stroke="#1B3A6B" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="490" y="220" text-anchor="middle" fill="#64748b" font-size="9">4. Route</text>

  <!-- Backend Service -->
  <rect x="532" y="200" width="145" height="52" rx="8" fill="white" stroke="#BA7517" stroke-width="1.5"/>
  <text x="604" y="222" text-anchor="middle" fill="#BA7517" font-size="11" font-weight="700">Backend Service</text>
  <text x="604" y="238" text-anchor="middle" fill="#64748b" font-size="10">APIs / Microservices</text>

  <!-- Arrow: Backend → API Mgmt response (step 5) -->
  <line x1="532" y1="242" x2="452" y2="242" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="492" y="256" text-anchor="middle" fill="#64748b" font-size="9">5. Transform</text>

  <!-- Azure Key Vault -->
  <rect x="260" y="310" width="155" height="52" rx="8" fill="white" stroke="#1B3A6B" stroke-width="1.5"/>
  <text x="337" y="332" text-anchor="middle" fill="#1B3A6B" font-size="11" font-weight="700">Azure Key Vault</text>
  <text x="337" y="348" text-anchor="middle" fill="#64748b" font-size="10">Keys &amp; Certs</text>

  <!-- Arrow: API Mgmt ↔ Key Vault -->
  <line x1="355" y1="262" x2="337" y2="310" stroke="#1B3A6B" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- App Insights -->
  <rect x="532" y="310" width="175" height="52" rx="8" fill="#E8F5F0" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="619" y="330" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Application Insights</text>
  <text x="619" y="346" text-anchor="middle" fill="#64748b" font-size="10">Telemetry &amp; Latency</text>

  <!-- Arrow: API Mgmt → App Insights (step 6) -->
  <line x1="450" y1="248" x2="532" y2="322" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arr2)"/>
  <text x="510" y="295" fill="#64748b" font-size="9">6. Telemetry</text>

  <!-- Azure Monitor -->
  <rect x="532" y="400" width="175" height="52" rx="8" fill="#E8F5F0" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="619" y="422" text-anchor="middle" fill="#0F6E56" font-size="11" font-weight="700">Azure Monitor</text>
  <text x="619" y="438" text-anchor="middle" fill="#64748b" font-size="10">Dashboards &amp; Alerts</text>

  <!-- Arrow: App Insights → Monitor (step 7) -->
  <line x1="619" y1="362" x2="619" y2="400" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="626" y="386" fill="#64748b" font-size="9">7. Analytics</text>

  <!-- Related Patterns -->
  <text x="30" y="420" fill="#1B3A6B" font-size="11" font-weight="700">Related Patterns</text>

  <rect x="30" y="432" width="190" height="48" rx="8" fill="white" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="125" y="452" text-anchor="middle" fill="#BA7517" font-size="11" font-weight="700">AP-003 BFF</text>
  <text x="125" y="468" text-anchor="middle" fill="#64748b" font-size="10">Routes To</text>

  <rect x="240" y="432" width="200" height="48" rx="8" fill="white" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="340" y="452" text-anchor="middle" fill="#BA7517" font-size="11" font-weight="700">IN-003 API Productization</text>
  <text x="340" y="468" text-anchor="middle" fill="#64748b" font-size="10">Enables</text>

  <!-- Flow step labels legend -->
  <rect x="30" y="530" width="840" height="52" rx="8" fill="white" stroke="#1B3A6B" stroke-width="1" opacity="0.8"/>
  <text x="44" y="548" fill="#1B3A6B" font-size="10" font-weight="700">Flow:</text>
  <text x="80" y="548" fill="#64748b" font-size="10">1·Auth → 2·WAF → 3·JWT Validate → 4·Route → 5·Transform → 6·Telemetry → 7·Monitor</text>
  <text x="44" y="566" fill="#64748b" font-size="10">Solid: primary flow  ·  Dashed: data/config  ·  Green: observability  ·  Orange: accent/backend</text>
</svg>