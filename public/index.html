        <div style="font-size:1rem;font-weight:700;color:${trendColor}">${trendLabel}</div>
        <div style="font-size:.72rem;color:var(--muted)">Avg risk score across all submissions</div>
      </div>
    </div>
    <div style="display:flex;gap:.7rem">
      <div style="flex:1;padding:.45rem .65rem;background:var(--surface2);border-radius:7px">
        <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">This Week</div>
        <div style="font-size:1.05rem;font-weight:800;color:var(--text)">${trend.thisWeekAvg!==null&&trend.thisWeekAvg!==undefined?trend.thisWeekAvg:'—'}</div>
      </div>
      <div style="flex:1;padding:.45rem .65rem;background:var(--surface2);border-radius:7px">
        <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Last Week</div>
        <div style="font-size:1.05rem;font-weight:800;color:var(--text)">${trend.lastWeekAvg!==null&&trend.lastWeekAvg!==undefined?trend.lastWeekAvg:'—'}</div>
      </div>
      <div style="flex:1;padding:.45rem .65rem;background:var(--surface2);border-radius:7px">
        <div style="font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Overall Avg</div>
        <div style="font-size:1.05rem;font-weight:800;color:var(--text)">${trend.overallAvg||'—'}</div>
      </div>
    </div>
  </div>`;

  // Compose the full risk widget
  el.innerHTML=`
    <div style="margin-bottom:.55rem;display:flex;align-items:center;gap:.5rem">
      <h3 style="font-size:.8rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin:0">Risk Intelligence</h3>
      <span style="font-size:.68rem;color:var(--muted)">${rd.submissionCount||0} active submission${(rd.submissionCount||0)===1?'':'s'} analysed</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem">
      ${pillarHtml}${topRiskyHtml}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.9rem;margin-bottom:.9rem">
      ${domainHtml}${flagsHtml}
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:.9rem">
      ${scHtml}${trendHtml}
    </div>`;
}

// ─── Kanban Board ─────────────────────────────────────────────────────────────
function showKanban() {
  S.view='kanban'; renderSidebar();
  const cols=[{key:'Endorsed',cls:'endorsed'},{key:'In Development',cls:'dev'},{key:'Under Review',cls:'review'},{key:'Deprecated',cls:'deprecated'}];
  let h=`<div class="page-title"><h2>Pattern Board</h2><div class="flex gap-2"><button class="btn btn-secondary btn-sm" onclick="showPatternList()">List View</button></div></div>`;
  h+=`<div class="kanban-board">`;
  cols.forEach(({key,cls})=>{
    const cards=S.patterns.filter(p=>p.status===key);
    h+=`<div class="kanban-col kanban-col-${cls}"><div class="kanban-col-header">${key}<span class="kanban-count">${cards.length}</span></div><div class="kanban-col-body">`;
    if(!cards.length) h+=`<div style="text-align:center;color:var(--muted);font-size:.75rem;padding:.8rem 0">No patterns</div>`;
    cards.forEach(p=>{
      h+=`<div class="kanban-card" onclick="showPattern('${p.patternId}')">
        <div class="kanban-card-id">${p.patternId} · v${p.version||'?'}</div>
        <div class="kanban-card-name">${p.name}</div>
        <div class="kanban-card-domain">${p.domain}</div>
        ${p.ccoeCertified==='Yes'?'<span class="badge badge-endorsed" style="margin-top:.3rem;font-size:.62rem">CCoE</span>':''}
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  setMain(h);
}

// ─── Solution Designs ─────────────────────────────────────────────────────────
function showSolutionsList(opts2) {
  S.view='solutions-list'; renderSidebar();
  const fOpts=opts2||S._solutionFilters||{};
  S._solutionFilters=fOpts;
  const searchQ=(fOpts.search||'').toLowerCase();
  const fStatus=fOpts.status||'All';
  const fLevel=fOpts.level||'All';
  const fDomain=fOpts.domain||'All';
  const fBU=fOpts.businessUnit||'All';

  const domains=[...new Set(S.patterns.map(p=>p.domain))].sort();
  const businessUnits=[...new Set(S.solutions.map(s=>s.business_unit).filter(Boolean))].sort();

  let filtered=S.solutions.filter(s=>{
    if(fStatus!=='All'&&s.status!==fStatus) return false;
    if(fBU!=='All'&&s.business_unit!==fBU) return false;
    if(fLevel!=='All'){
      const pats=S.patterns.filter(p=>(s.patternIds||[]).includes(p.patternId));
      if(!pats.some(p=>p.level===fLevel)) return false;
    }
    if(fDomain!=='All'){
      const pats=S.patterns.filter(p=>(s.patternIds||[]).includes(p.patternId));
      if(!pats.some(p=>p.domain===fDomain)) return false;
    }
    if(searchQ){
      const hay=(s.title+' '+(s.reference_id||'')+' '+(s.business_unit||'')+' '+(s.owner||'')+' '+(s.patternIds||[]).join(' ')).toLowerCase();
      if(!hay.includes(searchQ)) return false;
    }
    return true;
  });

  let h=`<div class="page-title"><h2>Solutions Library</h2><button class="btn btn-primary btn-sm" onclick="startNewSolution()">＋ New Solution</button></div>`;

  h+=`<div class="filter-bar">
    <input class="search-bar" style="margin-bottom:0;flex:1;min-width:180px" placeholder="Search by title, reference, pattern ID, owner..." value="${fOpts.search||''}" oninput="showSolutionsList({...S._solutionFilters,search:this.value})"/>
    <select class="filter-select" onchange="showSolutionsList({...S._solutionFilters,status:this.value})">
      <option value="All" ${fStatus==='All'?'selected':''}>All Statuses</option>
      ${['Draft','In Review','Needs Changes','Approved','Published','Rejected'].map(st=>`<option value="${st}" ${fStatus===st?'selected':''}>${st}</option>`).join('')}
    </select>
    <select class="filter-select" onchange="showSolutionsList({...S._solutionFilters,level:this.value})">
      <option value="All" ${fLevel==='All'?'selected':''}>All Levels</option>
      <option value="Conceptual" ${fLevel==='Conceptual'?'selected':''}>Conceptual</option>
      <option value="Logical" ${fLevel==='Logical'?'selected':''}>Logical</option>
      <option value="Component" ${fLevel==='Component'?'selected':''}>Component</option>
    </select>
    <select class="filter-select" onchange="showSolutionsList({...S._solutionFilters,domain:this.value})">
      <option value="All" ${fDomain==='All'?'selected':''}>All Domains</option>
      ${domains.map(d=>`<option value="${d}" ${fDomain===d?'selected':''}>${d}</option>`).join('')}
    </select>
    ${businessUnits.length?`<select class="filter-select" onchange="showSolutionsList({...S._solutionFilters,businessUnit:this.value})">
      <option value="All" ${fBU==='All'?'selected':''}>All BUs</option>
      ${businessUnits.map(b=>`<option value="${b}" ${fBU===b?'selected':''}>${b}</option>`).join('')}
    </select>`:''}
  </div>`;

  if(!S.solutions.length){
    h+=`<div class="empty">No solution designs yet. Compose patterns into deployable solutions.<br><br><button class="btn btn-primary" onclick="startNewSolution()">Create First Solution</button></div>`;
  } else if(!filtered.length) {
    h+=`<div class="empty">No solutions match the current filters.</div>`;
  } else {
    h+=`<div class="overview-grid">`;
    filtered.forEach(s=>{
      const pats=S.patterns.filter(p=>(s.patternIds||[]).includes(p.patternId));
      const levels=[...new Set(pats.map(p=>p.level).filter(Boolean))];
      h+=`<div class="solution-card" onclick="showSolutionDetail(${s.id})">
        <div class="flex justify-between items-center">
          <div class="font-mono text-xs text-muted">${s.reference_id}</div>
          ${solutionStatusBadge(s.status)}
        </div>
        <div class="card-name">${s.title}</div>
        ${s.business_unit?`<div class="card-sub">${s.business_unit}</div>`:''}
        <div class="solution-pattern-chips">
          ${pats.map(p=>`<span class="pattern-chip" title="${p.name}">${p.patternId}</span>`).join('')}
          ${(s.patternIds||[]).length===0?'<span class="text-xs text-muted">No patterns selected</span>':''}
        </div>
        <div class="flex gap-1 mt-2 flex-wrap">
          ${levels.map(l=>levelBadge(l)).join('')}
          ${s.complexity?`<span class="badge" style="background:var(--surface2);color:var(--muted);font-size:.62rem">${s.complexity}</span>`:''}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  setMain(h);
}

async function showSolutionDetail(id) {
  S.view='solution-detail'; renderSidebar();
  setMain('<p class="text-muted" style="padding:2rem">Loading...</p>');
  const s=await api.get(`/api/solutions/${id}`);
  S.currentSolution=s;
  const pats=s.patterns||[];
  const reviews=s.reviews||[];
  const alignments=s.alignments||[];
  const iterations=s.iterations||[];
  const currentStage=s.currentStage;
  const REVIEW_STAGES=['Pattern Alignment','EA Review','Security Review','Architecture Board'];

  const SOL_PIPELINE_STAGES=[
    {key:'Intake Approved',label:'Intake Approved',done:!!s.intake_reference},
    {key:'Design Draft',label:'Design Draft',done:['In Review','Needs Changes','Published','Rejected'].includes(s.status)||currentStage==='EA Review'||currentStage==='Security Review'||currentStage==='Architecture Board'||currentStage==='Pattern Alignment'},
    {key:'Pattern Alignment',label:'Pattern Alignment',done:reviews.some(r=>r.stage==='Pattern Alignment'&&r.decision==='Approved')},
    {key:'EA Review',label:'EA Review',done:reviews.some(r=>r.stage==='EA Review'&&r.decision==='Approved')},
    {key:'Security Review',label:'Security Review',done:reviews.some(r=>r.stage==='Security Review'&&r.decision==='Approved')},
    {key:'Architecture Board',label:'Arch Board',done:reviews.some(r=>r.stage==='Architecture Board'&&r.decision==='Approved')},
    {key:'Published',label:'Published',done:s.status==='Published'},
  ];

  function solPipelineClass(stage){
    if(s.status==='Rejected') return stage.done?'sol-done':'';
    if(stage.key==='Published') return s.status==='Published'?'sol-done':'';
    if(stage.done) return 'sol-done';
    const stageReviewKey=stage.key;
    if(currentStage===stageReviewKey) return 'sol-active';
    if(stage.key==='Design Draft'&&['Draft','In Review','Needs Changes'].includes(s.status)&&!reviews.length) return 'sol-active';
    return '';
  }

  function reviewStageClass(stage){
    const r=reviews.filter(rv=>rv.stage===stage);
    const last=r[r.length-1];
    if(!last){
      if(stage===currentStage) return 'stage-active';
      return '';
    }
    if(last.decision==='Approved') return 'stage-approved';
    if(last.decision==='Rejected') return 'stage-rejected';
    return 'stage-needs-changes';
  }
  function reviewStageLabel(stage){
    const r=reviews.filter(rv=>rv.stage===stage);
    const last=r[r.length-1];
    if(!last && stage===currentStage) return `▶ ${stage}`;
    if(!last) return stage;
    const icon={Approved:'✓',Rejected:'✗','Needs Changes':'⟳'}[last.decision]||'';
    return `${icon} ${stage}`;
  }

  const canReview = currentStage && ['Draft','In Review','Needs Changes'].includes(s.status);
  const isPublished = s.status === 'Published';
  const isApproved = s.status === 'Approved' || isPublished;

  const opsSupportForSolution = S.opSupport.find(o=>o.solution_reference===s.reference_id);

  let h=`<button class="back-btn" onclick="showSolutionsList()">← Back to Solutions</button>
  <div class="sol-pipeline">
    ${SOL_PIPELINE_STAGES.map(st=>`<div class="sol-stage ${solPipelineClass(st)}" title="${st.key}">${solPipelineClass(st)==='sol-done'?'✓ ':''}${st.label}</div>`).join('')}
  </div>
  <div class="two-col">
  <div>
  <div class="detail-header">
    <div class="font-mono text-xs text-muted">${s.reference_id}</div>
    <h2>${s.title}</h2>
    <div class="detail-meta">${s.business_unit||''}${s.intake_reference?` · Intake: <span style="cursor:pointer;color:var(--accent)" onclick="(function(){const ir=S.intakes.find(i=>i.reference_id==='${s.intake_reference}');if(ir)showIntakeDetail(ir.reference_id);else alert('Intake not found');})()">${s.intake_reference}</span>`:''}</div>
    <div class="detail-badges mt-1">
      ${solutionStatusBadge(s.status)}
      ${s.complexity?`<span class="badge" style="background:var(--surface2);color:var(--text)">${s.complexity}</span>`:''}
      ${s.estimated_cost_band?`<span class="badge" style="background:var(--surface2);color:var(--muted)">Cost: ${s.estimated_cost_band}</span>`:''}
      ${s.risk_tier?`<span class="badge badge-${s.risk_tier.toLowerCase()}">Risk: ${s.risk_tier}</span>`:''}
    </div>
    <div class="flex gap-2 mt-2" style="flex-wrap:wrap">
      ${canReview?`<button class="btn btn-primary btn-sm" onclick="openSolutionReviewPanel(${s.id})">✓ Submit Review — ${currentStage}</button>`:''}
      ${isApproved?`<button class="btn btn-success btn-sm" onclick="syncSolutionToGitHub(${s.id},'${s.reference_id}')">⇅ Sync to GitHub</button>`:''}
      ${isApproved?`<button class="btn btn-sm jira-epic-btn" onclick="generateJiraEpics(${s.id})">⬡ ${s.jiraEpics?'Regenerate':'Generate'} Jira Epics</button>`:''}
      <button class="btn btn-sm" style="background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.3)" onclick="generateSolutionIaC(${s.id},'${s.reference_id}')">⬡ ${s.iacCode?'Regenerate':'Generate'} IaC</button>
      <button class="btn btn-danger btn-sm" onclick="confirmDeleteSolution(${s.id},'${s.reference_id}')">Delete</button>
    </div>
  </div>
  ${s.description?`<div class="section-card"><h3>Description</h3><p class="text-sm" style="line-height:1.65">${s.description}</p></div>`:''}
  ${s.business_context?`<div class="section-card"><h3>Business Context</h3><p class="text-sm" style="line-height:1.65">${s.business_context}</p></div>`:''}
  ${pats.length?`<div class="section-card"><h3>Composed Patterns (${pats.length})</h3>
    ${pats.map(p=>`<div class="flex justify-between items-center" style="padding:.45rem;background:var(--surface2);border-radius:7px;margin-bottom:.4rem;cursor:pointer" onclick="showPattern('${p.patternId}')">
      <div><span class="font-mono text-xs text-muted">${p.patternId}</span><div class="text-sm font-bold" style="margin-top:.1rem">${p.name}</div></div>
      <div class="flex gap-1">${p.level?levelBadge(p.level):''}<span class="badge badge-${p.status.toLowerCase().replace(/\s+/g,'-')}">${p.status}</span></div>
    </div>`).join('')}
  </div>`:''}

  ${renderPatternAlignmentPanel(s, pats, alignments)}
  ${renderDesignIterationsPanel(s, iterations)}

  ${reviews.length?`<div class="section-card"><h3>Review Trail</h3>
    ${reviews.map(rv=>{const cls={Approved:'art-approved',Rejected:'art-rejected','Needs Changes':'art-needs-changes'}[rv.decision]||'';return`<div class="review-artifact ${cls}">
      <div class="review-artifact-header"><div><span class="review-artifact-stage">${rv.stage}</span> · <span class="review-artifact-reviewer">${rv.reviewer_name}</span></div><span class="review-artifact-date">${fmtDate(rv.reviewed_at)}</span></div>
      <div><span class="badge ${cls==='art-approved'?'badge-approved':cls==='art-rejected'?'badge-rejected':'badge-review'}">${rv.decision}</span></div>
      ${rv.comments?`<div class="review-artifact-comment">${rv.comments}</div>`:''}
    </div>`;}).join('')}
  </div>`:''}
  <div id="solution-review-panel"></div>

  ${isPublished ? renderSolutionOutputSection(s, opsSupportForSolution) : ''}
  ${!isPublished&&s.jiraEpics?renderJiraEpicsPanel(s.jiraEpics,s.id):''}
  </div>
  <div class="section-card">
    <h3>Solution Details</h3>
    <div class="kv-grid">
      <div class="kv-item"><label>Reference ID</label><span class="font-mono">${s.reference_id}</span></div>
      <div class="kv-item"><label>Status</label><span>${s.status}</span></div>
      <div class="kv-item"><label>Owner</label><span>${s.owner||'–'}</span></div>
      <div class="kv-item"><label>Business Unit</label><span>${s.business_unit||'–'}</span></div>
      <div class="kv-item"><label>Complexity</label><span>${s.complexity||'–'}</span></div>
      <div class="kv-item"><label>Est. Cost Band</label><span>${s.estimated_cost_band||'–'}</span></div>
      <div class="kv-item"><label>Patterns</label><span>${(s.patternIds||[]).length}</span></div>
      <div class="kv-item"><label>Intake Ref</label><span>${s.intake_reference?`<span style="cursor:pointer;color:var(--accent)" onclick="(function(){const ir=S.intakes.find(i=>i.reference_id==='${s.intake_reference}');if(ir)showIntakeDetail(ir.reference_id);else alert('Intake not found');})()">${s.intake_reference}</span>`:'–'}</span></div>
      <div class="kv-item"><label>Created</label><span>${fmtDate(s.created_at)}</span></div>
      <div class="kv-item"><label>Review Stage</label><span>${currentStage||'–'}</span></div>
    </div>
    ${s.deploymentRegions&&s.deploymentRegions.length?`<div class="mt-2"><label class="text-xs text-muted" style="text-transform:uppercase">Regions</label><div class="tag-list mt-1">${s.deploymentRegions.map(r=>`<span class="badge" style="background:var(--surface2);color:var(--text)">${r}</span>`).join('')}</div></div>`:''}
    ${canReview?`<div class="mt-2" id="inline-review-btn"><button class="btn btn-primary btn-sm" style="width:100%" onclick="openSolutionReviewPanel(${s.id})">✓ Submit ${currentStage} Review</button></div>`:''}
    ${isApproved?`<div class="mt-2"><button class="btn btn-success btn-sm" style="width:100%" onclick="syncSolutionToGitHub(${s.id},'${s.reference_id}')">⇅ Sync to GitHub</button></div>`:''}
  </div>
  <div id="solution-iac-panel">${s.iacCode?renderIaCPanel(s.iacCode,'solution',s.id,s.reference_id):`<div class="iac-panel" style="text-align:center;padding:1.3rem 1rem"><div style="font-size:1.4rem;margin-bottom:.4rem">⬡</div><div style="font-size:.82rem;font-weight:700;color:#4ade80;margin-bottom:.25rem">Terraform IaC</div><p class="text-xs text-muted" style="line-height:1.6;margin-bottom:.8rem">Generate a multi-module Terraform root configuration for this solution with per-pattern module stubs, providers, variables, and a cost-estimated README.</p><button class="btn btn-sm" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.3)" onclick="generateSolutionIaC(${s.id},'${s.reference_id}')">⬡ Generate IaC</button></div>`}</div>
  </div>`;
  setMain(h);
}

function renderPatternAlignmentPanel(s, pats, alignments) {
  const alignMap = {};
  (alignments||[]).forEach(a => { alignMap[a.pattern_id] = a; });
  const allMarked = pats.length > 0 && pats.every(p => alignMap[p.patternId] && alignMap[p.patternId].status !== 'Pending');
  const isPatternAlignStage = s.currentStage === 'Pattern Alignment';

  if (!pats.length) return '';

  let h = `<div class="section-card" id="pattern-alignment-panel">
    <h3>Pattern Alignment Review
      ${allMarked ? `<span class="badge badge-approved" style="margin-left:.5rem;font-size:.63rem">✓ All Marked</span>` : ''}
    </h3>
    <p class="text-xs text-muted" style="margin-bottom:.8rem;line-height:1.6">Compare the solution's patterns against the endorsed library. Mark each as Aligned, Conditionally Aligned, or Deviation Noted.</p>`;

  pats.forEach(p => {
    const a = alignMap[p.patternId] || { status: 'Pending' };
    const statusClass = `align-${a.status}`;
    const endorsedBadge = p.status === 'Endorsed' ? `<span class="badge badge-endorsed" style="font-size:.6rem">✓ Endorsed</span>` : `<span class="badge badge-review" style="font-size:.6rem">⚠ ${p.status}</span>`;
    h += `<div class="align-row ${statusClass}" id="align-row-${p.patternId.replace('-','_')}">
      <div style="flex:1">
        <div class="flex items-center gap-2" style="flex-wrap:wrap">
          <span class="font-mono text-xs text-muted">${p.patternId}</span>
          <span class="text-sm font-bold">${p.name}</span>
          ${endorsedBadge}
          <span class="align-pill align-${a.status}">${a.status}</span>
        </div>
        ${a.note ? `<div class="text-xs text-muted mt-1">Note: ${a.note}</div>` : ''}
        ${a.reviewer ? `<div class="text-xs text-muted">By: ${a.reviewer}</div>` : ''}
      </div>
      <div class="flex gap-1" style="flex-shrink:0">
        <button class="btn btn-sm btn-ghost" style="font-size:.62rem;padding:.2rem .5rem" onclick="openAlignmentModal(${s.id},'${p.patternId}','${p.name.replace(/'/g,"\\'")}','${a.status}','${(a.note||'').replace(/'/g,"\\'")}')">✎ Mark</button>
      </div>
    </div>`;
  });

  if (isPatternAlignStage && allMarked) {
    h += `<div class="alert alert-success mt-2" style="margin-bottom:0">✓ All patterns marked. You can now submit the Pattern Alignment review.</div>`;
  }
  h += `</div>`;
  return h;
}

function renderDesignIterationsPanel(s, iterations) {
  const latest = iterations && iterations.length ? iterations[0] : null;
  let h = `<div class="section-card" id="design-iterations-panel">
    <div class="flex justify-between items-center" style="margin-bottom:.6rem">
      <h3 style="margin-bottom:0">Design Iterations ${latest ? `<span class="text-xs text-muted font-bold" style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:.4rem">Current: ${latest.version_label}</span>` : ''}</h3>
      <button class="btn btn-sm btn-ghost" onclick="openIterationModal(${s.id})">＋ Log Iteration</button>
    </div>`;

  if (!iterations || !iterations.length) {
    h += `<div class="empty" style="padding:1rem;text-align:center;color:var(--muted);font-size:.82rem">No iterations logged yet. Click "+ Log Iteration" to record the first design iteration.</div>`;
  } else {
    iterations.forEach(it => {
      h += `<div class="iter-item">
        <div style="flex-shrink:0;margin-top:.1rem"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div></div>
        <div style="flex:1">
          <div class="iter-label">${it.version_label}</div>

}

function switchOutputTab(btn, panelId) {
  const card = btn.closest('.section-card');

  card.querySelectorAll('.output-tab').forEach(t => t.classList.remove('active'));

  card.querySelectorAll('.output-tab-panel').forEach(p => p.classList.remove('active'));

    const col = document.querySelector('.two-col > div:first-child');

      const genDiv = document.createElement('div');
      genDiv.className = 'jira-panel';
      genDiv.innerHTML = `<div class="jira-generating"><div class="jira-spin"></div><span>Claude is analysing your solution and generating Epics & Stories…</span></div>`;
      col.appendChild(genDiv);
    }
  } else {
    existingPanel.innerHTML = `<div class="jira-generating"><div class="jira-spin"></div><span>Claude is analysing your solution and generating Epics & Stories…</span></div>`;
  }

  try {
    const result = await api.post(`/api/solutions/${solutionId}/generate-epics`, {});

}

function openJiraPushModal(solutionId) {
  S._jiraPushSolutionId = solutionId;

async function submitJiraPush() {
  const g = id => document.getElementById(id);
  const baseUrl = g('jira_base_url').value.trim();
  const projectKey = g('jira_project_key').value.trim().toUpperCase();
  const userEmail = g('jira_user_email').value.trim();
  const apiToken = g('jira_api_token').value.trim();

  if (!baseUrl || !projectKey || !userEmail || !apiToken) {
    alert('Please fill in all Jira connection fields.'); return;
  }

  const statusEl = g('jira-push-status');
  const btn = g('jira-push-btn');
  if (statusEl) statusEl.innerHTML = `<div class="jira-generating" style="margin-top:.7rem"><div class="jira-spin"></div><span>Pushing Epics & Stories to Jira project ${projectKey}…</span></div>`;
  if (btn) btn.disabled = true;

  try {
    await api.post(`/api/solutions/${S._jiraPushSolutionId}/push-to-jira`, { baseUrl, projectKey, userEmail, apiToken });
    closeModal('jiraPushModal');
    await loadSolutions();
    showSolutionDetail(S._jiraPushSolutionId);
  } catch (err) {
    if (statusEl) statusEl.innerHTML = `<div class="alert alert-danger" style="margin-top:.7rem">Push failed: ${err.error || err.message || 'Unknown error'}</div>`;
    if (btn) btn.disabled = false;
  }
}

function renderIntakeSolutionBridge(intake) {
  const linkedSolutions = (S.solutions||[]).filter(s=>s.intake_reference===intake.reference_id);
  let h = `<div class="section-card" style="border-color:rgba(255,212,0,.3);background:linear-gradient(135deg,var(--surface) 92%,rgba(255,212,0,.04));margin-top:.8rem">
    <div class="flex justify-between items-center" style="margin-bottom:${linkedSolutions.length?'.7rem':'.35rem'}">
      <h3 style="color:var(--accent);margin-bottom:0">Solution Design</h3>
      <button class="begin-solution-btn" id="begin-sol-btn-${intake.reference_id.replace(/-/g,'_')}" onclick="beginSolutionDesign(this,'${intake.reference_id}')">⬡ Begin Solution Design</button>
    </div>`;

  if (linkedSolutions.length) {
    linkedSolutions.forEach(s => {
      const stages=['Pattern Alignment','EA Review','Security Review','Architecture Board'];
      const approvedStages=(s.reviews||[]).filter(r=>r.decision==='Approved').map(r=>r.stage);
      const activeStageName = s.status==='Published'?null:(approvedStages.length<stages.length?stages[approvedStages.length]:null);
      const progress=stages.filter(st=>approvedStages.includes(st)).length;
      const total=stages.length;
      const pct=Math.round((progress/total)*100);
      let stageLabel='';
      if(s.status==='Published') stageLabel='All stages complete';
      else if(s.status==='Rejected') stageLabel='Rejected';
      else if(activeStageName) stageLabel=`Current: ${activeStageName}`;
      else stageLabel=pct+'% through review';
      h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:.55rem .7rem;background:var(--surface2);border-radius:7px;margin-bottom:.35rem;cursor:pointer;border-left:3px solid var(--accent)" onclick="showSolutionDetail(${s.id})">
        <div>
          <div class="font-mono text-xs text-muted">${s.reference_id}</div>
          <div class="text-sm font-bold" style="margin-top:.1rem">${s.title}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:.8rem">
          ${solutionStatusBadge(s.status)}
          <div style="margin-top:.3rem;font-size:.65rem;color:${activeStageName?'var(--accent)':'var(--muted)'}">${stageLabel}</div>
        </div>
      </div>`;
    });
  } else {
    h += `<p class="text-xs text-muted" style="line-height:1.6">No solution design yet. Click <strong>Begin Solution Design</strong> to auto-create one from this intake.</p>`;
  }
  h += `</div>`;
  return h;
}

async function beginSolutionDesign(btnEl, intakeReference) {
  if(btnEl){btnEl.disabled=true;btnEl.textContent='⟳ Creating...';}
  try {
    const intake = await api.get(`/api/intake/${intakeReference}`);
    const payload = {
      title: `Solution: ${intake.title||intakeReference}`,
      description: intake.description||'',
      businessContext: intake.strategic_objective||'',
      owner: intake.requestor_name||'',
      businessUnit: intake.business_unit||'',
      intakeReference: intake.reference_id,
      riskTier: intake.risk_tier||'',
      patternIds: intake.relatedPatternIds||[],
      vendorIds: intake.vendorIds||[],
      deploymentRegions: [],
      status: 'Draft',
    };
    const sol = await api.post('/api/solutions', payload);
    await loadSolutions();
    renderSidebar();
    showSolutionDetail(sol.id);
  } catch(e) {
    if(btnEl){btnEl.disabled=false;btnEl.textContent='⬡ Begin Solution Design';}
    alert('Failed to create solution: '+(e.error||e.message||'Unknown error'));
  }
}

  </div>`;

}

function toggleSDArr(field,val) {
  if(!S._sdData) S._sdData={patternIds:[],vendorIds:[],deploymentRegions:[]};
  const arr=S._sdData[field]||[];
  const idx=arr.indexOf(val);
  if(idx===-1) arr.push(val); else arr.splice(idx,1);
  S._sdData[field]=arr;
}

async function submitSolution() {
  const t=document.getElementById('sd_title');
  if(!t||!t.value.trim()){alert('Please enter a solution title.');return;}
  const pf=S._sdPreFill||{};
  const payload={
    title:t.value.trim(),
    description:(document.getElementById('sd_description')||{}).value||'',
    businessContext:(document.getElementById('sd_businessContext')||{}).value||'',
    owner:(document.getElementById('sd_owner')||{}).value||'',
    businessUnit:(document.getElementById('sd_businessUnit')||{}).value||'',
    complexity:(document.getElementById('sd_complexity')||{}).value||'',
    estimatedCostBand:(document.getElementById('sd_costBand')||{}).value||'',
    intakeReference:(document.getElementById('sd_intakeRef')||{}).value||'',
    riskTier:pf.riskTier||'',
    status:'Draft',
    patternIds:S._sdData.patternIds||[], vendorIds:S._sdData.vendorIds||[],
    deploymentRegions:S._sdData.deploymentRegions||[],
  };
  try{const s=await api.post('/api/solutions',payload);await loadSolutions();renderSidebar();showSolutionDetail(s.id);}
  catch(e){alert('Failed: '+(e.error||JSON.stringify(e)));}
}

async function updateSolutionStatus(id,status) {
  await api.patch(`/api/solutions/${id}`,{status});await loadSolutions();renderSidebar();showSolutionDetail(id);
}

function confirmDeleteSolution(id,ref) {
  document.getElementById('deleteTarget').textContent=ref;
  document.getElementById('deleteConfirmBtn').onclick=async()=>{
    await api.del(`/api/solutions/${id}`);closeModal('deleteModal');await loadSolutions();renderSidebar();showSolutionsList();
  };
  document.getElementById('deleteModal').style.display='flex';
}

// ─── Intake List ──────────────────────────────────────────────────────────────
async function showIntakeList(tab) {
  S.view='intake-list'; if(tab) S.tabFilter=tab; renderSidebar();
  await loadIntakes();
  const statuses=['All','Draft','Submitted','Under Review','Approved','Approved with Conditions','Rejected','Deferred','Withdrawn'];
  let filtered=S.intakes;
  if(S.tabFilter!=='All') filtered=filtered.filter(i=>i.status===S.tabFilter);
  if(S.searchQ){const q=S.searchQ.toLowerCase();filtered=filtered.filter(i=>(i.title+i.reference_id+(i.requestor_name||'')+(i.business_unit||'')).toLowerCase().includes(q));}
  let h=`<div class="page-title"><h2>All Requests</h2><button class="btn btn-primary btn-sm" onclick="startNewIntake()">＋ New Request</button></div>`;
  h+=`<input class="search-bar" placeholder="Search by title, reference, requestor, business unit..." value="${S.searchQ||''}" oninput="S.searchQ=this.value;showIntakeList()">`;
  h+=`<div class="tabs">${statuses.map(s=>`<button class="tab ${S.tabFilter===s?'active':''}" onclick="showIntakeList('${s}')">${s}</button>`).join('')}</div>`;
  if(!filtered.length){h+=`<div class="empty">No requests found.</div>`;}
  else{
    h+=`<div class="table-wrap"><table><thead><tr><th>Reference</th><th>Title</th><th>Domain</th><th>Requestor</th><th>Status</th><th>Risk</th><th>Created</th></tr></thead><tbody>`;
    filtered.forEach(r=>{h+=`<tr onclick="showIntakeDetail('${r.reference_id}')"><td class="font-mono text-xs">${r.reference_id}</td><td><strong>${r.title}</strong></td><td class="text-sm text-muted">${r.programme_domain||r.architecture_type||'–'}</td><td class="text-sm">${r.requestor_name||'–'}</td><td>${statusBadge(r.status)}</td><td>${r.risk_tier?tierBadge(r.risk_tier,r.risk_score):'-'}</td><td class="text-xs text-muted">${fmtDate(r.created_at)}</td></tr>`;});
    h+=`</tbody></table></div>`;
  }
  setMain(h);
}

// ─── Review Queue ─────────────────────────────────────────────────────────────
async function showReviewQueue() {
  S.view='review-queue'; renderSidebar();
  await loadIntakes();
  const queue=S.intakes.filter(i=>['Submitted','Under Review'].includes(i.status));
  queue.sort((a,b)=>(b.risk_score||0)-(a.risk_score||0));
  let h=`<div class="page-title"><h2>Review Queue <span class="text-muted text-sm" style="font-weight:400">${queue.length} pending</span></h2></div>`;
  if(!queue.length){h+=`<div class="empty">Review queue is empty.</div>`;}
  else{
    h+=`<div class="alert alert-info">Sorted by risk score (highest first). Critical risk items require Architecture Board review.</div>`;
    h+=`<div class="table-wrap"><table><thead><tr><th>Risk</th><th>Reference</th><th>Title</th><th>Requestor</th><th>Status</th><th>Submitted</th><th>Actions</th></tr></thead><tbody>`;
    queue.forEach(r=>{
      h+=`<tr><td>${r.risk_tier?tierBadge(r.risk_tier,r.risk_score):'-'}</td>
        <td class="font-mono text-xs" style="cursor:pointer" onclick="showIntakeDetail('${r.reference_id}')">${r.reference_id}</td>
        <td style="cursor:pointer" onclick="showIntakeDetail('${r.reference_id}')"><strong>${r.title}</strong></td>
        <td class="text-sm">${r.requestor_name||'–'}</td><td>${statusBadge(r.status)}</td>
        <td class="text-xs text-muted">${fmtDate(r.submitted_at||r.created_at)}</td>
        <td><div class="flex gap-1">
          ${r.status==='Submitted'?`<button class="btn btn-sm btn-secondary" onclick="openReviewModal('${r.id}','Under Review')">Review</button>`:''}
          <button class="btn btn-sm btn-success" onclick="openReviewModal('${r.id}','Approved')">Approve</button>
          <button class="btn btn-sm btn-success" onclick="openReviewModal('${r.id}','Approved with Conditions')" style="opacity:.85">Approve with Conditions</button>
          <button class="btn btn-sm btn-warning" onclick="openReviewModal('${r.id}','Deferred')">Defer</button>
          <button class="btn btn-sm btn-danger" onclick="openReviewModal('${r.id}','Rejected')">Reject</button>
        </div></td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  setMain(h);
}

// ─── New Intake Wizard ────────────────────────────────────────────────────────
function startNewIntake() {
  S.view='new-intake'; S.wizardStep=1; S.wizardData={}; S.wizardRisk=null; S._docFiles=[]; S._docPrefilled=false; renderSidebar(); renderWizard();
}

function renderWizard() {
  const STEPS=[
    {label:'Overview',      sub:'Name & ownership'},
    {label:'Technology',    sub:'Stack & components'},
    {label:'Vendors',       sub:'Third-party vendors'},
    {label:'Security & Data', sub:'Controls & classification'},
    {label:'Dependencies',  sub:'Patterns & dependencies'},
    {label:'Risk & Submit', sub:'Review & confirm'},
  ];
  const cur=S.wizardStep;

  /* ── Progress track ── */
  let track=`<div class="wiz-track">`;
  STEPS.forEach((s,i)=>{
    const n=i+1;
    const cls=n===cur?'ws-active':n<cur?'ws-done':'';
    const circle=n<cur?'✓':n;
    track+=`<div class="wiz-step ${cls}" onclick="gotoStep(${n})">`;
    if(n<STEPS.length) track+=`<div class="wiz-connector"></div>`;
    track+=`<div class="wiz-circle">${circle}</div><div class="wiz-label">${s.label}</div><div class="wiz-sublabel">${s.sub}</div></div>`;
  });
  track+=`</div>`;

  /* ── Sidebar visibility: show on steps 2+ ── */
  const showSidebar=cur>=2&&cur<6;

  /* Build shell — setMain sets main.className='', so we re-add wiz-mode below */
  const html=`${track}<div class="wiz-body"><div class="wiz-form">${cur===1?renderDocUploadPanel():''}<div id="wizard-body">${renderWizardStep(cur)}</div></div>${showSidebar?`<div class="wiz-ai-sidebar">${renderWizAISidebar()}</div>`:''}</div>`;

  /* Set wiz-mode BEFORE setMain (which clears className) so we set it after */
  const main=document.getElementById('main');
  main.innerHTML=html;
  main.className='wiz-mode';

  initDocDropZone();
}

function renderWizAISidebar() {
  const d=S.wizardData;
  /* Derive a live rough risk estimate */
  let est=30;
  if(d.dataClassification==='Restricted') est+=25;
  else if(d.dataClassification==='Confidential') est+=15;
  else if(d.dataClassification==='Internal') est+=5;
  if(d.isPublicFacing) est+=10;
  if(d.externalDataSharing) est+=10;
  if(!d.encryptionAtRest) est+=5;
  if(!d.hasMfa) est+=5;
  if(d.deviatesFromPatterns) est+=10;
  if((d.integrationPoints||0)>5) est+=10;
  est=Math.min(est,99);
  const tier=est>=70?'Critical':est>=50?'High':est>=30?'Medium':'Low';
  const tierColor=est>=70?'#e74c3c':est>=50?'#e67e22':est>=30?'#f39c12':'#2ecc71';
  const route=est>=70?'ARB + CISO':est>=50?'ARB':'EA Lite';

  /* Contextual suggestions */
  const sugs=[];
  if(!d.encryptionAtRest&&!d.encryptionInTransit) sugs.push({p:'MUST',t:'Confirm encryption at rest and in transit for this solution.'});
  if(d.dataClassification==='Restricted'||d.dataClassification==='Confidential') sugs.push({p:'MUST',t:'A Data Privacy Impact Assessment is required for Confidential/Restricted data.'});
  if(d.isPublicFacing&&!d.hasWaf) sugs.push({p:'SHOULD',t:'Enable WAF protection for any public-facing endpoint.'});
  if((d.complianceRequirements||[]).includes('GDPR')) sugs.push({p:'SHOULD',t:'Document data residency and DPA references for GDPR scope.'});
  if(d.deviatesFromPatterns) sugs.push({p:'SHOULD',t:'Document technical rationale for pattern deviation before ARB.'});
  if((d.integrationPoints||0)>5) sugs.push({p:'CONSIDER',t:'High integration count — consider an integration pattern or middleware bus.'});
  if(sugs.length===0) sugs.push({p:'CONSIDER',t:'Continue filling out each step; AI guidance will update as you go.'});

  const policies=[
    'EA Governance Policy v3.1',
    ...(d.dataClassification==='Restricted'?['Data Privacy Standard v3.0']:d.dataClassification==='Confidential'?['Data Classification Policy']:[] ),
    ...((d.complianceRequirements||[]).includes('GDPR')?['GDPR Controls v2']:[] ),
    'Architecture Review Policy v2.4',
  ];

  let h=`<div style="position:relative;background:var(--surface);border:1px solid rgba(124,92,191,.35);border-radius:10px;padding:12px 13px;margin-bottom:10px;overflow:hidden">`;
  h+=`<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c5cbf,#a78bfa,#6366f1)"></div>`;
  h+=`<div class="wiz-ai-badge">✦ AI Risk Preview</div>`;
  h+=`<div class="wiz-ai-score-row">
    <div class="wiz-ai-score-box"><div class="wiz-ai-score-val" style="color:${tierColor}">${est}</div><div class="wiz-ai-score-lbl">Est. Score</div></div>
    <div class="wiz-ai-score-box"><div class="wiz-ai-score-val" style="font-size:.8rem;color:${tierColor}">${tier}</div><div class="wiz-ai-score-lbl">Risk Tier</div></div>
    <div class="wiz-ai-score-box"><div class="wiz-ai-score-val" style="font-size:.72rem;color:#d4830a">${route}</div><div class="wiz-ai-score-lbl">Likely Route</div></div>
  </div>
  <div style="font-size:.7rem;color:var(--muted);line-height:1.5">Live estimate — updates as you fill in each step. Full calculation on Step 6.</div></div>`;

  if(sugs.length){
    h+=`<div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px">AI Suggestions</div>`;
    sugs.slice(0,5).forEach(s=>{
      const cls=s.p==='MUST'?'sug-must':s.p==='SHOULD'?'sug-should':'sug-consider';
      h+=`<div class="wiz-suggestion"><span class="wiz-sug-tag ${cls}">${s.p}</span><span style="font-size:.72rem;color:var(--text);line-height:1.45">${s.t}</span></div>`;
    });
  }

  h+=`<div style="font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:10px 0 6px">Applicable Policies</div>`;
  h+=`<div class="wiz-card" style="padding:.6rem .8rem">`;
  policies.forEach(p=>{h+=`<div class="wiz-policy-row"><span style="color:var(--accent);font-size:.6rem">→</span>${p}</div>`;});
  h+=`</div>`;
  return h;
}

function renderDocUploadPanel() {
  const files = S._docFiles || [];
  let h = `<div class="doc-upload-panel">
    <h3>📄 Upload Documents <span style="font-weight:400;font-size:.68rem;color:var(--muted);text-transform:none;letter-spacing:0">— optional, auto-fills the form</span></h3>
    <p class="text-xs text-muted" style="margin-bottom:.8rem;line-height:1.55">Upload project documents, architecture specs, code files, or a zipped repo. Claude will extract architecture information and pre-fill the form fields.</p>
    <div class="drop-zone" id="doc-drop-zone" onclick="document.getElementById('doc-file-input').click()">
      <input type="file" id="doc-file-input" multiple accept=".pdf,.docx,.txt,.zip,.js,.ts,.jsx,.tsx,.py,.java,.cs,.go,.rb,.yaml,.yml,.json,.xml,.sh,.tf,.md" style="display:none" onchange="docFilesSelected(this.files)"/>
      <div class="drop-zone-icon">📂</div>
      <div class="drop-zone-label">Drop files here or click to browse</div>
      <div class="drop-zone-hint">PDF · DOCX · TXT · ZIP · JS · TS · PY · YAML · JSON · XML · and more<br>Up to 10 files · 20 MB each</div>
    </div>`;
  if (files.length > 0) {
    h += `<div class="doc-file-list">`;
    files.forEach((f, i) => {
      const kb = (f.size / 1024).toFixed(0);
      const sz = f.size > 1024 * 1024 ? (f.size / 1048576).toFixed(1) + ' MB' : kb + ' KB';
      h += `<div class="doc-file-item"><span style="font-size:.9rem">📄</span><span class="doc-file-name">${f.name}</span><span class="doc-file-size">${sz}</span><button class="doc-file-remove" onclick="docRemoveFile(${i})" title="Remove">✕</button></div>`;
    });
    h += `</div>
    <div style="margin-top:.8rem;display:flex;gap:.5rem;align-items:center">
      <button class="btn btn-primary btn-sm" id="doc-parse-btn" onclick="docParseFiles()">✦ Analyse &amp; Pre-fill Form</button>
      <button class="btn btn-ghost btn-sm" onclick="docClearFiles()">Clear</button>
    </div>`;
  }
  if (S._docPrefilled) {
    h += `<div class="doc-prefill-banner">✓ Draft pre-filled from your uploaded documents. Review and edit the fields below before submitting.<button class="doc-prefill-banner-close" onclick="S._docPrefilled=false;this.parentElement.style.display='none'">✕</button></div>`;
  }
  h += `<div id="doc-status"></div></div>`;
  return h;
}

function initDocDropZone() {
  const zone = document.getElementById('doc-drop-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    docFilesSelected(e.dataTransfer.files);
  });
}

function docFilesSelected(fileList) {
  if (!S._docFiles) S._docFiles = [];
  const existing = new Set(S._docFiles.map(f => f.name + f.size));
  Array.from(fileList).forEach(f => {
    if (!existing.has(f.name + f.size)) { S._docFiles.push(f); existing.add(f.name + f.size); }
  });
  renderWizard();
}

function docRemoveFile(idx) {
  if (S._docFiles) S._docFiles.splice(idx, 1);
  renderWizard();
}

function docClearFiles() {
  S._docFiles = []; S._docPrefilled = false;
  renderWizard();
}

async function docParseFiles() {
  if (!S._docFiles || S._docFiles.length === 0) return;
  const statusEl = document.getElementById('doc-status');
  const btn = document.getElementById('doc-parse-btn');
  if (btn) btn.disabled = true;
  if (statusEl) statusEl.innerHTML = `<div class="doc-parse-progress"><div class="doc-parse-spin"></div>Extracting text and analysing with Claude — this may take 15–30 seconds…</div>`;

  try {
    const formData = new FormData();
    S._docFiles.forEach(f => formData.append('files', f));
    const resp = await fetch('/api/ai/parse-documents', { method: 'POST', body: formData });
    let data;
    try { data = await resp.json(); } catch { throw new Error('Server returned an unexpected response. Please try again.'); }
    if (!resp.ok) throw new Error(data.error || 'Parsing failed');

    const ex = data.extracted;
    const d = S.wizardData;

    if (ex.title && !d.title) d.title = ex.title;
    if (ex.description && !d.description) d.description = ex.description;
    if (ex.strategicObjective && !d.strategicObjective) d.strategicObjective = ex.strategicObjective;
    if (ex.architectureType && !d.architectureType) d.architectureType = ex.architectureType;
    if (ex.hostingModel && !d.hostingModel) d.hostingModel = ex.hostingModel;
    if (ex.deploymentTarget && !d.deploymentTarget) d.deploymentTarget = ex.deploymentTarget;
    if (ex.dataClassification && !d.dataClassification) d.dataClassification = ex.dataClassification;
    if (ex.businessUnit && !d.businessUnit) d.businessUnit = ex.businessUnit;
    if (ex.programmeDomain && !d.programmeDomain) d.programmeDomain = ex.programmeDomain;
    if (ex.projectTimeline && !d.projectTimeline) d.projectTimeline = ex.projectTimeline;
    if (ex.techStackNotes && !d.techStackNotes) d.techStackNotes = ex.techStackNotes;
    if (ex.legacySystems && !d.legacySystems) d.legacySystems = ex.legacySystems;
    if (typeof ex.integrationPoints === 'number' && !d.integrationPoints) d.integrationPoints = ex.integrationPoints;
    if (typeof ex.isPublicFacing === 'boolean' && d.isPublicFacing === undefined) d.isPublicFacing = ex.isPublicFacing;
    if (typeof ex.encryptionAtRest === 'boolean' && d.encryptionAtRest === undefined) d.encryptionAtRest = ex.encryptionAtRest;
    if (typeof ex.encryptionInTransit === 'boolean' && d.encryptionInTransit === undefined) d.encryptionInTransit = ex.encryptionInTransit;
    if (typeof ex.hasMfa === 'boolean' && d.hasMfa === undefined) d.hasMfa = ex.hasMfa;
    if (typeof ex.hasWaf === 'boolean' && d.hasWaf === undefined) d.hasWaf = ex.hasWaf;
    if (typeof ex.hasMonitoring === 'boolean' && d.hasMonitoring === undefined) d.hasMonitoring = ex.hasMonitoring;
    if (typeof ex.isZeroTrustAligned === 'boolean' && d.isZeroTrustAligned === undefined) d.isZeroTrustAligned = ex.isZeroTrustAligned;
    if (typeof ex.hasLegacyDependencies === 'boolean' && d.hasLegacyDependencies === undefined) d.hasLegacyDependencies = ex.hasLegacyDependencies;
    ['components','dataTypes','authMethods','newVendors','complianceRequirements'].forEach(k => {
      if (Array.isArray(ex[k]) && ex[k].length > 0 && (!d[k] || d[k].length === 0)) d[k] = ex[k];
    });

    S._docPrefilled = true;
    S.wizardStep = 1;
    renderWizard();
  } catch (err) {
    const st = document.getElementById('doc-status');
    if (st) st.innerHTML = `<div class="doc-error-banner">⚠ ${err.message || 'An error occurred during document analysis. You can continue filling the form manually.'}</div>`;
    if (btn) btn.disabled = false;
  }
}

    </div>`;}
  else if(step===4){
    h+=`<div class="wiz-card"><div class="wiz-card-title">Data Classification</div>
      <div class="form-row"><div class="form-group"><label>Data Classification *</label><select class="form-control" id="w_dataClassification"><option value="">Select...</option>${opts(['Public','Internal','Confidential','Restricted'],d.dataClassification)}</select></div><div class="form-group"><label>External Data Sharing?</label><select class="form-control" id="w_externalDataSharing"><option value="">Select...</option><option value="true" ${d.externalDataSharing?'selected':''}>Yes</option><option value="false" ${d.externalDataSharing===false?'selected':''}>No</option></select></div></div>
      <div class="form-group"><label>Data Types in Scope</label><div class="checkbox-grid">${['PII','PHI','Financial','OT/SCADA Data','Credentials/Secrets','Operational Metrics','Configuration Data','Log Data','None'].map(t=>`<label class="checkbox-item"><input type="checkbox" value="${t}" ${(d.dataTypes||[]).includes(t)?'checked':''} onchange="toggleCheck('dataTypes','${t}')"/>${t}</label>`).join('')}</div></div>
    </div>
    <div class="wiz-card"><div class="wiz-card-title">Authentication & Security Controls</div>
      <div class="form-group"><label>Authentication Methods</label><div class="checkbox-grid">${['OAuth2/OIDC','SAML','API Key','Certificate/mTLS','Windows Integrated (Kerberos)','None'].map(t=>`<label class="checkbox-item"><input type="checkbox" value="${t}" ${(d.authMethods||[]).includes(t)?'checked':''} onchange="toggleCheck('authMethods','${t}')"/>${t}</label>`).join('')}</div></div>
      <div class="form-group"><label>Security Controls Confirmed</label><div class="checkbox-grid">
        ${[['encryptionAtRest','Encryption at Rest'],['encryptionInTransit','Encryption in Transit'],['hasMfa','Multi-Factor Authentication'],['hasWaf','WAF Protection'],['hasMonitoring','Monitoring & Alerting'],['isZeroTrustAligned','Zero Trust Aligned']].map(([k,l])=>`<label class="checkbox-item"><input type="checkbox" ${d[k]?'checked':''} onchange="S.wizardData['${k}']=this.checked"/>${l}</label>`).join('')}
      </div></div>
    </div>
    <div class="wiz-card"><div class="wiz-card-title">Compliance Requirements</div>
      <div class="checkbox-grid">${['GDPR','SOX','ISO 27001','IEC 62443','HIPAA','PCI-DSS','NIST CSF','None'].map(t=>`<label class="checkbox-item"><input type="checkbox" value="${t}" ${(d.complianceRequirements||[]).includes(t)?'checked':''} onchange="toggleCheck('complianceRequirements','${t}')"/>${t}</label>`).join('')}</div>
    </div>`;}
  else if(step===5){
    h+=`<div class="wiz-card"><div class="wiz-card-title">Related Architecture Patterns</div><div class="checkbox-grid">`;
    S.patterns.forEach(p=>{h+=`<label class="checkbox-item"><input type="checkbox" value="${p.patternId}" ${(d.relatedPatternIds||[]).includes(p.patternId)?'checked':''} onchange="toggleCheck('relatedPatternIds','${p.patternId}')"/><span class="font-mono text-xs" style="color:var(--muted)">${p.patternId}</span> ${p.name} ${p.status==='Endorsed'?'<span class="badge badge-endorsed text-xs" style="margin-left:auto">✓</span>':''}</label>`;});
    h+=`</div></div>
    <div class="wiz-card"><div class="wiz-card-title">Deviations & Legacy</div>
      <div class="form-row"><div class="form-group"><label>Deviates from Patterns?</label><select class="form-control" id="w_deviatesFromPatterns"><option value="">Select...</option><option value="true" ${d.deviatesFromPatterns?'selected':''}>Yes — exception required</option><option value="false" ${d.deviatesFromPatterns===false?'selected':''}>No</option></select></div><div class="form-group"><label>Legacy Dependencies?</label><select class="form-control" id="w_hasLegacyDependencies"><option value="">Select...</option><option value="true" ${d.hasLegacyDependencies?'selected':''}>Yes</option><option value="false" ${d.hasLegacyDependencies===false?'selected':''}>No</option></select></div></div>
      <div class="form-group"><label>Legacy Systems</label><input class="form-control" id="w_legacySystems" value="${d.legacySystems||''}" placeholder="e.g. SAP ECC, FactoryTalk SE"/></div>
      <div class="form-group"><label>Deviation Justification</label><textarea class="form-control" id="w_deviationJustification" placeholder="Technical rationale for any pattern deviation...">${d.deviationJustification||''}</textarea></div>
      <div class="form-group"><label>External Dependencies</label><textarea class="form-control" id="w_externalDependencies" placeholder="Other systems, services, or teams...">${d.externalDependencies||''}</textarea></div>
    </div>`;}
  else if(step===6){
    if(!S.wizardRisk){h+=`<div class="alert alert-info">Calculating automated risk assessment...</div>`;setTimeout(()=>calculateAndShowRisk(),80);}
    else{
      const risk=S.wizardRisk;
      h+=`<div class="two-col" style="gap:1.2rem"><div>
        ${renderRiskPanel(risk.score,risk.tier,risk.breakdown,risk.flags,risk.recommendations)}
        <div class="section-card mt-2"><h3>Submission Summary</h3><div class="kv-grid">
          <div class="kv-item"><label>Title</label><span>${S.wizardData.title||'–'}</span></div>
          <div class="kv-item"><label>Type</label><span>${S.wizardData.architectureType||'–'}</span></div>
          <div class="kv-item"><label>Requestor</label><span>${S.wizardData.requestorName||'–'}</span></div>
          <div class="kv-item"><label>Business Unit</label><span>${S.wizardData.businessUnit||'–'}</span></div>
          <div class="kv-item"><label>Data Classification</label><span>${S.wizardData.dataClassification||'–'}</span></div>
          <div class="kv-item"><label>Integration Points</label><span>${S.wizardData.integrationPoints||0}</span></div>
        </div></div>
      </div><div>
        ${risk.tier==='Critical'?`<div class="alert alert-danger">⚠ Critical risk — Architecture Board and CISO review mandatory before any implementation.</div>`:''}
        ${risk.tier==='High'?`<div class="alert alert-warning">⚠ High risk — Architecture Board review required for approval.</div>`:''}
        <div id="quick-ai-box"><div class="ai-panel" style="text-align:center;padding:1.2rem .9rem"><div style="font-size:1.2rem;margin-bottom:.35rem">✦</div><div style="font-size:.8rem;font-weight:700;color:#a78bfa;margin-bottom:.25rem">Claude Quick Scan</div><p class="text-xs text-muted" style="margin-bottom:.7rem">Get an instant AI perspective on your architecture before submitting.</p><button class="btn btn-sm" style="background:rgba(124,92,191,.2);color:#a78bfa;border:1px solid rgba(124,92,191,.4)" onclick="runQuickAIAssess(S.wizardData)">✦ Run Quick Scan</button></div></div>
        ${risk.flags.length?`<div class="section-card mt-2"><h3>Risk Flags</h3><ul class="flags-list">${risk.flags.map(f=>`<li>${f}</li>`).join('')}</ul></div>`:''}
        ${risk.recommendations.length?`<div class="section-card mt-2"><h3>Recommendations</h3><ul class="recs-list">${risk.recommendations.map(r=>`<li>${r}</li>`).join('')}</ul></div>`:''}
      </div></div>
      <div class="wizard-nav"><button class="btn btn-secondary" onclick="gotoStep(5)">← Back</button><div class="flex gap-2"><button class="btn btn-ghost" onclick="submitIntake(true)">Save as Draft</button><button class="btn btn-primary" onclick="submitIntake(false)">Submit for Review →</button></div></div>`;
      return h;
    }
  }
  h+=`<div class="wizard-nav">${step>1?`<button class="btn btn-secondary" onclick="gotoStep(${step-1})">← Back</button>`:'<div></div>'}<button class="btn btn-primary" onclick="gotoStep(${step+1})">${step<5?'Next →':'Review & Submit →'}</button></div>`;
  return h;
}

async function calculateAndShowRisk(){try{S.wizardRisk=await api.post('/api/intake/assess',S.wizardData);document.getElementById('wizard-body').innerHTML=renderWizardStep(6);}catch(e){document.getElementById('wizard-body').innerHTML='<div class="alert alert-danger">Risk assessment failed. Check required fields and try again.</div>';}}

function gotoStep(n){if(n<1||n>6)return;saveStepData(S.wizardStep);if(n>1&&!validateStep(S.wizardStep))return;if(n===6)S.wizardRisk=null;S.wizardStep=n;renderWizard();}

function saveStepData(step){
  const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;};
  if(step===1)Object.assign(S.wizardData,{title:g('w_title'),description:g('w_description'),strategicObjective:g('w_strategicObjective'),requestorName:g('w_requestorName'),requestorEmail:g('w_requestorEmail'),requestorRole:g('w_requestorRole'),businessUnit:g('w_businessUnit'),programmeDomain:g('w_programmeDomain'),projectTimeline:g('w_projectTimeline'),architectureType:g('w_architectureType')});
  else if(step===2)Object.assign(S.wizardData,{hostingModel:g('w_hostingModel'),deploymentTarget:g('w_deploymentTarget'),integrationPoints:parseInt(g('w_integrationPoints'))||0,isPublicFacing:g('w_isPublicFacing')==='true',techStackNotes:g('w_techStackNotes')});
  else if(step===4)Object.assign(S.wizardData,{dataClassification:g('w_dataClassification'),externalDataSharing:g('w_externalDataSharing')==='true'});
  else if(step===5)Object.assign(S.wizardData,{deviatesFromPatterns:g('w_deviatesFromPatterns')==='true',deviationJustification:g('w_deviationJustification'),hasLegacyDependencies:g('w_hasLegacyDependencies')==='true',legacySystems:g('w_legacySystems'),externalDependencies:g('w_externalDependencies')});
}
function validateStep(s){const d=S.wizardData;
  if(s===1){if(!d.title){alert('Please enter a request title.');return false;}if(!d.description){alert('Please enter a description.');return false;}if(!d.requestorName){alert('Please enter your name.');return false;}if(!d.businessUnit){alert('Please enter a business unit.');return false;}if(!d.architectureType){alert('Please select an architecture type.');return false;}}
  if(s===4&&!d.dataClassification){alert('Please select a data classification.');return false;}
  return true;
}
function addTag(e,field,inputId){if(e.key==='Enter'||e.key===','){e.preventDefault();const val=e.target.value.trim().replace(/,$/,'');if(!val)return;if(!S.wizardData[field])S.wizardData[field]=[];if(!S.wizardData[field].includes(val))S.wizardData[field].push(val);e.target.value='';const wrap=document.getElementById(field==='components'?'components-wrap':'newvendors-wrap');const t=document.createElement('span');t.className='tag';t.innerHTML=`${val}<span class="tag-remove" onclick="removeTag('${field}','${encodeURIComponent(val)}')">✕</span>`;wrap.insertBefore(t,e.target);}}
function removeTag(field,val){const decoded=decodeURIComponent(val);if(!S.wizardData[field])return;S.wizardData[field]=S.wizardData[field].filter(v=>v!==decoded);renderWizard();}
function toggleVendor(id){if(!S.wizardData.vendorIds)S.wizardData.vendorIds=[];const idx=S.wizardData.vendorIds.indexOf(id);if(idx===-1)S.wizardData.vendorIds.push(id);else S.wizardData.vendorIds.splice(idx,1);}
function toggleCheck(field,val){if(!S.wizardData[field])S.wizardData[field]=[];const idx=S.wizardData[field].indexOf(val);if(idx===-1)S.wizardData[field].push(val);else S.wizardData[field].splice(idx,1);}
async function submitIntake(asDraft){saveStepData(6);if(!asDraft&&!validateStep(1))return;try{const r=await api.post('/api/intake',{...S.wizardData,submitAsDraft:asDraft});await loadIntakes();renderSidebar();await showIntakeDetail(r.reference_id);}catch(e){alert('Submission failed: '+(e.error||JSON.stringify(e)));}}

// ─── Review modal ─────────────────────────────────────────────────────────────
function openReviewModal(id,action){
  S.reviewAction=action;S.reviewIntakeId=id;
  const titles={Approved:'Approve Request','Approved with Conditions':'Approve with Conditions',Rejected:'Reject Request',Deferred:'Defer Request',Withdrawn:'Withdraw Request','Under Review':'Mark Under Review',Submitted:'Submit for Review'};
  document.getElementById('reviewModalTitle').textContent=titles[action]||action;
  document.getElementById('reviewerName').value='';document.getElementById('reviewerNotes').value='';document.getElementById('approvedPatternId').value='';
  document.getElementById('approvedPatternGroup').style.display=['Approved','Approved with Conditions'].includes(action)?'block':'none';
  document.getElementById('reviewModal').style.display='flex';
}
async function submitReview(){
  try{await api.post(`/api/intake/${S.reviewIntakeId}/status`,{status:S.reviewAction,reviewerName:document.getElementById('reviewerName').value,reviewerNotes:document.getElementById('reviewerNotes').value,approvedPatternId:document.getElementById('approvedPatternId').value||undefined});
  closeModal('reviewModal');await loadIntakes();renderSidebar();
  if(S.view==='intake-detail')await showIntakeDetail(S.currentIntake.reference_id);
  else if(S.view==='review-queue')showReviewQueue();else showDashboard();}
  catch(e){alert(e.error||'Failed: '+JSON.stringify(e));}
}
function openCommentModal(id){S.commentIntakeId=id;document.getElementById('commentModal').style.display='flex';}
async function submitComment(){const comment=document.getElementById('commentText').value;if(!comment){alert('Please enter a comment.');return;}await api.post(`/api/intake/${S.commentIntakeId}/comments`,{author:document.getElementById('commentAuthor').value||'Anonymous',role:document.getElementById('commentRole').value,comment});closeModal('commentModal');document.getElementById('commentText').value='';if(S.view==='intake-detail')await showIntakeDetail(S.currentIntake.reference_id);}
function closeModal(id){document.getElementById(id).style.display='none';}

  ${p.interactionSteps&&p.interactionSteps.length?`<div class="section-card"><h3>Interaction Flow</h3><ul class="arrow-list">${p.interactionSteps.map((s,i)=>`<li><span style="color:var(--muted);font-size:.7rem;min-width:1.5rem">${i+1}.</span>${s}</li>`).join('')}</ul></div>`:''}
  ${p.securityConsiderations&&p.securityConsiderations.length?`<div class="section-card"><h3>Security Considerations</h3><ul class="arrow-list">${p.securityConsiderations.map(s=>`<li>${s}</li>`).join('')}</ul></div>`:''}
  ${p.guardrails&&p.guardrails.length?`<div class="section-card"><h3>Guardrails</h3><table class="guardrails-table"><thead><tr><th>Area</th><th>Rule</th><th>Severity</th></tr></thead><tbody>${p.guardrails.map(g=>`<tr><td>${g.area}</td><td>${g.rule}</td><td class="sev-${g.severity.toLowerCase()}">${g.severity}</td></tr>`).join('')}</tbody></table></div>`:''}

  <input class="search-bar" placeholder="Search vendors..." oninput="showVendors(this.value)" value="${q}"/>
  <div class="table-wrap"><table><thead><tr><th>Vendor</th><th>Product / Service</th><th>Category</th><th>Criticality</th><th>Hosting</th><th>Data Shared</th><th>Domain</th><th></th></tr></thead><tbody>`;
  filtered.sort((a,b)=>a.vendorCompany.localeCompare(b.vendorCompany)).forEach(v=>{h+=`<tr onclick="showVendorIntelFromRegistry('${(v.domain||'').replace(/'/g,"\\'")}','${(v.vendorCompany||'').replace(/'/g,"\\'")}')"><td><strong>${v.vendorCompany}</strong></td><td>${v.productService}</td><td>${v.category}</td><td>${critBadge(v.criticality)}</td><td class="text-xs text-muted">${v.hostingModel||''}</td><td>${v.dataShared?`<span style="color:var(--review)">Yes</span>`:`<span class="text-muted">No</span>`}</td><td class="text-xs text-muted font-mono">${v.domain||''}</td><td><span class="text-xs" style="color:#fbad41">Intel →</span></td></tr>`;});
  h+=`</tbody></table></div>`;setMain(h);
}

function showVendorIntelFromRegistry(domain, vendorName) {
  if (!domain && !vendorName) return;
  showVendorIntel(domain || vendorName);
}

// ─── Vendor Intel Panel ──────────────────────────────────────────────────────
function showVendorIntel(prefillDomain) {
  S.view = 'vendor-intel'; renderSidebar();
  const uniqueVendors = [];
  const seen = new Set();
  S.vendors.forEach(v => {
    if (v.domain && !seen.has(v.domain)) {
      seen.add(v.domain);
      uniqueVendors.push({ domain: v.domain, name: v.vendorCompany });
    }
  });
  uniqueVendors.sort((a,b) => a.name.localeCompare(b.name));

  let h = `<div class="page-title"><h2>◉ Vendor Intel</h2><div class="text-muted text-sm" style="margin-top:.2rem">Cloudflare Radar-powered security posture reports</div></div>
  <div class="vi-panel">
    <h3>⟳ Domain Scan</h3>
    <div class="vi-search-row">
      <input class="vi-search-input" id="vi-domain-input" placeholder="e.g. claroty.com or vendor name…" value="${prefillDomain||''}" onkeydown="if(event.key==='Enter')runVendorIntelScan()"/>
      <button class="vi-scan-btn" id="vi-scan-btn" onclick="runVendorIntelScan()">▶ Run Scan</button>
    </div>
    <div class="vi-vendor-pills">`;
  uniqueVendors.slice(0, 20).forEach(v => {
    h += `<span class="vi-vendor-pill" onclick="prefillViDomain('${v.domain.replace(/'/g,"\\'")}','${v.name.replace(/'/g,"\\'")}')">
      ${v.name} <span style="color:var(--muted);font-family:monospace;font-size:.62rem">${v.domain}</span>
    </span>`;
  });
  h += `</div>
    <div id="vi-result"></div>
  </div>`;
  setMain(h);
  if (prefillDomain) {
    setTimeout(() => runVendorIntelScan(), 80);
  }
}

function prefillViDomain(domain, name) {
  const inp = document.getElementById('vi-domain-input');
  if (inp) inp.value = domain;
  runVendorIntelScan();
}

async function runVendorIntelScan() {
  const inp = document.getElementById('vi-domain-input');
  if (!inp) return;
  let raw = (inp.value || '').trim();
  if (!raw) return;
  raw = raw.replace(/^https?:\/\//i,'').replace(/\/.*/,'').replace(/^www\./,'');
  inp.value = raw;

  const el = document.getElementById('vi-result');
  if (!el) return;

  const btn = document.getElementById('vi-scan-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Scanning…'; }
  el.innerHTML = `<div class="loading-pulse"><div class="loading-spin"></div>Scanning ${raw} — gathering Cloudflare Radar signals, DNS health, and CVE data…</div>`;

  try {
    const report = await api.post('/api/vendor-intel/', { domain: raw });

    if (!report) {
      el.innerHTML = `<div class="alert alert-danger">Scan failed: no response from server</div>`;
      return;
    }

    el.innerHTML = renderVendorIntelScorecard(report);
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger">Scan failed: ${err.error || err.message || 'Unknown error'}</div>`;
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '▶ Run Scan'; }
  }
}

function viGradeClass(grade) {
  if (!grade || grade === 'Unknown') return 'vi-grade-unknown';
  if (grade === 'A' || grade === 'A+') return 'vi-grade-A';
  if (grade === 'B') return 'vi-grade-B';
  if (grade === 'C') return 'vi-grade-C';
  return 'vi-grade-F';
}

function renderVendorIntelScorecard(report) {
  const grade = (report.riskGrade && report.riskGrade.grade) || 'Unknown';
  const score = (report.riskGrade && report.riskGrade.score) || null;
  const gradeClass = viGradeClass(grade);
  const dns = report.dns || {};
  const ssl = report.ssl || {};
  const threat = report.threat || {};
  const urlScan = report.urlScan || {};
  const cves = report.cves || {};
  const breakdown = (report.riskGrade && report.riskGrade.breakdown) || {};

  const vendorMatch = S.vendors.find(v => v.domain && v.domain.toLowerCase() === report.domain);
  const vendorName = report.resolvedVendorName || (vendorMatch ? vendorMatch.vendorCompany : report.domain);

  const cachedNote = report.cached ? `<div class="vi-cached-notice">Results from cache · ${report.fetchedAt ? new Date(report.fetchedAt).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : ''}</div>` : `<div class="vi-cached-notice">Scanned now · ${new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`;

  let threatStatus = threat.malicious ? 'bad' : (threat.phishing || threat.botnet || threat.spam ? 'warn' : 'ok');
  let threatLabel = threat.malicious ? 'Malicious' : (threat.phishing ? 'Phishing Detected' : threat.botnet ? 'Botnet Flags' : threat.spam ? 'Spam Signals' : 'Clean');
  if (threat.note) { threatStatus = 'unknown'; threatLabel = 'Token not configured'; }

  let dnsStatus = dns.dnssecEnabled && dns.hasSPF && dns.hasDMARC ? 'ok' : (!dns.dnssecEnabled && !dns.hasSPF && !dns.hasDMARC ? 'bad' : 'warn');
  let dnsLabel = dns.dnssecEnabled ? 'DNSSEC enabled' : 'DNSSEC not found';

  let sslStatus = ssl.grade === 'A+' || ssl.grade === 'A' ? 'ok' : ssl.grade === 'B' ? 'warn' : ssl.grade === 'Unknown' ? 'unknown' : 'bad';
  let sslLabel = ssl.grade && ssl.grade !== 'Unknown' ? `Grade ${ssl.grade}` : 'Not inspected';

  let urlScanStatus = urlScan.scanned ? (urlScan.verdict && urlScan.verdict.malicious ? 'bad' : 'ok') : 'unknown';
  let urlScanLabel = urlScan.scanned ? (urlScan.verdict && urlScan.verdict.malicious ? 'Malicious verdict' : 'Clean') : (urlScan.note || urlScan.error || 'Not scanned');

  let cveStatus = cves.nvdKeyMissing ? 'unknown' : (cves.severity === 'Critical' ? 'bad' : cves.severity === 'High' ? 'warn' : cves.severity === 'Medium' || cves.severity === 'Low' ? 'ok' : 'unknown');
  let cveLabel = cves.nvdKeyMissing ? 'NVD API key not configured' : (cves.cveCount > 0 ? `${cves.cveCount} CVEs · ${cves.severity}` : 'No CVEs found');

  function dot(status) {
    const cls = { ok: 'vi-dot-ok', warn: 'vi-dot-warn', bad: 'vi-dot-bad', unknown: 'vi-dot-unknown' }[status] || 'vi-dot-unknown';
    return `<span class="vi-status-dot ${cls}"></span>`;
  }

  function section(id, icon, title, statusDot, statusLabel, bodyHtml) {
    return `<div class="vi-section">
      <div class="vi-section-header" onclick="toggleViSection('${id}')">
        <div class="vi-section-title"><span class="vi-section-icon">${icon}</span>${title}</div>
        <div class="vi-section-status">${dot(statusDot)}<span class="text-xs text-muted">${statusLabel}</span><span class="vi-section-chevron" id="vi-chev-${id}">▶</span></div>
      </div>
      <div class="vi-section-body" id="vi-body-${id}">${bodyHtml}</div>
    </div>`;
  }

  const threatBody = threat.note ? `<div class="alert alert-info" style="margin:0">${threat.note}</div>` : `
    <div class="vi-kv">
      <div class="vi-kv-item"><label>Malicious</label><span style="color:${threat.malicious?'var(--risk-critical)':'var(--risk-low)'}">${threat.malicious?'Yes ✗':'No ✓'}</span></div>
      <div class="vi-kv-item"><label>Phishing</label><span style="color:${threat.phishing?'var(--risk-critical)':'var(--risk-low)'}">${threat.phishing?'Yes ✗':'No ✓'}</span></div>
      <div class="vi-kv-item"><label>Botnet</label><span style="color:${threat.botnet?'var(--risk-critical)':'var(--risk-low)'}">${threat.botnet?'Yes ✗':'No ✓'}</span></div>
      <div class="vi-kv-item"><label>Spam</label><span style="color:${threat.spam?'var(--risk-high)':'var(--risk-low)'}">${threat.spam?'Yes ✗':'No ✓'}</span></div>
    </div>
    ${threat.categories && threat.categories.length ? `<div class="text-xs text-muted" style="margin-top:.3rem">Categories: <span style="color:var(--text)">${threat.categories.join(', ')}</span></div>` : ''}
    ${threat.rank ? `<div class="text-xs text-muted" style="margin-top:.2rem">Global rank: <span style="color:var(--text)">#${threat.rank.toLocaleString()}</span></div>` : ''}`;

  const urlBody = urlScan.note ? `<div class="alert alert-info" style="margin:0">${urlScan.note}</div>` : !urlScan.scanned ? `<div class="text-sm text-muted">${urlScan.error || 'URL scan not available'}</div>` : `
    ${urlScan.tlsCert ? `<div class="vi-kv" style="margin-bottom:.5rem">
      <div class="vi-kv-item"><label>TLS Issuer</label><span>${urlScan.tlsCert.issuer||'Unknown'}</span></div>
      <div class="vi-kv-item"><label>Protocol</label><span>${urlScan.tlsCert.protocol||'Unknown'}</span></div>
      <div class="vi-kv-item"><label>Valid To</label><span>${urlScan.tlsCert.validTo?new Date(urlScan.tlsCert.validTo).toLocaleDateString('en-GB'):'Unknown'}</span></div>
    </div>` : ''}
    <div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.04em;margin-bottom:.35rem">Security Headers</div>
    <div class="vi-header-list">
      ${Object.entries(urlScan.securityHeaders||{}).map(([h,present])=>`<span class="vi-header-badge ${present?'vi-header-present':'vi-header-missing'}">${present?'✓':'✗'} ${h}</span>`).join('')}
    </div>
    ${urlScan.technologies && urlScan.technologies.length ? `<div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.04em;margin:.6rem 0 .3rem">Detected Technologies</div>
    <div class="vi-tech-list">${urlScan.technologies.map(t=>`<span class="vi-tech-chip">${t}</span>`).join('')}</div>` : ''}`;

  const dnsBody = `<div class="vi-kv">
    <div class="vi-kv-item"><label>DNSSEC</label><span style="color:${dns.dnssecEnabled?'var(--risk-low)':'var(--risk-critical)'}">${dns.dnssecEnabled?'Enabled ✓':'Not enabled ✗'}</span></div>
    <div class="vi-kv-item"><label>MX Records</label><span style="color:${dns.hasMx?'var(--risk-low)':'var(--muted)'}">${dns.hasMx?`${dns.mxRecords&&dns.mxRecords.length} record(s) ✓`:'None found'}</span></div>
    <div class="vi-kv-item"><label>SPF</label><span style="color:${dns.hasSPF?'var(--risk-low)':'var(--risk-medium)'}">${dns.hasSPF?'Present ✓':'Missing ✗'}</span></div>
    <div class="vi-kv-item"><label>DMARC</label><span style="color:${dns.hasDMARC?'var(--risk-low)':'var(--risk-medium)'}">${dns.hasDMARC?'Present ✓':'Missing ✗'}</span></div>
  </div>
  ${dns.spfRecord ? `<div class="text-xs text-muted" style="margin-top:.3rem;font-family:monospace;word-break:break-all">${dns.spfRecord}</div>` : ''}
  ${dns.dmarcRecord ? `<div class="text-xs text-muted" style="margin-top:.2rem;font-family:monospace;word-break:break-all">${dns.dmarcRecord}</div>` : ''}
  ${dns.radarSummary ? `<div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.04em;margin:.6rem 0 .25rem">Cloudflare Radar DNS Data</div>
  <div class="vi-kv">
    ${dns.radarSummary.protocol && dns.radarSummary.protocol.HTTPS ? `<div class="vi-kv-item"><label>DNS-over-HTTPS</label><span>${dns.radarSummary.protocol.HTTPS}%</span></div>` : ''}
    ${dns.radarSummary.topLocations && dns.radarSummary.topLocations.length ? `<div class="vi-kv-item"><label>Top Query Locations</label><span>${dns.radarSummary.topLocations.map(l=>l.clientCountryAlpha2||l.location||l).join(', ')}</span></div>` : ''}
  </div>` : ''}`;

  const sslBody = ssl.grade && ssl.grade !== 'Unknown' ? `<div class="vi-kv">
    <div class="vi-kv-item"><label>Grade</label><span style="font-size:1.1rem;font-weight:800;color:${ssl.grade==='A+'||ssl.grade==='A'?'var(--risk-low)':ssl.grade==='B'?'var(--risk-medium)':'var(--risk-critical)'}">${ssl.grade}</span></div>
    <div class="vi-kv-item"><label>Protocol</label><span>${ssl.protocol||'–'}</span></div>
    <div class="vi-kv-item"><label>Mode</label><span>${ssl.mode||'–'}</span></div>
    <div class="vi-kv-item"><label>Last checked</label><span>${ssl.fetchedAt?new Date(ssl.fetchedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'–'}</span></div>
  </div>
  ${ssl.findings && ssl.findings.length ? `<ul style="margin-top:.5rem;list-style:none;display:flex;flex-direction:column;gap:.2rem">${ssl.findings.map(f=>`<li class="text-xs text-muted" style="padding:.15rem 0;border-bottom:1px solid var(--border)">${f}</li>`).join('')}</ul>` : ''}` : `<div class="text-sm text-muted">SSL not yet inspected. Use the Vendor Registry to trigger an SSL check first.</div>
  ${vendorMatch && vendorMatch.id ? `<button class="btn btn-sm btn-secondary" style="margin-top:.6rem" onclick="inspectSslFromIntel(${vendorMatch.id})">Run SSL Check</button>` : ''}`;

  const cvesBody = cves.nvdKeyMissing ? `<div class="alert alert-warning" style="margin:0">
    <div><strong>NVD API key not configured</strong> — CVE data unavailable.<br>
    <span style="font-size:.76rem">Request a free key at <a href="https://nvd.nist.gov/developers/request-an-api-key" target="_blank" style="color:inherit;text-decoration:underline">nvd.nist.gov/developers/request-an-api-key</a> and set the <code style="font-family:monospace">NVD_API_KEY</code> environment variable.</span></div>
  </div>` : cves.cveCount > 0 ? `<div class="vi-kv" style="margin-bottom:.5rem">
    <div class="vi-kv-item"><label>CVE Count</label><span style="font-weight:700">${cves.cveCount}</span></div>
    <div class="vi-kv-item"><label>Highest CVSS</label><span style="font-weight:700;color:${cves.severity==='Critical'?'var(--risk-critical)':cves.severity==='High'?'var(--risk-high)':cves.severity==='Medium'?'var(--risk-medium)':'var(--text)'}">${cves.highestCvss||'–'}</span></div>
    <div class="vi-kv-item"><label>Severity</label><span class="badge badge-${cves.severity==='Critical'?'critical':cves.severity==='High'?'high':cves.severity==='Medium'?'medium':'low'}">${cves.severity}</span></div>
    <div class="vi-kv-item"><label>Keyword</label><span class="font-mono text-xs">${cves.keyword||report.domain}</span></div>
  </div>
  ${cves.topCves && cves.topCves.length ? `<div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem">Top CVEs</div>
  <div class="table-wrap"><table class="tech-table"><thead><tr><th>CVE ID</th><th>CVSS</th><th>Description</th></tr></thead><tbody>
  ${cves.topCves.slice(0,5).map(c=>`<tr><td><a class="cve-link" href="${c.url}" target="_blank">${c.id}</a></td><td style="font-weight:700">${c.score||'–'}</td><td class="text-xs text-muted">${c.description||''}</td></tr>`).join('')}
  </tbody></table></div>` : ''}` : `<div class="text-sm text-muted">No CVEs found for this vendor name in the NVD database.</div>`;

  const breakdownHtml = Object.entries(breakdown).map(([k, v]) => {
    const pct = v.deduction === 0 ? 100 : Math.max(0, Math.round((1 - v.deduction / (v.max || 1)) * 100));
    const col = v.deduction === 0 ? 'var(--risk-low)' : v.deduction >= v.max ? 'var(--risk-critical)' : 'var(--risk-medium)';
    return `<div class="risk-bar-row"><div class="risk-bar-label text-xs">${v.label}</div><div class="risk-bar-track"><div class="risk-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="risk-bar-val text-xs" style="color:${col}">${v.deduction === 0 ? '✓' : '-'+v.deduction}</div></div>`;
  }).join('');

  return `
  <div class="vi-scorecard">
    <div class="vi-scorecard-header">
      <div class="vi-grade-circle ${gradeClass}">${grade}</div>
      <div class="vi-scorecard-meta">
        <div class="vi-scorecard-domain">${vendorName}</div>
        <div class="vi-scorecard-sub">${report.domain}</div>
        ${score !== null ? `<div class="vi-scorecard-score">Risk score: ${score}/100</div>` : ''}
        ${threat.malicious ? `<div class="badge badge-critical" style="margin-top:.35rem">⚠ Malicious domain detected</div>` : ''}
      </div>
      ${breakdownHtml ? `<div class="risk-bars" style="min-width:180px;max-width:220px">${breakdownHtml}</div>` : ''}
    </div>
    <div class="vi-sections">
      ${section('threat', '🔍', 'Threat Intelligence', threatStatus, threatLabel, threatBody)}
      ${section('urlscan', '🔗', 'URL Scan Results', urlScanStatus, urlScanLabel, urlBody)}
      ${section('dns', '🌐', 'DNS Health', dnsStatus, dnsLabel, dnsBody)}
      ${section('ssl', '🔒', 'SSL Grade', sslStatus, sslLabel, sslBody)}
      ${section('cves', '⚠', 'Known CVEs', cveStatus, cveLabel, cvesBody)}
    </div>
  </div>
  ${cachedNote}`;
}

function toggleViSection(id) {
  const body = document.getElementById(`vi-body-${id}`);
  const chev = document.getElementById(`vi-chev-${id}`);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.textContent = open ? '▼' : '▶';
}

async function inspectSslFromIntel(vendorId) {
  try {
    await api.post(`/api/risk/ssl/${vendorId}`, {});
    const inp = document.getElementById('vi-domain-input');
    if (inp && inp.value) runVendorIntelScan();
  } catch(err) {
    alert('SSL inspection failed: ' + (err.error || err.message || 'Unknown error'));
  }
}
