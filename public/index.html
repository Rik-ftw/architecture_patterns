<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>McCain EA Platform</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a0a2e;
  --surface:#2a1045;
  --surface2:#3a1a5e;
  --surface3:#4a2478;
  --border:#4a2478;
  --accent:#FFD400;
  --accent-light:#ffe033;
  --accent2:#4a2478;
  --text:#dde4f0;
  --muted:#9b87c0;
  --navy:#2a1045;
  --teal:#FFD400;
  --endorsed:#FFD400;
  --review:#d4830a;
  --dev:#2980b9;
  --deprecated:#4a5568;
  --risk-low:#2ecc71;--risk-medium:#f39c12;--risk-high:#e67e22;--risk-critical:#e74c3c;
  --status-draft:#6b7a9e;--status-submitted:#2980b9;--status-under-review:#d4830a;
  --status-approved:#FFD400;--status-rejected:#e74c3c;--status-deferred:#7c5cbf;--status-withdrawn:#4a5568;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
header{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);padding:0 1.2rem;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;height:50px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:.6rem;margin-right:1.5rem;flex-shrink:0}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;color:#1a0a2e}
header h1{font-size:.95rem;font-weight:700;letter-spacing:-.01em;white-space:nowrap}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.portal-badge{background:rgba(255,212,0,.15);color:var(--accent);border:1px solid rgba(255,212,0,.35);border-radius:5px;padding:.2rem .6rem;font-size:.72rem;font-weight:700;letter-spacing:.04em;cursor:pointer}
.top-search{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 11px;color:var(--text);font-size:.78rem;width:180px;outline:none}
.top-search:focus{border-color:var(--accent)}
.top-nav-items{display:flex;gap:0;align-items:stretch;height:50px;overflow-x:auto;flex:1;min-width:0}
.top-nav-item{background:none;border:none;color:var(--muted);padding:0 13px;height:50px;cursor:pointer;font-size:.78rem;font-weight:500;border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:color .12s;flex-shrink:0}
.top-nav-item:hover{color:var(--text)}
.top-nav-item.active{background:rgba(255,212,0,.08);color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}

/* KPI strip */
.kpi-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 24px;display:flex;gap:0;flex-shrink:0}
.kpi-strip-item{display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--border);padding:0 18px 0 0;margin-right:18px;flex:1;min-width:0}
.kpi-strip-item:last-child{border-right:none}
.kpi-strip-val{font-size:1.3rem;font-weight:900;line-height:1}
.kpi-strip-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi-strip-delta{font-size:.68rem;color:var(--muted)}

/* Filter panel (dashboard sidebar) */
.filter-panel{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:min-width .2s,width .2s}
.filter-panel.collapsed{width:42px;min-width:42px;overflow:hidden}
.filter-panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.filter-panel-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);white-space:nowrap}
.fp-collapse-btn{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 7px;color:var(--muted);font-size:.75rem;cursor:pointer;line-height:1;flex-shrink:0}
.filter-section{padding:7px 10px;border-bottom:1px solid var(--border)}
.filter-section-title{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
.filter-row{display:flex;align-items:center;justify-content:space-between;padding:3px 5px;border-radius:5px;margin-bottom:2px;cursor:pointer;gap:6px}
.filter-row:hover{background:var(--surface2)}
.filter-row.active{background:rgba(255,212,0,.08)}
.filter-row .fl{font-size:.72rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-row .fl.fa{color:var(--accent)}
.filter-row .fc{font-size:.65rem;opacity:.7;flex-shrink:0}
.filter-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pinned-btn{display:flex;width:100%;align-items:center;gap:6px;background:none;border:1px solid transparent;border-radius:6px;padding:4px 7px;color:var(--muted);font-size:.75rem;cursor:pointer;margin-bottom:2px;text-align:left;transition:background .12s}
.pinned-btn:hover{background:var(--surface2)}
.pinned-btn.active-pin{background:rgba(255,212,0,.08);border-color:rgba(255,212,0,.2);color:var(--accent)}
.pinned-badge{margin-left:auto;background:#e74c3c;color:#fff;border-radius:99px;padding:1px 5px;font-size:.55rem;font-weight:700}

/* Bento grid */
.bento-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.bento-span-2{grid-column:span 2}
.bento-span-3{grid-column:span 3}

.layout{display:flex;flex:1;overflow:hidden}
nav{width:225px;min-width:200px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:.6rem 0;flex-shrink:0}
.nav-logo-section{padding:.5rem 1rem .8rem;border-bottom:1px solid var(--border);margin-bottom:.4rem}
.nav-section{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.7rem 1rem .25rem;font-weight:700}
nav button{display:flex;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:.4rem 1rem;cursor:pointer;font-size:.81rem;transition:background .12s,color .12s;border-left:3px solid transparent;align-items:center;gap:.5rem;line-height:1.3}
nav button:hover{background:var(--surface2);color:var(--text)}
nav button.active{background:rgba(255,212,0,.1);border-left-color:var(--accent);color:var(--accent)}
nav button .ni{font-size:.65rem;color:var(--muted);font-family:monospace;margin-left:auto;background:var(--surface2);border-radius:4px;padding:.05rem .3rem}
nav button.active .ni{color:var(--accent)}
.divider{height:1px;background:var(--border);margin:.4rem .8rem}

body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
main{flex:1;overflow-y:auto;padding:1.4rem 1.8rem}
main.wiz-mode{padding:0;display:flex;flex-direction:column;overflow:hidden}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:.8rem;margin-bottom:1.4rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--accent-color,var(--accent))}
.stat-val{font-size:1.7rem;font-weight:800;line-height:1;color:var(--accent-color,var(--text))}
.stat-label{font-size:.68rem;color:var(--muted);margin-top:.28rem;text-transform:uppercase;letter-spacing:.05em}
.stat-sub{font-size:.7rem;color:var(--muted);margin-top:.1rem}

.page-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.page-title h2{font-size:1.15rem;font-weight:700}
.page-title .subtitle{font-size:.8rem;color:var(--muted);margin-top:.15rem}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;cursor:pointer;transition:border-color .18s,transform .12s,box-shadow .18s}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.card-id{font-size:.66rem;font-family:monospace;color:var(--muted)}
.card-name{font-size:.9rem;font-weight:600;margin:.3rem 0 .35rem;line-height:1.35}
.card-sub{font-size:.74rem;color:var(--muted)}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:.9rem}

.badge{display:inline-flex;align-items:center;font-size:.67rem;padding:.17rem .5rem;border-radius:999px;font-weight:700;white-space:nowrap}
.badge-endorsed,.badge-approved,.badge-published{background:rgba(255,212,0,.2);color:#c9a600;border:1px solid rgba(255,212,0,.4)}
.badge-review,.badge-under-review{background:rgba(212,131,10,.15);color:var(--review);border:1px solid rgba(212,131,10,.25)}
.badge-dev,.badge-submitted,.badge-in-development{background:rgba(41,128,185,.15);color:var(--dev);border:1px solid rgba(41,128,185,.25)}
.badge-draft,.badge-withdrawn,.badge-deprecated{background:rgba(74,85,104,.2);color:var(--muted);border:1px solid var(--border)}
.badge-rejected{background:rgba(231,76,60,.15);color:var(--risk-critical);border:1px solid rgba(231,76,60,.25)}
.badge-deferred{background:rgba(124,92,191,.15);color:#9b7ef0;border:1px solid rgba(124,92,191,.25)}
.badge-low{background:rgba(46,204,113,.15);color:var(--risk-low);border:1px solid rgba(46,204,113,.25)}
.badge-medium{background:rgba(243,156,18,.15);color:var(--risk-medium);border:1px solid rgba(243,156,18,.25)}
.badge-high{background:rgba(230,126,34,.15);color:var(--risk-high);border:1px solid rgba(230,126,34,.25)}
.badge-critical{background:rgba(231,76,60,.15);color:var(--risk-critical);border:1px solid rgba(231,76,60,.25)}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:.81rem}
th{text-align:left;padding:.5rem .85rem;background:var(--surface2);color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:.52rem .85rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,212,0,.04)}
tbody tr{cursor:pointer}

.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.42rem .9rem;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#1a0a2e}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-navy{background:var(--navy);color:#fff}
.btn-success{background:#155e3e;color:#fff}
.btn-danger{background:#5c1a1a;color:#fff}
.btn-warning{background:#5c3a0a;color:#fff}
.btn-sm{padding:.28rem .65rem;font-size:.74rem}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}

.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.73rem;font-weight:700;color:var(--muted);margin-bottom:.3rem;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.5rem .8rem;color:var(--text);font-size:.85rem;transition:border-color .15s}
.form-control:focus{outline:none;border-color:var(--accent)}
textarea.form-control{resize:vertical;min-height:85px}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.checkbox-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.35rem}
.checkbox-item{display:flex;align-items:center;gap:.45rem;padding:.38rem .55rem;background:var(--surface2);border-radius:6px;cursor:pointer;border:1px solid var(--border);font-size:.8rem;transition:border-color .15s}
.checkbox-item:hover{border-color:var(--accent)}
.checkbox-item input{accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.tag-input-wrap{display:flex;flex-wrap:wrap;gap:.35rem;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.38rem .55rem;min-height:40px;cursor:text}
.tag-input-wrap:focus-within{border-color:var(--accent)}
.tag{display:inline-flex;align-items:center;gap:.28rem;background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:.13rem .45rem;font-size:.75rem}
.tag-remove{cursor:pointer;color:var(--muted);line-height:1;font-size:.8rem}
.tag-remove:hover{color:var(--risk-critical)}
.tag-input{background:none;border:none;color:var(--text);font-size:.8rem;min-width:120px;outline:none;flex:1}

/* ── Guided Stepper Progress Track ────────────────────────────────────────── */
.wiz-track{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;flex-shrink:0}
.wiz-step{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;position:relative;border-bottom:2px solid transparent;cursor:pointer;transition:border-color .15s;overflow:visible}
.wiz-step.ws-active{border-bottom-color:var(--accent)}
.wiz-step.ws-done{border-bottom-color:rgba(46,204,113,.45)}
.wiz-circle{width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;color:var(--muted);margin-bottom:5px;position:relative;z-index:1}
.ws-active .wiz-circle{background:var(--accent);border-color:var(--accent);color:#1a0a2e}
.ws-done .wiz-circle{background:rgba(46,204,113,.15);border-color:rgba(46,204,113,.4);color:#2ecc71}
.wiz-label{font-size:.72rem;color:var(--muted);font-weight:500}
.ws-active .wiz-label{color:var(--text);font-weight:700}
.wiz-sublabel{font-size:.59rem;color:var(--muted);opacity:.7}
.wiz-connector{position:absolute;top:23px;left:calc(50% + 13px);right:calc(-50% + 13px);height:1px;background:var(--border)}
.ws-done .wiz-connector{background:rgba(46,204,113,.3)}
/* ── Wizard Layout ─────────────────────────────────────────────────────────── */
.wiz-body{display:flex;flex:1;overflow:hidden;min-height:0}
.wiz-form{flex:1;overflow-y:auto;padding:1.3rem 1.6rem}
.wiz-ai-sidebar{width:290px;border-left:1px solid var(--border);overflow-y:auto;padding:1.1rem 1rem;background:rgba(124,92,191,.04);flex-shrink:0}
.wiz-step-hdr{margin-bottom:1rem}
.wiz-step-title{font-size:1rem;font-weight:800;margin-bottom:.2rem}
.wiz-step-desc{font-size:.77rem;color:var(--muted);line-height:1.6}
.wiz-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.85rem}
.wiz-card-title{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.75rem}
.wiz-ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#a78bfa;margin-bottom:.65rem}
.wiz-ai-score-row{display:flex;gap:7px;margin-bottom:.75rem}
.wiz-ai-score-box{background:var(--surface2);border:1px solid rgba(255,212,0,.2);border-radius:7px;padding:5px 10px;text-align:center;flex:1}
.wiz-ai-score-val{font-size:1.2rem;font-weight:900;color:var(--accent);line-height:1}
.wiz-ai-score-lbl{font-size:.6rem;color:var(--muted)}
.wiz-suggestion{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 10px;display:flex;gap:7px;margin-bottom:6px}
.wiz-sug-tag{font-size:.58rem;font-weight:900;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.sug-must{background:rgba(231,76,60,.2);color:#e74c3c}
.sug-should{background:rgba(212,131,10,.2);color:#f0a830}
.sug-consider{background:rgba(41,128,185,.2);color:#5dade2}
.wiz-policy-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border);font-size:.72rem;color:var(--muted)}
/* Legacy compat */
.wizard-steps{display:flex;gap:0;margin-bottom:1.75rem;overflow:hidden;border-radius:8px;border:1px solid var(--border)}
.wizard-step{flex:1;padding:.5rem .4rem;text-align:center;font-size:.69rem;background:var(--surface2);color:var(--muted);border-right:1px solid var(--border);cursor:pointer;transition:background .15s;line-height:1.3}
.wizard-step:last-child{border-right:none}
.wizard-step.active{background:var(--navy);color:#fff;font-weight:700}
.wizard-step.done{background:rgba(255,212,0,.12);color:var(--accent)}
.wizard-step .step-num{display:block;font-size:.62rem;margin-bottom:.08rem;opacity:.7}
.wizard-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.2rem;padding-top:1rem;border-top:1px solid var(--border)}

.risk-gauge-wrap{display:flex;flex-direction:column;align-items:center;padding:1.2rem;background:var(--surface2);border-radius:12px;border:1px solid var(--border)}
.risk-circle{position:relative;width:120px;height:120px}
.risk-circle svg{transform:rotate(-90deg)}
.risk-circle-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.risk-score-num{font-size:1.9rem;font-weight:900;line-height:1}
.risk-score-max{font-size:.65rem;color:var(--muted)}
.risk-bars{display:flex;flex-direction:column;gap:.55rem;flex:1}
.risk-bar-row{display:flex;align-items:center;gap:.65rem}
.risk-bar-label{font-size:.72rem;color:var(--muted);width:135px;flex-shrink:0}
.risk-bar-track{flex:1;height:7px;background:var(--surface);border-radius:999px;overflow:hidden}
.risk-bar-fill{height:100%;border-radius:999px;transition:width .5s}
.risk-bar-val{font-size:.7rem;font-weight:700;width:38px;text-align:right;flex-shrink:0}
.risk-panel-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem}
.risk-panel-inner{display:flex;gap:1.2rem;align-items:flex-start}
.flags-list,.recs-list{list-style:none;display:flex;flex-direction:column;gap:.4rem;margin-top:.5rem}
.flags-list li{display:flex;gap:.45rem;font-size:.78rem;padding:.38rem .55rem;background:var(--surface2);border-radius:6px;border-left:3px solid var(--risk-high)}
.recs-list li{display:flex;gap:.45rem;font-size:.78rem;padding:.38rem .55rem;background:var(--surface2);border-radius:6px;border-left:3px solid var(--accent)}
.flags-list li::before{content:'⚠';flex-shrink:0;font-size:.8rem}
.recs-list li::before{content:'→';flex-shrink:0;color:var(--accent)}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:.9rem}
.section-card h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.kv-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.kv-item label{font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block}
.kv-item span{font-size:.84rem}
.detail-header{margin-bottom:1.3rem}
.detail-header h2{font-size:1.4rem;font-weight:700;line-height:1.3}
.detail-meta{color:var(--muted);font-size:.8rem;margin-top:.25rem}
.detail-badges{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.55rem}

.history-list{display:flex;flex-direction:column;gap:.5rem}
.history-item{display:flex;gap:.7rem;align-items:flex-start;padding:.45rem;border-radius:7px;background:var(--surface2)}
.history-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:.35rem}
.history-text{font-size:.78rem}
.history-time{font-size:.68rem;color:var(--muted)}
.comment-box{background:var(--surface2);border-radius:8px;padding:.8rem;margin-bottom:.5rem}
.comment-author{font-weight:700;font-size:.78rem}
.comment-role{color:var(--muted);font-size:.7rem}
.comment-time{color:var(--muted);font-size:.68rem}

/* Kanban board */
.kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;align-items:start}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.kanban-col-header{padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.kanban-col-endorsed .kanban-col-header{background:rgba(255,212,0,.15);color:var(--endorsed)}
.kanban-col-review .kanban-col-header{background:rgba(212,131,10,.15);color:var(--review)}
.kanban-col-dev .kanban-col-header{background:rgba(41,128,185,.15);color:var(--dev)}
.kanban-col-deprecated .kanban-col-header{background:rgba(74,85,104,.2);color:var(--muted)}
.kanban-col-body{padding:.6rem;display:flex;flex-direction:column;gap:.5rem;min-height:80px}
.kanban-card{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.65rem .75rem;cursor:pointer;transition:border-color .15s,transform .12s}
.kanban-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.kanban-card-id{font-size:.63rem;font-family:monospace;color:var(--muted)}
.kanban-card-name{font-size:.8rem;font-weight:600;margin:.2rem 0 .3rem;line-height:1.3}
.kanban-card-domain{font-size:.7rem;color:var(--muted)}
.kanban-count{background:rgba(255,255,255,.1);border-radius:4px;padding:.05rem .35rem;font-size:.72rem}

/* Solution designs */
.solution-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;cursor:pointer;transition:border-color .18s,transform .12s}
.solution-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.solution-pattern-chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
.pattern-chip{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.12rem .4rem;font-size:.67rem;font-family:monospace}

/* Pattern level badges */
.badge-conceptual{background:rgba(124,92,191,.18);color:#c084fc;border:1px solid rgba(124,92,191,.35)}
.badge-logical{background:rgba(41,128,185,.15);color:#60a5fa;border:1px solid rgba(41,128,185,.3)}
.badge-component{background:rgba(16,153,119,.15);color:#34d399;border:1px solid rgba(16,153,119,.3)}

/* Review pipeline */
.review-pipeline{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:1.2rem}
.review-stage{flex:1;padding:.5rem .4rem;text-align:center;font-size:.68rem;background:var(--surface2);color:var(--muted);border-right:1px solid var(--border);line-height:1.3}
.review-stage:last-child{border-right:none}
.review-stage.stage-active{background:var(--navy);color:#fff;font-weight:700}
.review-stage.stage-approved{background:rgba(46,204,113,.12);color:#2ecc71}
.review-stage.stage-rejected{background:rgba(231,76,60,.12);color:#e74c3c}
.review-stage.stage-needs-changes{background:rgba(212,131,10,.12);color:var(--review)}

/* Solution pipeline bar */
.sol-pipeline{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:1.2rem}
.sol-stage{flex:1;padding:.48rem .3rem;text-align:center;font-size:.63rem;background:var(--surface2);color:var(--muted);border-right:1px solid var(--border);line-height:1.3}
.sol-stage:last-child{border-right:none}
.sol-stage.sol-done{background:rgba(46,204,113,.1);color:#2ecc71}
.sol-stage.sol-active{background:var(--navy);color:#fff;font-weight:700}
.sol-stage.sol-rejected{background:rgba(231,76,60,.1);color:#e74c3c}

/* Pattern Alignment panel */
.align-row{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem .7rem;background:var(--surface2);border-radius:7px;margin-bottom:.4rem;border-left:3px solid var(--border)}
.align-row.align-Aligned{border-left-color:#2ecc71}
.align-row.align-Conditional{border-left-color:var(--review)}
.align-row.align-Deviation{border-left-color:var(--risk-critical)}
.align-row.align-Pending{border-left-color:var(--border)}
.align-pill{display:inline-flex;align-items:center;font-size:.63rem;font-weight:700;padding:.12rem .45rem;border-radius:4px;white-space:nowrap}
.align-Aligned{background:rgba(46,204,113,.15);color:#2ecc71}
.align-Conditional{background:rgba(212,131,10,.15);color:var(--review)}
.align-Deviation{background:rgba(231,76,60,.15);color:var(--risk-critical)}
.align-Pending{background:var(--surface2);color:var(--muted)}

/* Design iteration log */
.iter-item{display:flex;gap:.65rem;align-items:flex-start;padding:.52rem .7rem;border-radius:7px;background:var(--surface2);margin-bottom:.35rem;border-left:3px solid var(--accent)}
.iter-label{font-size:.75rem;font-weight:700;color:var(--accent)}
.iter-meta{font-size:.67rem;color:var(--muted);margin-top:.12rem}
.iter-summary{font-size:.78rem;margin-top:.1rem;line-height:1.5}

/* Solution output tabs */
.output-tab-bar{display:flex;gap:.12rem;margin-bottom:.8rem;border-bottom:1px solid var(--border)}
.output-tab{padding:.42rem .9rem;cursor:pointer;font-size:.8rem;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s}
.output-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.output-tab-panel{display:none}
.output-tab-panel.active{display:block}

/* Begin Solution Design button */
.begin-solution-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:7px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,rgba(255,212,0,.25),rgba(255,212,0,.12));color:var(--accent);border:1px solid rgba(255,212,0,.45);transition:all .15s}
.begin-solution-btn:hover{background:linear-gradient(135deg,rgba(255,212,0,.35),rgba(255,212,0,.18));transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,212,0,.15)}
.review-artifact{background:var(--surface2);border-radius:8px;padding:.75rem .9rem;margin-bottom:.55rem;border-left:3px solid var(--border)}
.review-artifact.art-approved{border-left-color:#2ecc71}
.review-artifact.art-rejected{border-left-color:#e74c3c}
.review-artifact.art-needs-changes{border-left-color:var(--review)}
.review-artifact-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem}
.review-artifact-stage{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.review-artifact-reviewer{font-size:.8rem;font-weight:600}
.review-artifact-date{font-size:.67rem;color:var(--muted)}
.review-artifact-comment{font-size:.8rem;line-height:1.55;margin-top:.3rem}

/* Solution search/filter bar */
.filter-bar{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.9rem;align-items:center}
.filter-select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.38rem .7rem;color:var(--text);font-size:.8rem;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--accent)}
.badge-in-review{background:rgba(41,128,185,.15);color:#60a5fa;border:1px solid rgba(41,128,185,.3)}
.badge-needs-changes{background:rgba(212,131,10,.15);color:var(--review);border:1px solid rgba(212,131,10,.25)}

/* KPI charts */
.kpi-bar-chart{display:flex;flex-direction:column;gap:.5rem}
.kpi-bar-row{display:flex;align-items:center;gap:.7rem}
.kpi-bar-label{font-size:.75rem;color:var(--muted);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-bar-track{flex:1;height:10px;background:var(--surface2);border-radius:999px;overflow:hidden}
.kpi-bar-fill{height:100%;border-radius:999px}
.kpi-bar-val{font-size:.72rem;font-weight:700;width:30px;text-align:right;flex-shrink:0}
.activity-feed{display:flex;flex-direction:column;gap:.4rem}
.activity-item{display:flex;gap:.65rem;align-items:flex-start;padding:.4rem;border-radius:6px;background:var(--surface2);font-size:.77rem}
.activity-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:.35rem}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.1rem 1.4rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:.95rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.3rem 1.4rem}
.modal-footer{padding:.9rem 1.4rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}

/* Alert */
.alert{padding:.7rem .9rem;border-radius:8px;font-size:.8rem;margin-bottom:.9rem;display:flex;gap:.45rem;align-items:flex-start}
.alert-warning{background:rgba(212,131,10,.1);border:1px solid rgba(212,131,10,.25);color:var(--review)}
.alert-info{background:rgba(41,128,185,.1);border:1px solid rgba(41,128,185,.25);color:var(--dev)}
.alert-success{background:rgba(255,212,0,.1);border:1px solid rgba(255,212,0,.25);color:#c9a600}
.alert-danger{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);color:var(--risk-critical)}

/* Team portal */
.portal-header{background:url('mccain-bg.png') center/cover no-repeat;border-radius:12px;padding:2rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.portal-header::before{content:'';position:absolute;inset:0;background:rgba(26,10,46,.75);border-radius:12px;z-index:0}
.portal-header>*{position:relative;z-index:1}
.portal-header::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:rgba(255,212,0,.08);border-radius:50%;z-index:0}
.portal-header h2{font-size:1.4rem;font-weight:800;margin-bottom:.4rem}
.portal-header p{color:rgba(255,255,255,.65);font-size:.85rem;max-width:550px;line-height:1.6}

/* misc utils */
.search-bar{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.48rem .8rem;color:var(--text);font-size:.83rem;width:100%;margin-bottom:.9rem}
.search-bar:focus{outline:none;border-color:var(--accent)}
.tabs{display:flex;gap:.15rem;margin-bottom:.9rem;border-bottom:1px solid var(--border)}
.tab{padding:.42rem .9rem;cursor:pointer;font-size:.8rem;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.88rem}
.back-btn{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.8rem;margin-bottom:.9rem;display:flex;align-items:center;gap:.3rem;padding:0}
.back-btn:hover{text-decoration:underline}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:1.4rem;align-items:start}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.9rem}
.flex{display:flex}.gap-1{gap:.3rem}.gap-2{gap:.55rem}.gap-3{gap:.8rem}
.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}
.mt-1{margin-top:.35rem}.mt-2{margin-top:.7rem}.mt-3{margin-top:1.1rem}
.text-muted{color:var(--muted)}.text-sm{font-size:.78rem}.text-xs{font-size:.7rem}.font-mono{font-family:monospace}.font-bold{font-weight:700}
.tag-list{display:flex;flex-wrap:wrap;gap:.28rem}
.svg-container{background:#ffffff;border:1px solid #d0d7de;border-radius:8px;padding:.9rem;overflow:auto;max-height:440px}
.svg-container img{max-width:100%}
ul.arrow-list{list-style:none;display:flex;flex-direction:column;gap:.28rem}
ul.arrow-list li{padding:.3rem 0;font-size:.82rem;border-bottom:1px solid var(--border);display:flex;gap:.45rem}
ul.arrow-list li::before{content:'→';color:var(--accent);flex-shrink:0}
.guardrails-table{width:100%;border-collapse:collapse;font-size:.8rem}
.guardrails-table th{text-align:left;padding:.42rem .65rem;background:var(--surface2);color:var(--muted);font-size:.68rem;text-transform:uppercase}
.guardrails-table td{padding:.42rem .65rem;border-bottom:1px solid var(--border)}
.sev-required{color:var(--risk-critical);font-weight:700}
.sev-recommended{color:var(--review);font-weight:600}
.sev-optional{color:var(--dev)}
.use-cases-grid{display:grid;grid-template-columns:1fr 1fr;gap:.65rem}
.use-case-box{background:var(--surface2);border-radius:8px;padding:.75rem;font-size:.8rem;line-height:1.5}
.use-case-box.use{border-left:3px solid var(--endorsed)}
.use-case-box.dont{border-left:3px solid var(--risk-critical)}
.use-case-box strong{font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.22rem;color:var(--muted)}
@media(max-width:1000px){.kanban-board{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}.three-col{grid-template-columns:1fr 1fr}}
@media(max-width:700px){nav{display:none}.form-row,.form-row-3{grid-template-columns:1fr}}

/* AI Review Panel */
.ai-panel{background:var(--surface);border:1px solid rgba(124,92,191,.4);border-radius:12px;padding:1.1rem;margin-bottom:.9rem;position:relative;overflow:hidden}
.ai-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c5cbf,#a78bfa,#6366f1)}
.ai-panel h3{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#a78bfa;margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.ai-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.78rem;font-weight:700;padding:.25rem .7rem;border-radius:6px;border:1px solid}
.ai-badge-approved{background:rgba(46,204,113,.12);color:#2ecc71;border-color:rgba(46,204,113,.3)}
.ai-badge-conditions{background:rgba(212,131,10,.12);color:#f0a830;border-color:rgba(212,131,10,.3)}
.ai-badge-rework{background:rgba(230,126,34,.12);color:#e67e22;border-color:rgba(230,126,34,.3)}
.ai-badge-major{background:rgba(231,76,60,.12);color:#e74c3c;border-color:rgba(231,76,60,.3)}
.ai-score-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.4rem}
.ai-score-label{font-size:.72rem;color:var(--muted);width:130px;flex-shrink:0}
.ai-score-track{flex:1;height:6px;background:var(--surface2);border-radius:999px;overflow:hidden}
.ai-score-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#7c5cbf,#a78bfa)}
.ai-score-val{font-size:.7rem;font-weight:700;color:#a78bfa;width:32px;text-align:right;flex-shrink:0}
.ai-risk-row{display:flex;justify-content:space-between;align-items:flex-start;padding:.48rem .6rem;background:var(--surface2);border-radius:6px;margin-bottom:.35rem;gap:.5rem}
.ai-risk-title{font-size:.8rem;font-weight:600;flex:1}
.ai-risk-detail{font-size:.74rem;color:var(--muted);margin-top:.15rem;line-height:1.45}
.ai-risk-mit{font-size:.72rem;color:var(--accent-light);margin-top:.2rem}
.ai-rec-row{display:flex;gap:.55rem;align-items:flex-start;padding:.42rem .55rem;background:var(--surface2);border-radius:6px;margin-bottom:.35rem}
.ai-rec-priority{font-size:.62rem;font-weight:900;padding:.1rem .42rem;border-radius:4px;flex-shrink:0;white-space:nowrap;margin-top:.08rem}
.ai-priority-must{background:rgba(231,76,60,.2);color:#e74c3c}
.ai-priority-should{background:rgba(212,131,10,.2);color:#f0a830}
.ai-priority-consider{background:rgba(41,128,185,.2);color:#5dade2}
.ai-rec-text{font-size:.8rem;line-height:1.45}
.ai-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-generating{display:flex;align-items:center;gap:.6rem;color:#a78bfa;font-size:.82rem;padding:1rem;background:var(--surface2);border-radius:8px}
.ai-sev-Critical{color:var(--risk-critical)}
.ai-sev-High{color:var(--risk-high)}
.ai-sev-Medium{color:var(--review)}
.ai-sev-Low{color:var(--risk-low)}
.quick-ai-box{background:rgba(124,92,191,.08);border:1px solid rgba(124,92,191,.25);border-radius:10px;padding:.9rem 1rem;margin-bottom:1rem}
.quick-ai-box .qa-rating{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a78bfa;margin-bottom:.4rem}
.quick-ai-box .qa-headline{font-size:.9rem;font-weight:600;margin-bottom:.5rem}
.quick-ai-box .qa-fix{font-size:.78rem;color:var(--accent-light);padding:.4rem .6rem;background:rgba(255,212,0,.08);border-radius:6px;border-left:2px solid var(--accent)}
/* ─── Document Upload Panel ─── */
.doc-upload-panel{background:var(--surface);border:1px solid rgba(255,212,0,.3);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden}
.doc-upload-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light),#60a5fa)}
.doc-upload-panel h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent-light);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:2rem 1.5rem;text-align:center;cursor:pointer;transition:border-color .18s,background .18s;background:var(--surface2)}
.drop-zone.dragover{border-color:var(--accent);background:rgba(255,212,0,.08)}
.drop-zone-icon{font-size:1.8rem;margin-bottom:.5rem}
.drop-zone-label{font-size:.85rem;font-weight:600;margin-bottom:.25rem}
.drop-zone-hint{font-size:.72rem;color:var(--muted);line-height:1.5}
.doc-file-list{display:flex;flex-direction:column;gap:.35rem;margin-top:.8rem}
.doc-file-item{display:flex;align-items:center;gap:.55rem;padding:.35rem .6rem;background:var(--surface2);border-radius:6px;font-size:.78rem}
.doc-file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-file-size{color:var(--muted);font-size:.7rem;flex-shrink:0}
.doc-file-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;line-height:1;padding:0 .15rem;flex-shrink:0}
.doc-file-remove:hover{color:var(--risk-critical)}
.doc-parse-progress{display:flex;align-items:center;gap:.6rem;color:var(--accent-light);font-size:.82rem;padding:.8rem;background:rgba(255,212,0,.06);border-radius:8px;margin-top:.8rem}
.doc-parse-spin{width:16px;height:16px;border:2px solid rgba(255,212,0,.3);border-top-color:var(--accent-light);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
.doc-prefill-banner{display:flex;align-items:flex-start;gap:.6rem;padding:.7rem .9rem;border-radius:8px;background:rgba(255,212,0,.1);border:1px solid rgba(255,212,0,.25);color:var(--accent-light);font-size:.8rem;margin-top:.8rem}
.doc-prefill-banner-close{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.85rem;margin-left:auto;padding:0;line-height:1;flex-shrink:0}
.doc-error-banner{display:flex;align-items:flex-start;gap:.6rem;padding:.7rem .9rem;border-radius:8px;background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.25);color:var(--risk-critical);font-size:.8rem;margin-top:.8rem}

/* ─── Risk Deep-Dive Tabs ─── */
.risk-tabs{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--border);margin-top:.8rem}
.risk-tab{padding:.45rem 1.05rem;cursor:pointer;font-size:.79rem;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;font-weight:600}
.risk-tab:hover{color:var(--text)}
.risk-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.risk-tab-panel{display:none}.risk-tab-panel.active{display:block}
.risk-deepdive-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:.9rem}
.sca-summary-bar{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:.9rem;padding:.7rem .9rem;background:var(--surface2);border-radius:8px;border-left:3px solid var(--accent)}
.sca-summary-stat{display:flex;flex-direction:column;align-items:center;min-width:60px}
.sca-summary-stat-val{font-size:1.3rem;font-weight:800;line-height:1}
.sca-summary-stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:.15rem;text-align:center}
.tech-table{width:100%;border-collapse:collapse;font-size:.8rem}
.tech-table th{text-align:left;padding:.45rem .7rem;background:var(--surface2);color:var(--muted);font-size:.67rem;text-transform:uppercase;letter-spacing:.06em}
.tech-table td{padding:.45rem .7rem;border-bottom:1px solid var(--border)}
.tech-table tr:last-child td{border-bottom:none}
.cve-link{color:var(--accent-light);text-decoration:none;font-family:monospace;font-size:.72rem}
.cve-link:hover{text-decoration:underline}
.mitre-tactic{background:var(--surface2);border-radius:8px;padding:.75rem .9rem;margin-bottom:.7rem;border-left:3px solid var(--navy)}
.mitre-tactic-header{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-bottom:.55rem;display:flex;align-items:center;gap:.45rem}
.mitre-technique{display:flex;flex-direction:column;gap:.2rem;padding:.55rem .65rem;background:var(--surface);border-radius:6px;margin-bottom:.4rem;border:1px solid var(--border)}
.mitre-technique:last-child{margin-bottom:0}
.mitre-technique-id{font-family:monospace;font-size:.68rem;color:var(--muted);margin-right:.3rem}
.mitre-technique-name{font-size:.8rem;font-weight:600}
.mitre-technique-reason{font-size:.75rem;color:var(--muted);line-height:1.45;margin-top:.15rem}
.mitre-technique-mit{font-size:.72rem;color:var(--accent-light);margin-top:.12rem;line-height:1.4}
.mitre-link{color:var(--accent-light);text-decoration:none;font-size:.68rem;font-family:monospace}
.mitre-link:hover{text-decoration:underline}
.vendor-risk-row{background:var(--surface2);border-radius:8px;padding:.75rem .9rem;margin-bottom:.65rem;border:1px solid var(--border)}

.cert-expiring{background:rgba(212,131,10,.12);color:var(--review);border-color:rgba(212,131,10,.3)}

.ssl-a{background:rgba(46,204,113,.15);color:#27ae60}

.loading-pulse{display:flex;align-items:center;gap:.6rem;color:var(--muted);font-size:.82rem;padding:.8rem;background:var(--surface2);border-radius:8px;margin-bottom:.5rem}
.loading-spin{width:16px;height:16px;border:2px solid rgba(16,153,119,.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ─── Architecture Diagram Panel ─── */

.diagram-panel h3{font-size:.78rem;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem;display:flex;align-items:center;gap:.4rem}
.diagram-canvas{background:#ffffff;border-radius:8px;padding:.8rem;overflow-x:auto;min-height:80px;display:flex;align-items:center;justify-content:center;border:1px solid #d0d7de}

.diagram-legend{font-size:.75rem;color:var(--muted);margin-top:.6rem;line-height:1.55;padding:.45rem .6rem;background:rgba(96,165,250,.06);border-radius:6px;border-left:2px solid rgba(96,165,250,.35)}
.diagram-generating{display:flex;align-items:center;gap:.7rem;color:var(--muted);font-size:.82rem;padding:.8rem;justify-content:center}
.diagram-spin{width:18px;height:18px;border:2px solid rgba(96,165,250,.3);border-top-color:#60a5fa;border-radius:50%;animation:spin .9s linear infinite;flex-shrink:0}

/* ─── Jira Epics Panel ─── */
.jira-epic-btn{background:rgba(38,132,255,.15);color:#4c9aff;border:1px solid rgba(38,132,255,.35)}
.jira-epic-btn:hover{background:rgba(38,132,255,.25)}

.jira-panel{background:var(--surface);border:1px solid rgba(38,132,255,.35);border-radius:12px;margin-bottom:.9rem;overflow:hidden;position:relative}

.jira-panel-header{padding:.9rem 1.1rem;border-bottom:1px solid rgba(38,132,255,.2);display:flex;justify-content:space-between;align-items:center;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#4c9aff}

.jira-epic-chevron{color:var(--muted);font-size:.65rem;flex-shrink:0;transition:transform .15s}
.jira-epic-key{font-family:monospace;font-size:.68rem;color:#4c9aff;flex-shrink:0;background:rgba(38,132,255,.1);border-radius:3px;padding:.08rem .35rem}
.jira-epic-title{font-size:.83rem;font-weight:600}

/* ─── Vendor Intel Panel ─── */
.vi-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.3rem 1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden}
.vi-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f6821f,#fbad41,#f6821f)}
.vi-panel h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#fbad41;margin-bottom:.8rem;display:flex;align-items:center;gap:.4rem}
.vi-search-row{display:flex;gap:.7rem;align-items:center;margin-bottom:1.1rem;flex-wrap:wrap}
.vi-search-input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.52rem .85rem;color:var(--text);font-size:.85rem;transition:border-color .15s}

.vi-scan-btn{background:rgba(246,130,31,.2);color:#fbad41;border:1px solid rgba(246,130,31,.4);border-radius:7px;padding:.5rem 1.1rem;font-size:.82rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}

.vi-scorecard{background:var(--surface2);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:1rem}
.vi-scorecard-header{display:flex;align-items:center;gap:1rem;padding:1.1rem 1.3rem;flex-wrap:wrap}
.vi-grade-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:2rem;font-weight:900;line-height:1;border:3px solid}
.vi-grade-A{background:rgba(46,204,113,.12);color:#27ae60;border-color:rgba(46,204,113,.4)}
.vi-grade-B{background:rgba(243,156,18,.12);color:var(--risk-medium);border-color:rgba(243,156,18,.4)}

.vi-scorecard-meta{flex:1}

.vi-sections{display:flex;flex-direction:column;gap:0}

.vi-section-header{display:flex;align-items:center;justify-content:space-between;padding:.72rem 1.1rem;cursor:pointer;transition:background .12s;user-select:none}

.vi-section-title{display:flex;align-items:center;gap:.55rem;font-size:.8rem;font-weight:700}
.vi-section-icon{font-size:.9rem}

.vi-kv{display:grid;grid-template-columns:1fr 1fr;gap:.4rem .7rem;margin-bottom:.5rem}

.vi-header-list{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem}

.vi-tech-list{display:flex;flex-wrap:wrap;gap:.28rem;margin-top:.45rem}
.vi-tech-chip{background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:.1rem .4rem;font-size:.7rem;font-family:monospace}
.vi-cached-notice{font-size:.67rem;color:var(--muted);margin-top:.3rem;text-align:right}

/* IaC Panel */
.iac-panel{background:var(--surface);border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:1.1rem;margin-bottom:.9rem;position:relative;overflow:hidden}

.iac-file-tab{padding:.25rem .6rem;font-size:.71rem;font-family:monospace;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .15s}

.iac-spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(74,222,128,.3);border-top-color:#4ade80;border-radius:50%;animation:spin .7s linear infinite}
.iac-generating{display:flex;align-items:center;gap:.6rem;color:#4ade80;font-size:.82rem;padding:1rem;background:var(--surface2);border-radius:8px}
</style>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

<body>
<header>
  <div class="logo">
    <div class="logo-mark">EA</div>
    <h1>McCain EA Platform</h1>
  </div>
  <nav class="top-nav-items" id="top-nav"></nav>
  <div class="header-right">
    <input class="top-search" id="top-search" placeholder="⌘ Search requests…" oninput="handleTopSearch(this.value)"/>
    <button class="portal-badge" onclick="showTeamPortal()">AI PORTAL</button>
    <button class="btn btn-sm btn-ghost" onclick="showGitHubSync()">⇅ GitHub</button>
  </div>
</header>
<div id="kpi-strip" class="kpi-strip" style="display:none"></div>
<div class="layout">
  <nav id="sidebar"></nav>
  <main id="main"></main>
</div>

<!-- Review Modal -->
<div id="reviewModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3 id="reviewModalTitle">Review Action</h3><button class="modal-close" onclick="closeModal('reviewModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Reviewer Name</label><input class="form-control" id="reviewerName" placeholder="Your name"/></div>
      <div class="form-group"><label>Review Notes</label><textarea class="form-control" id="reviewerNotes" placeholder="Rationale, conditions, or required remediations..." style="min-height:90px"></textarea></div>
      <div id="approvedPatternGroup" class="form-group" style="display:none"><label>Linked Pattern ID (optional)</label><input class="form-control" id="approvedPatternId" placeholder="e.g. AP-001"/></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('reviewModal')">Cancel</button><button class="btn btn-primary" onclick="submitReview()">Submit</button></div>
  </div>
</div>

<!-- Comment Modal -->
<div id="commentModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3>Add Comment</h3><button class="modal-close" onclick="closeModal('commentModal')">✕</button></div>
    <div class="modal-body">
      <div class="form-group"><label>Name</label><input class="form-control" id="commentAuthor" placeholder="Your name"/></div>
      <div class="form-group"><label>Role</label><input class="form-control" id="commentRole" placeholder="e.g. Architecture Reviewer"/></div>
      <div class="form-group"><label>Comment</label><textarea class="form-control" id="commentText" placeholder="Your comment..." style="min-height:90px"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('commentModal')">Cancel</button><button class="btn btn-primary" onclick="submitComment()">Post</button></div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><h3>Confirm Delete</h3><button class="modal-close" onclick="closeModal('deleteModal')">✕</button></div>
    <div class="modal-body"><p class="text-sm">Are you sure you want to delete <strong id="deleteTarget"></strong>? This cannot be undone.</p></div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal('deleteModal')">Cancel</button><button class="btn btn-danger" id="deleteConfirmBtn">Delete</button></div>
  </div>
</div>

<!-- Jira Push Modal -->
<div id="jiraPushModal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 style="display:flex;align-items:center;gap:.5rem">⬡ Push Epics to Jira</h3>
      <button class="modal-close" onclick="closeModal('jiraPushModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:1rem">Enter your Jira connection details. An API token can be generated at <strong>id.atlassian.net/manage-profile/security/api-tokens</strong>.</div>
      <div class="form-group"><label>Jira Base URL</label><input class="form-control" id="jira_base_url" placeholder="https://yourcompany.atlassian.net"/></div>
      <div class="form-group"><label>Project Key</label><input class="form-control" id="jira_project_key" placeholder="e.g. PROJ" style="text-transform:uppercase"/></div>
      <div class="form-group"><label>Your Email (Jira account)</label><input class="form-control" id="jira_user_email" type="email" placeholder="you@company.com"/></div>
      <div class="form-group"><label>API Token</label><input class="form-control" id="jira_api_token" type="password" placeholder="Your Jira API token"/></div>
      <div id="jira-push-status"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('jiraPushModal')">Cancel</button>
      <button class="btn jira-push-btn" id="jira-push-btn" onclick="submitJiraPush()">↑ Push to Jira</button>
    </div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  view:'dashboard', patterns:[], vendors:[], intakes:[], intakeStats:null, solutions:[],
  opSupport:[], opSupportStats:null, currentOpSupport:null,
  currentIntake:null, currentPattern:null, currentSolution:null,
  wizardStep:1, wizardData:{}, wizardRisk:null,
  reviewAction:null, reviewIntakeId:null, commentIntakeId:null,
  tabFilter:'All', searchQ:'', deleteCallback:null,
  _opsLicenses:[], _opsRunbooks:[], _opsDashboards:[], _opsEscalations:[],
  _filterCollapsed:false,
};

// ─── API ─────────────────────────────────────────────────────────────────────
const api = {
  get: url => fetch(url).then(r=>r.ok?r.json():r.json().then(e=>{throw e})),
  post: (url,b) => fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.ok?r.json():r.json().then(e=>{throw e})),
  patch: (url,b) => fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.ok?r.json():r.json().then(e=>{throw e})),
  put: (url,b) => fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.ok?r.json():r.json().then(e=>{throw e})),
  del: url => fetch(url,{method:'DELETE'}).then(r=>r.ok?r.json():r.json().then(e=>{throw e})),
};

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  setMain('<p class="text-muted" style="padding:2rem">Loading...</p>');
  [S.patterns, S.vendors] = await Promise.all([api.get('/api/patterns'), api.get('/api/vendors')]);
  S.patterns.sort((a,b)=>(a.patternId||'').localeCompare(b.patternId||''));
  await Promise.all([loadIntakes(), loadSolutions(), loadOpSupport()]);
  renderSidebar();
  showDashboard();
}

async function loadIntakes() {
  try { [S.intakes, S.intakeStats] = await Promise.all([api.get('/api/intake'), api.get('/api/intake/stats')]); }
  catch { S.intakes=[]; S.intakeStats=null; }
}
async function loadSolutions() {
  try { S.solutions = await api.get('/api/solutions'); } catch { S.solutions=[]; }
}
async function loadOpSupport() {
  try { [S.opSupport, S.opSupportStats] = await Promise.all([api.get('/api/operational-support'), api.get('/api/operational-support/stats')]); }
  catch { S.opSupport=[]; S.opSupportStats=null; }
}

function setMain(h){ const m=document.getElementById('main'); m.className=''; m.innerHTML=h; }

// ─── Top Nav ──────────────────────────────────────────────────────────────────
function renderTopNav() {
  const v=S.view;
  const pending=(S.intakes||[]).filter(i=>['Submitted','Under Review'].includes(i.status)).length;
  const navItems=[
    {icon:'◈',label:'Dashboard',view:'dashboard',fn:'showDashboard()'},
    {icon:'⊕',label:'Submit Request',view:'new-intake',fn:'startNewIntake()'},
    {icon:'◉',label:'Pattern Library',view:'kanban',fn:'showKanban()'},
    {icon:'⊗',label:'Risk Engine',view:'vendor-intel',fn:'showVendorIntel()'},
    {icon:'▦',label:`Review Queue${pending?` <span style="background:#e74c3c;color:#fff;border-radius:99px;padding:1px 5px;font-size:.55rem;font-weight:700;margin-left:3px">${pending}</span>`:''}`,view:'review-queue',fn:'showReviewQueue()'},
    {icon:'≡',label:'Solutions',view:'solutions-list',fn:'showSolutionsList()'},
    {icon:'⊞',label:'Vendors',view:'vendors',fn:'showVendors()'},
    {icon:'⬡',label:'Team Portal',view:'team-portal',fn:'showTeamPortal()'},
  ];
  const topNav=document.getElementById('top-nav');
  if(!topNav) return;
  topNav.innerHTML=navItems.map(n=>`<button class="top-nav-item${v===n.view?' active':''}" onclick="${n.fn}">${n.icon} ${n.label}</button>`).join('');
}

// ─── Sidebar ─────────────────────────────────────────────────────────────────
function renderSidebar() {
  const v=S.view;
  renderTopNav();

  // On dashboard → show collapsible filter panel + KPI strip
  if(v==='dashboard'){
    const sidebar=document.getElementById('sidebar');
    if(sidebar){
      sidebar.className='filter-panel';
      if(S._filterCollapsed) sidebar.classList.add('collapsed');
    }
    renderFilterPanel();
    return;
  }

  // On other views → hide KPI strip, restore standard nav
  const strip=document.getElementById('kpi-strip');

function renderFilterPanel() {
  const sidebar=document.getElementById('sidebar');
  if(!sidebar) return;
  const domains=[...new Set(S.patterns.map(p=>p.domain))].sort();
  const domainCounts={}; domains.forEach(d=>domainCounts[d]=S.patterns.filter(p=>p.domain===d).length);
  const byStat={}; ((S.intakeStats||{}).byStatus||[]).forEach(r=>byStat[r.status]=+r.n);
  const pending=(S.intakes||[]).filter(i=>['Submitted','Under Review'].includes(i.status)).length;
  const overdue=(S.intakes||[]).filter(i=>{
    if(!['Submitted','Under Review'].includes(i.status)) return false;
    const d=new Date(i.created_at); return (Date.now()-d.getTime())>7*86400000;
  }).length;
  const totalIntakes=S.intakes.length;

  const collapsed=S._filterCollapsed;
  sidebar.innerHTML=`
    <div class="filter-panel-hdr">
      ${!collapsed?`<span class="filter-panel-title">Quick Filters</span>`:''}
      <button class="fp-collapse-btn" onclick="toggleFilterPanel()" title="${collapsed?'Expand':'Collapse'}">${collapsed?'›':'‹'}</button>
    </div>
    ${collapsed?'':`
    <div class="filter-section">
      <div class="filter-section-title">Pinned Views</div>
      <button class="pinned-btn active-pin" onclick="showDashboard()">★ My Dashboard</button>
      <button class="pinned-btn" onclick="showReviewQueue()" style="${pending?'color:var(--review)':''}">▦ Review Queue${pending?` <span class="pinned-badge">${pending}</span>`:''}</button>
      <button class="pinned-btn" onclick="showIntakeList({status:'Under Review'})" style="${overdue?'color:var(--risk-high)':''}">⏱ Overdue Items${overdue?` <span class="pinned-badge">${overdue}</span>`:''}</button>
      <button class="pinned-btn" onclick="showIntakeList({status:'Approved'})">✓ Approved This Month</button>
    </div>
    <div class="filter-section">
      <div class="filter-section-title">Filter by Domain</div>
      <div class="filter-row active" onclick="showDashboard()">
        <span class="fl fa">All Domains</span><span class="fc">${totalIntakes}</span>
      </div>
      ${domains.map(d=>`<div class="filter-row" onclick="showIntakeList({domain:'${d.replace(/'/g,"\\'")}'})" title="${d}">
        <span class="fl">${d}</span><span class="fc">${domainCounts[d]}</span>
      </div>`).join('')}
    </div>
    <div class="filter-section">
      <div class="filter-section-title">Filter by Status</div>
      ${[{l:'Endorsed',c:'#FFD400',s:'Approved'},{l:'Under Review',c:'#d4830a',s:'Under Review'},{l:'Submitted',c:'#2980b9',s:'Submitted'},{l:'Draft',c:'var(--muted)',s:'Draft'}].map(f=>`
      <div class="filter-row" onclick="showIntakeList({status:'${f.s}'})" >
        <div class="filter-dot" style="background:${f.c}"></div>
        <span class="fl">${f.l}</span><span class="fc">${byStat[f.s]||0}</span>
      </div>`).join('')}
    </div>`}
  `;
}

function toggleFilterPanel(){
  S._filterCollapsed=!S._filterCollapsed;
  const sidebar=document.getElementById('sidebar');
  if(sidebar){ sidebar.classList.toggle('collapsed',S._filterCollapsed); }
  renderFilterPanel();
}

function handleTopSearch(q){
  if(!q.trim()) return;
  showIntakeList({search:q});
}

// ─── Executive Dashboard ─────────────────────────────────────────────────────
async function showDashboard() {
  S.view='dashboard'; renderSidebar();
  await Promise.all([loadIntakes(), loadSolutions()]);
  const st=S.intakeStats||{};
  const byStat={}; (st.byStatus||[]).forEach(r=>byStat[r.status]=+r.n);
  const byTier={}; (st.byTier||[]).forEach(r=>byTier[r.risk_tier]=+r.n);
  const endorsed=S.patterns.filter(p=>p.status==='Endorsed').length;
  const pct=S.patterns.length?Math.round(endorsed/S.patterns.length*100):0;
  const criticalVendors=S.vendors.filter(v=>v.criticality==='Critical').length;
  const pending=(byStat['Submitted']||0)+(byStat['Under Review']||0);
  const avgRisk=S.intakes.filter(i=>i.risk_score).reduce((s,i,_,a)=>s+i.risk_score/a.filter(x=>x.risk_score).length,0);
  const todayApproved=S.intakes.filter(i=>i.status==='Approved'&&i.reviewed_at&&new Date(i.reviewed_at).toDateString()===new Date().toDateString()).length;

  // KPI strip
  const kpis=[
    {val:S.intakes.length,label:'Total Requests',delta:`+${S.intakes.filter(i=>{const d=new Date(i.created_at);return (Date.now()-d)< 7*86400000}).length} this week`,color:'var(--text)'},
    {val:endorsed,label:'Endorsed',delta:`${pct}% of patterns`,color:'var(--endorsed)'},
    {val:pending,label:'Under Review',delta:`${S.intakes.filter(i=>i.status==='Under Review'&&i.created_at&&(Date.now()-new Date(i.created_at))>7*86400000).length} pending >7d`,color:'var(--review)'},
    {val:avgRisk?Math.round(avgRisk):'-',label:'Avg Risk Score',delta:'scored submissions',color:'var(--risk-high)'},
    {val:S.vendors.length,label:'Vendors Active',delta:`${criticalVendors} critical`,color:'var(--dev)'},

  }

  // Bento grid
  const domains=[...new Set(S.patterns.map(p=>p.domain))].sort();

  const maxDomain=Math.max(...Object.values(domainCounts),1);
  const recent=st.recent||[];
  const topPatterns=S.patterns.filter(p=>p.status==='Endorsed').slice(0,4);

  // Bento widget: Intake by Domain (span 2)

  });
  intakeDomainHtml+=`</div></div>`;

  // Bento widget: Recent Activity (span 1)
  const recentActivity=S.intakes.slice().sort((a,b)=>new Date(b.updated_at||b.created_at)-new Date(a.updated_at||a.created_at)).slice(0,5);
  const actColor={Approved:'var(--endorsed)',Rejected:'var(--risk-critical)','Under Review':'var(--review)',Submitted:'var(--dev)',Draft:'var(--muted)'};

      <span style="flex:1;font-size:.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
      <span style="font-size:.65rem;padding:2px 6px;border-radius:999px;background:rgba(255,212,0,.15);color:var(--accent)">${p.status}</span>
    </div>`;
  });
  if(!topPatterns.length) patHtml+=`<p class="text-sm text-muted">No endorsed patterns yet.</p>`;
  patHtml+=`</div></div>`;

  // Bento widget: AI Review Queue / Recent Intake Requests (span 2)
  let queueHtml=`<div class="section-card bento-span-2"><h3>Intake Review Queue <button class="btn btn-sm btn-primary" style="margin-left:.6rem;font-size:.68rem;padding:.18rem .6rem" onclick="startNewIntake()">＋ New Request</button></h3>`;
  const queueIntakes=S.intakes.filter(i=>['Submitted','Under Review'].includes(i.status)).slice(0,5);
  if(!queueIntakes.length){
    queueHtml+=`<p class="text-sm text-muted">No pending requests.</p>`;
  } else {
    queueHtml+=`<div class="table-wrap"><table><thead><tr><th>Reference</th><th>Title</th><th>Submitter</th><th>Risk</th><th>Status</th><th>Days Open</th></tr></thead><tbody>`;

      const days=Math.floor((Date.now()-new Date(r.created_at))/86400000);
      queueHtml+=`<tr onclick="showIntakeDetail('${r.reference_id}')">

    solHtml+=`<div onclick="showSolutionDetail(${s.id})" style="cursor:pointer;padding:5px 8px;border-radius:6px;background:var(--surface2)">
      <div style="font-size:.78rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.title}</div>
      <div style="display:flex;gap:5px;margin-top:3px">${statusBadge(s.status)}<span class="text-xs text-muted">${(s.patternIds||[]).length} patterns</span></div>

  const h=`<div class="bento-grid">

    ${actHtml}
    ${riskHtml}

    <div id="risk-widget-section" class="bento-span-3"><div class="section-card" style="opacity:.6;text-align:center;color:var(--muted);font-size:.82rem;padding:1.2rem">Loading risk intelligence...</div></div>

function renderRiskWidget(rd) {
  const el=document.getElementById('risk-widget-section');
  if(!el) return;

  const pillarColors={'Data Risk':'var(--dev)','Vendor Risk':'var(--risk-high)','Security Risk':'var(--risk-critical)','Complexity Risk':'var(--review)'};
  const MAX_PILLAR=25;

  // Panel 1: Risk Pillar Breakdown
  let pillarHtml=`<div class="section-card"><h3>Risk Pillar Breakdown <span style="font-size:.65rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">avg score / 25 across all submissions</span></h3><div class="kpi-bar-chart">`;
  Object.entries(rd.pillarAverages||{}).forEach(([label,avg])=>{
    const pct=Math.round((avg/MAX_PILLAR)*100);
    const col=pillarColors[label]||'var(--accent)';
    pillarHtml+=`<div class="kpi-bar-row"><div class="kpi-bar-label">${label}</div><div class="kpi-bar-track"><div class="kpi-bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="kpi-bar-val" style="color:${col}">${avg}</div></div>`;
  });
  pillarHtml+=`</div></div>`;

  // Panel 2: Top Risky Solutions
  let topRiskyHtml=`<div class="section-card"><h3>Top Risky Submissions</h3>`;
  if(!(rd.topRisky||[]).length){topRiskyHtml+=`<p class="text-sm text-muted">No scored submissions yet.</p>`;}
  else{
    topRiskyHtml+=`<div style="display:flex;flex-direction:column;gap:.38rem">`;
    (rd.topRisky||[]).forEach((item,i)=>{
      const badgeClass='badge-'+(item.tier||'low').toLowerCase();
      topRiskyHtml+=`<div onclick="showIntakeDetail('${item.referenceId}')" style="cursor:pointer;display:flex;align-items:center;gap:.55rem;padding:.42rem .55rem;background:var(--surface2);border-radius:7px;border:1px solid var(--border)">
        <span style="font-size:.7rem;font-weight:800;color:var(--muted);width:16px;text-align:right;flex-shrink:0">${i+1}</span>
        <span style="flex:1;font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.title}">${item.title}</span>
        <span class="badge ${badgeClass}" style="flex-shrink:0">${item.tier}</span>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);flex-shrink:0">${item.score}</span>
        <span style="font-size:.65rem;color:var(--muted);flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${item.primaryPillar}">${item.primaryPillar}</span>
      </div>`;
    });
    topRiskyHtml+=`</div>`;
  }
  topRiskyHtml+=`</div>`;

  // Panel 3: Risk by Architecture Domain
  const domainOrder=['Application & Integration','Data & Analytics','Security & Compliance','Infrastructure & Cloud','OT/ICS'];

  domainOrder.forEach(d=>{
    const dr=(rd.domainRisk||{})[d]||{high:0,critical:0};
    const total=dr.high+dr.critical;
    domainHtml+=`<div style="display:flex;align-items:center;gap:.55rem">
      <div style="font-size:.73rem;color:var(--muted);width:175px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${d}">${d}</div>
      <div style="display:flex;gap:.25rem;flex:1">
        ${dr.critical?`<span style="font-size:.67rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;background:rgba(231,76,60,.2);color:var(--risk-critical)">${dr.critical} Crit</span>`:''}
        ${dr.high?`<span style="font-size:.67rem;font-weight:700;padding:.1rem .4rem;border-radius:4px;background:rgba(230,126,34,.15);color:var(--risk-high)">${dr.high} High</span>`:''}
        ${!total?`<span style="font-size:.67rem;color:var(--muted)">None</span>`:''}
      </div>
    </div>`;

  domainHtml+=`</div></div>`;

    flagsHtml+=`<div style="display:flex;flex-direction:column;gap:.3rem">`;

      </div>`;
    });
    flagsHtml+=`</div>`;

  flagsHtml+=`</div>`;

  // Panel 5: Supply Chain Risk

  let scHtml=`<div class="section-card" style="border-color:rgba(230,120,0,.4);background:linear-gradient(135deg,var(--surface) 85%,rgba(200,90,0,.06))">
    <h3 style="color:#e67e22">Supply Chain Risk <span style="font-size:.65rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">aggregated from cached signals</span></h3>

  scItems.forEach(si=>{
    scHtml+=`<div style="display:flex;align-items:center;gap:.55rem;padding:.5rem .65rem;background:rgba(230,120,0,.07);border:1px solid rgba(230,120,0,.2);border-radius:7px">

      <span style="font-size:.7rem;color:var(--muted);line-height:1.35">${si.label}</span>
    </div>`;
  });
  scHtml+=`</div></div>`;

  // Panel 6: Risk Trend
  const trend=rd.trend||{};
  const trendIcon={improving:'↑',stable:'→',degrading:'↓'}[trend.direction]||'→';
  const trendColor={improving:'var(--risk-low)',stable:'var(--muted)',degrading:'var(--risk-critical)'}[trend.direction]||'var(--muted)';
  const trendLabel={improving:'Improving',stable:'Stable',degrading:'Degrading'}[trend.direction]||'Stable';
  let trendHtml=`<div class="section-card"><h3>Risk Trend <span style="font-size:.65rem;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">week-over-week</span></h3>
