async function checkGitHubStatus() {
  const el = document.getElementById('sync-result');
  if (el) el.innerHTML = `<div class="section-card mt-2" style="color:var(--muted);font-size:.82rem">Checking GitHub status…</div>`;
  try {
    const r = await api.get('/api/github/sync-status');
    let html = `<div class="section-card mt-2"><h3>GitHub Status</h3><div class="kv-grid">
      <div class="kv-item"><label>Branch</label><span class="${r.branchExists ? 'text-success' : 'text-warning'}">${r.branchExists ? '✓ dev branch exists' : '⚠ dev branch not yet created'}</span></div>
      <div class="kv-item"><label>Patterns in Repo</label><span>${r.patternsSynced} JSON files</span></div>
      <div class="kv-item"><label>Last Push</label><span>${r.lastPush ? new Date(r.lastPush).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}) : '–'}</span></div>
      <div class="kv-item"><label>Repo URL</label><span><a href="${r.repoUrl}" target="_blank" style="color:var(--accent-light)">${r.repoUrl}</a></span></div>
    </div></div>`;
    if (el) el.innerHTML = html;
  } catch(e) {
    if (el) el.innerHTML = `<div class="alert alert-danger mt-2">Could not reach GitHub: ${e.error || e.message || 'Check that GITHUB_PAT is valid and has repo scope.'}</div>`;
  }
}

async function runGitHubSync() {
  const btn = document.getElementById('sync-btn');
  const el = document.getElementById('sync-result');
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Syncing…'; }
  if (el) el.innerHTML = `<div class="section-card mt-2" style="color:var(--muted);font-size:.82rem"><span class="ai-spin" style="display:inline-block;margin-right:.5rem"></span> Pushing ${S.patterns.length} patterns to GitHub dev branch…</div>`;
  try {
    const r = await api.post('/api/github/sync-patterns', {});
    let html = `<div class="section-card mt-2">
      <h3 style="color:${r.errors === 0 ? 'var(--accent-light)' : '#f87171'}">${r.errors === 0 ? '✓ Sync Complete' : '⚠ Sync Completed with Errors'}</h3>
      <div class="kv-grid" style="margin-bottom:.8rem">
        <div class="kv-item"><label>Files Synced</label><span style="color:var(--accent-light)">${r.synced}</span></div>
        <div class="kv-item"><label>Errors</label><span style="color:${r.errors > 0 ? '#f87171' : 'var(--muted)'}">${r.errors}</span></div>
        <div class="kv-item"><label>Branch</label><span class="font-mono">dev</span></div>
        <div class="kv-item"><label>Synced At</label><span>${new Date(r.syncedAt).toLocaleTimeString('en-GB')}</span></div>
      </div>
      <a href="https://github.com/Rik-ftw/architecture_patterns/tree/dev/patterns" target="_blank" class="btn btn-secondary btn-sm">View on GitHub →</a>`;
    if (r.errors.length) {
      html += `<div class="mt-2"><label class="text-xs text-muted" style="text-transform:uppercase">Errors</label><ul style="margin:.4rem 0 0;padding-left:1.2rem;font-size:.78rem;color:#f87171">${r.errors.map(e => `<li>${e.file}: ${e.error}</li>`).join('')}</ul></div>`;
    }
    html += `</div>`;
    if (el) el.innerHTML = html;
  } catch(e) {
    if (el) el.innerHTML = `<div class="alert alert-danger mt-2">Sync failed: ${e.error || e.message || 'Unknown error'}. Check your GITHUB_PAT has repo write access.</div>`;
  }
  if (btn) { btn.disabled = false; btn.textContent = '⇅ Sync Patterns to GitHub'; }
}

async function runGitHubSolutionsSync() {
  const btn=document.getElementById('sync-solutions-btn');
  if(btn){btn.disabled=true;btn.textContent='Syncing solutions...';}
  const el=document.getElementById('sync-result');
  try{
    const r=await api.post('/api/github/sync-solutions',{});
    if(el)el.innerHTML=`<div class="section-card mt-2" style="border-left:3px solid var(--endorsed)"><h4>✓ Solutions Synced</h4><p class="text-sm text-muted">${r.message||'Approved solutions pushed to /solutions folder.'}</p>${r.solutionsSynced!==undefined?`<p class="text-xs text-muted mt-1">${r.solutionsSynced} solution(s) written to GitHub /solutions folder</p>`:''}</div>`;

    if(el)el.innerHTML=`<div class="section-card mt-2" style="border-left:3px solid var(--danger)"><h4>✗ Solutions Sync Failed</h4><p class="text-sm text-muted">${e.error||'Check your GITHUB_PAT and ensure solutions are in Approved status.'}</p></div>`;

async function showOpSupportList(filter) {
  S.view = filter === 'expiring' ? 'ops-expiring' : 'ops-list';
  renderSidebar();
  await loadOpSupport();
  const st = S.opSupportStats || {};
  let records = S.opSupport;
  const searchQ = S._opsSearchQ || '';

  if (filter === 'expiring') {
    records = records.filter(r => r.hasExpiringLicense);
  }
  if (searchQ) {
    const q = searchQ.toLowerCase();
    records = records.filter(r => (r.solution_name + r.reference_id + (r.owner_name||'') + (r.owner_team||'')).toLowerCase().includes(q));
  }

  let h = `<div class="page-title"><h2>Operational Support</h2><button class="btn btn-primary btn-sm" onclick="startNewOpSupport()">＋ New Record</button></div>`;
  h += `<div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1.1rem">
    <div class="stat-card"><div class="stat-val">${st.total||0}</div><div class="stat-label">Total Records</div></div>
    <div class="stat-card" style="--accent-color:var(--risk-high)"><div class="stat-val">${st.expiring||0}</div><div class="stat-label">Licences Expiring ≤90 Days</div></div>
    <div class="stat-card" style="--accent-color:var(--accent)"><div class="stat-val">${S.opSupport.filter(r=>(r.licenses||[]).length>0).length}</div><div class="stat-label">With Licence Data</div></div>
  </div>`;
  h += `<div class="flex gap-2 items-center" style="margin-bottom:.8rem">
    <input class="search-bar" style="margin-bottom:0;flex:1" placeholder="Search by name, reference, owner, team..." value="${searchQ}" oninput="S._opsSearchQ=this.value;showOpSupportList('${filter||''}')">
    ${filter==='expiring'?`<button class="btn btn-secondary btn-sm" onclick="showOpSupportList()">Show All</button>`:st.expiring?`<button class="btn btn-sm" style="background:rgba(230,126,34,.15);color:var(--risk-high);border:1px solid rgba(230,126,34,.35);white-space:nowrap" onclick="showOpSupportList('expiring')">⚠ ${st.expiring} Expiring</button>`:''}
  </div>`;
  if (!records.length) {
    h += `<div class="empty">${filter==='expiring'?'No licences expiring within 90 days.':'No operational support records yet. Create one from an approved intake request or click + New Record.'}</div>`;
  } else {
    h += `<div class="table-wrap"><table><thead><tr><th>Reference</th><th>Solution</th><th>Owner</th><th>Team</th><th>Support Tier</th><th>Intake</th><th>Licences</th><th>Created</th></tr></thead><tbody>`;
    records.forEach(r => {
      const licExpiry = (r.licenses||[]).filter(l=>l.renewalDate).sort((a,b)=>new Date(a.renewalDate)-new Date(b.renewalDate))[0];
      const expiryBadge = r.hasExpiringLicense
        ? `<span class="badge badge-high" style="font-size:.63rem">⚠ Expiring ${licExpiry?fmtDate(licExpiry.renewalDate):''}</span>`
        : licExpiry ? `<span class="badge" style="background:var(--surface2);color:var(--muted);font-size:.63rem">${fmtDate(licExpiry.renewalDate)}</span>` : '<span class="text-muted text-xs">–</span>';
      h += `<tr onclick="showOpSupportDetail(${r.id})">
        <td class="font-mono text-xs">${r.reference_id}</td>
        <td><strong>${r.solution_name}</strong></td>
        <td class="text-sm">${r.owner_name||'–'}</td>
        <td class="text-sm text-muted">${r.owner_team||'–'}</td>
        <td>${r.support_tier?`<span class="badge badge-dev">${r.support_tier}</span>`:'<span class="text-muted text-xs">–</span>'}</td>
        <td class="font-mono text-xs">${r.intake_reference?`<span style="cursor:pointer;color:var(--accent)" onclick="event.stopPropagation();showIntakeDetail('${r.intake_reference}')">${r.intake_reference}</span>`:'–'}</td>
        <td>${expiryBadge}</td>
        <td class="text-xs text-muted">${fmtDate(r.created_at)}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }
  setMain(h);
}

    solutionName,

}

function switchRiskTab(idx, wrapperId) {
  const wrap = document.getElementById(wrapperId);
  if (!wrap) return;
  wrap.querySelectorAll('.risk-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  wrap.querySelectorAll('.risk-tab-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
  const r = S.currentIntake;
  if (!r) return;
  if (idx === 1 && !S._scaLoaded) { loadScaPanel(r); S._scaLoaded = true; }
  if (idx === 2 && !S._mitreLoaded) { loadMitrePanel(r); S._mitreLoaded = true; }
  if (idx === 3 && !S._vendorEnrichLoaded) { loadVendorEnrichPanel(r); S._vendorEnrichLoaded = true; }
}

function extractTechnologies(r) {
  const techs = new Set();
  if (r.hosting_model || r.hostingModel) {
    const hm = (r.hosting_model || r.hostingModel).toLowerCase();
    if (hm.includes('azure')) techs.add('Microsoft Azure');
    if (hm.includes('aws')) techs.add('AWS');
    if (hm.includes('saas')) techs.add('SaaS');
  }
  if (r.architecture_type || r.architectureType) {
    const at = r.architecture_type || r.architectureType;
    if (at.includes('OT')) { techs.add('SCADA'); techs.add('Modbus'); techs.add('OPC-UA'); }
    if (at.includes('API')) techs.add('API Gateway');
  }
  (r.components || []).forEach(c => { if (c && c.trim()) techs.add(c.trim()); });
  const knownVendors = S.vendors.filter(v => (r.vendorIds || []).includes(v.id));
  knownVendors.forEach(v => {
    if (!['Microsoft', 'AWS', 'Cisco'].includes(v.vendorCompany)) {
      techs.add(v.vendorCompany);
    }
  });
  if (r.tech_stack_notes || r.techStackNotes) {
    const notes = r.tech_stack_notes || r.techStackNotes;
    ['Node.js','Python','Java','Azure','Kubernetes','Docker','Terraform','Nginx','Redis','PostgreSQL','MongoDB'].forEach(t => {
      if (notes.toLowerCase().includes(t.toLowerCase())) techs.add(t);
    });
  }
  const list = [...techs].slice(0, 12);
  if (!list.length) list.push('Node.js', 'Azure');
  return list;
}

async function loadScaPanel(r) {
  const el = document.getElementById(`sca-panel-${r.id}`);
  if (!el) return;
  const technologies = extractTechnologies(r);
  try {
    const result = await api.post('/api/risk/cvss', { technologies });
    const sevColor = { Critical: 'var(--risk-critical)', High: 'var(--risk-high)', Medium: 'var(--risk-medium)', Low: 'var(--risk-low)', None: 'var(--muted)' };
    const overallColor = sevColor[result.overallRisk] || 'var(--muted)';
    let h = `<div class="sca-summary-bar">
      <div class="sca-summary-stat"><div class="sca-summary-stat-val" style="color:${overallColor}">${result.overallRisk}</div><div class="sca-summary-stat-label">Overall SCA Risk</div></div>
      <div class="sca-summary-stat"><div class="sca-summary-stat-val" style="color:var(--risk-critical)">${result.criticalCount||0}</div><div class="sca-summary-stat-label">Critical CVE Tech</div></div>
      <div class="sca-summary-stat"><div class="sca-summary-stat-val" style="color:var(--risk-high)">${result.highCount||0}</div><div class="sca-summary-stat-label">High CVE Tech</div></div>
      <div class="sca-summary-stat"><div class="sca-summary-stat-val">${technologies.length}</div><div class="sca-summary-stat-label">Technologies</div></div>
    </div>`;
    h += `<div class="table-wrap"><table class="tech-table"><thead><tr><th>Technology</th><th>CVE Count</th><th>Highest CVSS</th><th>Severity</th><th>Top CVEs</th></tr></thead><tbody>`;
    (result.results || []).forEach(tech => {
      const sc = sevColor[tech.severity] || 'var(--muted)';
      const cveLinks = (tech.topCves || []).slice(0,3).map(c => `<a class="cve-link" href="${c.url}" target="_blank" title="${c.description}">${c.id}</a>`).join(' ');
      h += `<tr>
        <td><strong>${tech.keyword}</strong></td>
        <td>${tech.cveCount||0}</td>
        <td style="font-weight:700;color:${sc}">${tech.highestCvss||'–'}</td>
        <td><span class="badge badge-${tech.severity==='Critical'?'critical':tech.severity==='High'?'high':tech.severity==='Medium'?'medium':tech.severity==='Low'?'low':'draft'}">${tech.severity}</span></td>
        <td>${cveLinks||'<span class="text-muted text-xs">None found</span>'}</td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    if (result.overallRisk === 'Critical' || result.overallRisk === 'High') {
      h += `<div class="alert alert-warning mt-2" style="margin-bottom:0">⚠ SCA signals have been incorporated into the Security Risk score. Address Critical CVEs before deployment.</div>`;
    }
    el.innerHTML = h;
  } catch(err) {
    if (err.error === 'nvd_key_missing') {
      el.innerHTML = `<div class="alert alert-warning">
        <div><strong>NVD API key not configured</strong> — CVE data unavailable.<br>
        <span style="font-size:.76rem">To enable CVE enrichment, request a free API key at
        <a href="https://nvd.nist.gov/developers/request-an-api-key" target="_blank" style="color:inherit;text-decoration:underline">nvd.nist.gov/developers/request-an-api-key</a>
        and set the <code style="font-family:monospace;font-size:.78rem">NVD_API_KEY</code> environment variable.</span></div>
      </div>`;
    } else {
      el.innerHTML = `<div class="alert alert-danger">Failed to load CVE data: ${err.error||err.message||'Unknown error'}</div>`;
    }
  }
}

            <div class="mitre-technique-reason">${t.reason}</div>
            <div class="mitre-technique-mit">→ ${t.mitigation}</div>
          </div>`;
        });

  } catch(err) {
    el.innerHTML = `<div class="alert alert-danger">Failed to load MITRE ATT&amp;CK data: ${err.error||err.message||'Unknown error'}</div>`;
  }

async function loadVendorEnrichPanel(r) {
  const el = document.getElementById(`vendor-panel-${r.id}`);
  if (!el) return;
  const knownVendors = S.vendors.filter(v => (r.vendorIds || []).includes(v.id));
  if (!knownVendors.length && !(r.newVendors||[]).length) {
    el.innerHTML = `<div class="empty">No vendors are associated with this intake request.</div>`;
    return;
  }
  const today = new Date();
  const soonMs = 90 * 24 * 60 * 60 * 1000;

  function certStatus(cert) {
    if (!cert.validUntil) return 'missing';
    const expiry = new Date(cert.validUntil);
    if (expiry < today) return 'expired';
    if ((expiry - today) < soonMs) return 'expiring';
    return 'valid';
  }

  function certBadgeHtml(cert) {
    const st = certStatus(cert);
    const cls = { valid: 'cert-valid', expiring: 'cert-expiring', expired: 'cert-expired', missing: 'cert-missing' }[st];
    const icon = { valid: '✓', expiring: '⚠', expired: '✗', missing: '?' }[st];
    const expLabel = cert.validUntil ? ` · ${new Date(cert.validUntil).toLocaleDateString('en-GB',{month:'short',year:'numeric'})}` : '';
    return `<span class="cert-badge ${cls}">${icon} ${cert.name}${expLabel}</span>`;
  }

  function sslGradeHtml(sslInfo, vendorId) {
    if (!sslInfo || !sslInfo.grade || sslInfo.grade === 'Unknown') {
      return `<span class="ssl-grade ssl-unknown" title="Not yet inspected — click Inspect SSL to check">?</span>`;
    }
    const cls = { 'A+': 'ssl-a-plus', 'A': 'ssl-a', 'B': 'ssl-b', 'C': 'ssl-c', 'D': 'ssl-d', 'F': 'ssl-f' }[sslInfo.grade] || 'ssl-unknown';
    return `<span class="ssl-grade ${cls}" title="${(sslInfo.findings||[]).join('; ')}">${sslInfo.grade}</span>`;
  }

  el.innerHTML = `<div class="loading-pulse"><div class="loading-spin"></div>Fetching vendor SSL status…</div>`;

  const sslMap = {};
  await Promise.all(knownVendors.map(async v => {
    try {
      let res = await api.get(`/api/risk/ssl/${v.id}`);
      if (!res.ssl || !res.ssl.grade || res.ssl.grade === 'Unknown' && !res.ssl.mock) {
        res = await api.post(`/api/risk/ssl/${v.id}`, {});
      }
      sslMap[v.id] = res.ssl || null;
    } catch { sslMap[v.id] = null; }
  }));

  let missingCerts = 0;
  let failedSsl = 0;

  let h = '';
  knownVendors.forEach(v => {
    const certs = v.certifications || [];
    const criticalCerts = ['SOC2 Type II','ISO 27001'];
    const hasCritCerts = criticalCerts.every(cn => certs.some(c => c.name === cn && certStatus(c) !== 'expired'));
    if (!hasCritCerts && (v.criticality === 'Critical' || v.criticality === 'High')) missingCerts++;
    const ssl = sslMap[v.id];
    if (ssl && ssl.grade && !['A+','A','Unknown'].includes(ssl.grade)) failedSsl++;

    const riskSummary = [];
    if (v.criticality === 'Critical') riskSummary.push({ txt: 'Critical tier', color: 'var(--risk-critical)' });
    if (!hasCritCerts) riskSummary.push({ txt: 'Missing SOC2/ISO27001', color: 'var(--review)' });
    if (v.dataShared) riskSummary.push({ txt: 'Data shared', color: 'var(--review)' });

    h += `<div class="vendor-risk-row">
      <div class="vendor-risk-header">
        <div class="vendor-risk-name">${v.vendorCompany} <span class="text-xs text-muted font-bold" style="font-weight:400">— ${v.productService}</span></div>
        ${critBadge(v.criticality)}
        ${sslGradeHtml(ssl, v.id)}
      </div>
      <div class="flex gap-1 flex-wrap" style="margin-bottom:.45rem">
        ${certs.length ? certs.map(certBadgeHtml).join('') : `<span class="cert-badge cert-missing">? No certifications on record</span>`}
      </div>
      ${ssl && ssl.grade && ssl.grade !== 'Unknown' ? `<div class="text-xs text-muted" style="margin-bottom:.35rem">SSL: ${ssl.grade}${ssl.mode?' · Mode: '+ssl.mode:''} · ${(ssl.findings||[]).join(' · ')||'No findings'}${ssl.fetchedAt?' · Last checked '+new Date(ssl.fetchedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):''}</div>` : `<div class="text-xs text-muted" style="margin-bottom:.35rem">SSL: ${ssl&&ssl.mock?'<span title="'+((ssl.findings||[]).join('; '))+'">Unknown (Cloudflare token not configured)</span>':'Inspecting…'}</div>`}
      <div class="flex gap-2 flex-wrap" style="margin-bottom:.25rem">
        ${v.domain?`<span class="text-xs text-muted">Domain: <span class="font-mono">${v.domain}</span></span>`:''}
        ${v.hostingModel?`<span class="text-xs text-muted">Hosting: <span class="font-mono">${v.hostingModel}</span></span>`:''}
        ${v.dataShared?`<span class="text-xs text-muted" style="color:var(--review)">Data shared with vendor</span>`:''}
      </div>
      ${riskSummary.length ? `<div class="flex gap-1 flex-wrap mt-1">${riskSummary.map(rs=>`<span class="badge" style="background:rgba(255,255,255,.05);color:${rs.color};border:1px solid ${rs.color}33;font-size:.64rem">${rs.txt}</span>`).join('')}</div>` : ''}
    </div>`;
  });

  if ((r.newVendors||[]).length) {
    h += `<div class="vendor-risk-row" style="border-left-color:var(--risk-high)">
      <div class="vendor-risk-header"><div class="vendor-risk-name text-muted">Unvetted Vendors</div></div>
      <div class="flex gap-1 flex-wrap">${r.newVendors.map(n=>`<span class="badge badge-review">⚠ ${n}</span>`).join('')}</div>
      <div class="text-xs text-muted mt-1">No registry data available — complete vendor security assessments before proceeding.</div>
    </div>`;
  }

  if (missingCerts > 0 || failedSsl > 0) {
    h += `<div class="alert alert-warning" style="margin-bottom:0">⚠ Vendor risk signals (${missingCerts} missing certs, ${failedSsl} poor SSL grades) have been incorporated into the Vendor Risk score.</div>`;
  }

  el.innerHTML = h;
}

function renderRiskPanel(score,tier,breakdown,flags,recs){
  const tierColors={Low:'var(--risk-low)',Medium:'var(--risk-medium)',High:'var(--risk-high)',Critical:'var(--risk-critical)'};
  const color=tierColors[tier]||'var(--muted)';
  const r=50,circ=2*Math.PI*r,dash=circ*(score/100);
  const dimColors={dataRisk:'#2980b9',vendorRisk:'#7c5cbf',securityRisk:'#e74c3c',complexityRisk:'#d4830a'};
  let h=`<div class="risk-panel-wrap"><div class="risk-panel-inner">
    <div class="risk-gauge-wrap">
      <div class="risk-circle">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="11"/>
          <circle cx="60" cy="60" r="${r}" fill="none" stroke="${color}" stroke-width="11" stroke-linecap="round" stroke-dasharray="${dash} ${circ}"/>
        </svg>
        <div class="risk-circle-label"><span class="risk-score-num" style="color:${color}">${score}</span><span class="risk-score-max">/100</span></div>
      </div>
      <span class="badge badge-${tier.toLowerCase()}" style="margin-top:.6rem;font-size:.8rem">${tier} Risk</span>
    </div>
    <div class="risk-bars">`;
  if(breakdown)Object.entries(breakdown).forEach(([k,v])=>{const pct=Math.round(v.score/v.max*100);h+=`<div class="risk-bar-row"><div class="risk-bar-label">${v.label}</div><div class="risk-bar-track"><div class="risk-bar-fill" style="width:${pct}%;background:${dimColors[k]||color}"></div></div><div class="risk-bar-val" style="color:${dimColors[k]||color}">${v.score}/${v.max}</div></div>`;});
  h+=`</div></div>`;
  if(flags&&flags.length)h+=`<div style="margin-top:.8rem"><div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">Risk Flags</div><ul class="flags-list">${flags.slice(0,6).map(f=>`<li>${f}</li>`).join('')}</ul></div>`;
  if(recs&&recs.length)h+=`<div style="margin-top:.7rem"><div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem">Recommendations</div><ul class="recs-list">${recs.slice(0,5).map(r=>`<li>${r}</li>`).join('')}</ul></div>`;
  return h+`</div>`;
}

function renderAIPanel(review) {
  if (!review) return '';
  const ratingClass = {
    'Approved': 'ai-badge-approved',
    'Approved with Conditions': 'ai-badge-conditions',
    'Needs Rework': 'ai-badge-rework',
    'Major Concerns': 'ai-badge-major'
  }[review.overallRating] || 'ai-badge-conditions';

  const ratingIcon = {
    'Approved': '✓',
    'Approved with Conditions': '◈',
    'Needs Rework': '⚠',
    'Major Concerns': '✗'
  }[review.overallRating] || '◈';

  const sevOrder = ['Critical','High','Medium','Low'];
  const risks = (review.keyRisks || []).sort((a,b) => sevOrder.indexOf(a.severity) - sevOrder.indexOf(b.severity));

  let h = `<div class="ai-panel">
    <h3>✦ Claude AI Architecture Review <span style="font-size:.62rem;opacity:.6;margin-left:.4rem">claude-sonnet-4-5 · ${review.generatedAt ? new Date(review.generatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : ''}</span></h3>
    <div class="flex gap-2 items-center" style="margin-bottom:.9rem;flex-wrap:wrap">
      <span class="ai-badge ${ratingClass}">${ratingIcon} ${review.overallRating}</span>
      ${review.reviewComplexity ? `<span class="badge" style="background:rgba(124,92,191,.15);color:#a78bfa;border:1px solid rgba(124,92,191,.3)">${review.reviewComplexity} Review</span>` : ''}
      ${review.estimatedReviewEffort ? `<span class="text-xs text-muted">Est. effort: ${review.estimatedReviewEffort}</span>` : ''}
      ${review.confidenceLevel ? `<span class="text-xs text-muted">Confidence: ${review.confidenceLevel}</span>` : ''}
    </div>`;

  if (review.executiveSummary) {
    h += `<div style="background:rgba(124,92,191,.07);border-radius:8px;padding:.8rem;margin-bottom:.9rem;font-size:.85rem;line-height:1.65;border-left:3px solid #7c5cbf">${review.executiveSummary}</div>`;
  }

  // Score bars
  const scores = [
    { label: 'Pattern Alignment', val: review.patternAlignment?.score },
    { label: 'Security Posture', val: review.securityPosture?.score },
    { label: 'Architecture Quality', val: review.architectureQuality?.score },
  ].filter(s => s.val != null);

  if (scores.length) {
    h += `<div style="margin-bottom:.9rem">${scores.map(s => `
      <div class="ai-score-row">
        <div class="ai-score-label">${s.label}</div>
        <div class="ai-score-track"><div class="ai-score-fill" style="width:${s.val}%"></div></div>
        <div class="ai-score-val">${s.val}</div>
      </div>`).join('')}</div>`;
  }

  // Pattern alignment detail
  if (review.patternAlignment) {
    const pa = review.patternAlignment;
    h += `<div style="margin-bottom:.75rem">`;
    h += `<div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Pattern Alignment</div>`;
    h += `<p class="text-sm" style="line-height:1.55;margin-bottom:.4rem">${pa.assessment || ''}</p>`;
    if (pa.recommendedPatterns?.length) h += `<div class="tag-list">${pa.recommendedPatterns.map(p => `<span class="badge" style="background:rgba(255,212,0,.12);color:var(--endorsed);border:1px solid rgba(255,212,0,.25)">${p}</span>`).join('')}</div>`;
    if (pa.gaps?.length) h += `<ul style="margin-top:.4rem">${pa.gaps.map(g => `<li class="text-xs text-muted" style="padding:.12rem 0 .12rem .5rem;border-left:2px solid var(--border)">${g}</li>`).join('')}</ul>`;
    h += `</div>`;
  }

  // Security detail
  if (review.securityPosture) {
    const sp = review.securityPosture;
    h += `<div style="margin-bottom:.75rem">`;
    h += `<div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Security Posture</div>`;
    h += `<p class="text-sm" style="line-height:1.55;margin-bottom:.4rem">${sp.assessment || ''}</p>`;
    if (sp.positives?.length) h += `<div class="tag-list" style="margin-bottom:.3rem">${sp.positives.map(p => `<span class="badge badge-endorsed" style="font-size:.67rem">✓ ${p}</span>`).join('')}</div>`;
    if (sp.gaps?.length) h += `<div class="tag-list">${sp.gaps.map(g => `<span class="badge badge-review" style="font-size:.67rem">⚠ ${g}</span>`).join('')}</div>`;
    h += `</div>`;
  }

  // Risk commentary
  if (review.riskCommentary) {
    h += `<div style="margin-bottom:.85rem;padding:.65rem .8rem;background:rgba(124,92,191,.06);border-radius:7px;border-left:2px solid #7c5cbf">
      <div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem">AI Risk Commentary</div>
      <p class="text-sm" style="line-height:1.6">${review.riskCommentary}</p>
    </div>`;
  }

  // Key Risks
  if (risks.length) {
    h += `<div style="margin-bottom:.85rem">
      <div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Key Risks (${risks.length})</div>`;
    risks.forEach(r => {
      h += `<div class="ai-risk-row">
        <div style="flex:1">
          <div class="ai-risk-title"><span class="ai-sev-${r.severity}" style="font-size:.68rem;font-weight:900;margin-right:.35rem">[${r.severity}]</span>${r.risk}</div>
          ${r.detail ? `<div class="ai-risk-detail">${r.detail}</div>` : ''}
          ${r.mitigation ? `<div class="ai-risk-mit">→ ${r.mitigation}</div>` : ''}
        </div>
      </div>`;
    });
    h += `</div>`;
  }

  // Recommendations
  if (review.recommendations?.length) {
    h += `<div style="margin-bottom:.85rem">
      <div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.4rem">Recommendations</div>`;
    review.recommendations.forEach(rec => {
      const pc = { Must: 'must', Should: 'should', Consider: 'consider' }[rec.priority] || 'consider';
      h += `<div class="ai-rec-row">
        <span class="ai-rec-priority ai-priority-${pc}">${rec.priority}</span>
        <span class="ai-rec-text">${rec.action}</span>
      </div>`;
    });
    h += `</div>`;
  }

  // Architecture notes
  if (review.architectureNotes) {
    h += `<div style="padding:.7rem .85rem;background:rgba(124,92,191,.06);border-radius:8px;border-left:2px solid rgba(124,92,191,.4)">
      <div class="text-xs text-muted font-bold" style="text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem">Architecture Notes</div>
      <p class="text-sm" style="line-height:1.65">${review.architectureNotes}</p>
    </div>`;
  }

  h += `</div>`;
  return h;
}

let _iacFilesCache = {};
let _iacFilesCacheId = 0;

function renderIaCPanel(iac, context, entityId, refId) {
  if (!iac || !iac.files) return '';
  const files = iac.files;
  const fileKeys = Object.keys(files).filter(k => files[k]);
  if (!fileKeys.length) return '';
  const cacheKey = 'iac_' + (++_iacFilesCacheId);
  _iacFilesCache[cacheKey] = files;
  const activeFile = fileKeys[0];
  const tabsHtml = fileKeys.map(k => `<button class="iac-file-tab${k===activeFile?' active':''}" id="iac-tab-${k.replace('.','_')}" onclick="iacSwitchTab(this,'${k.replace('.','_')}','iac-code-${k.replace('.','_')}')">${k}</button>`).join('');
  const codesHtml = fileKeys.map(k => `<div id="iac-code-${k.replace('.','_')}" style="display:${k===activeFile?'block':'none'}"><div class="iac-code-wrap"><button class="iac-copy-btn" onclick="iacCopyFile('${k.replace('.','_')}')">Copy</button><code class="iac-code">${escHtml(files[k])}</code></div></div>`).join('');
  const pushLabel = context === 'pattern' ? `iac/${refId}` : context === 'intake' ? `iac/intake/${refId}` : `iac/solutions/${refId}`;
  const genFn = context === 'pattern' ? `generatePatternIaC('${refId}')` : context === 'intake' ? `generateIntakeIaC(${entityId},'${refId}')` : `generateSolutionIaC(${entityId},'${refId}')`;
  return `<div class="iac-panel" id="iac-panel-card">
    <h3>⬡ Terraform IaC <span style="font-size:.6rem;font-weight:400;opacity:.55;margin-left:.35rem">${refId}</span></h3>
    <div class="iac-file-tabs">${tabsHtml}</div>
    ${codesHtml}
    <div class="iac-actions">
      <button class="btn btn-sm" style="background:rgba(74,222,128,.12);color:#4ade80;border:1px solid rgba(74,222,128,.3)" onclick="${genFn}">⟳ Regenerate</button>
      <button class="btn btn-sm" style="background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="iacDownloadZip('${cacheKey}')">↓ Download ZIP</button>
      <button class="btn btn-sm" style="background:rgba(74,222,128,.08);color:#86efac;border:1px solid rgba(74,222,128,.2)" onclick="iacPushToGitHub(this,'${pushLabel}','${cacheKey}','${refId}')">⇅ Push to GitHub</button>
    </div>
    <div class="iac-meta">
      ${iac.resourceCount!==undefined?`<span class="iac-stat">${iac.resourceCount} resources</span>`:''}
      ${iac.estimatedMonthlyCost?`<span class="iac-stat">${iac.estimatedMonthlyCost}/mo est.</span>`:''}
      ${iac.guardrailsEnforced?`<span class="iac-stat">${iac.guardrailsEnforced} guardrails</span>`:''}
      <span style="margin-left:auto;font-size:.63rem;opacity:.55">${iac.generatedAt?new Date(iac.generatedAt).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):''} · ${iac.model||''}</span>
    </div>
  </div>`;
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function iacSwitchTab(btn, fileKey, codeId) {
  const panel = btn.closest('.iac-panel');
  if (!panel) return;
  panel.querySelectorAll('.iac-file-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  panel.querySelectorAll('[id^="iac-code-"]').forEach(d => d.style.display = 'none');
  const el = document.getElementById(codeId);
  if (el) el.style.display = 'block';
}

function iacCopyFile(fileKey) {
  const el = document.getElementById(`iac-code-${fileKey}`);
  if (!el) return;
  const code = el.querySelector('.iac-code');
  if (!code) return;
  navigator.clipboard.writeText(code.textContent).then(() => {
    const btn = el.closest('.iac-code-wrap').querySelector('.iac-copy-btn');
    if (btn) { const orig = btn.textContent; btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = orig, 1500); }
  });
}

async function iacDownloadZip(cacheKey) {
  const filesObj = _iacFilesCache[cacheKey];
  if (!filesObj) { alert('IaC files not found in cache'); return; }
  if (typeof JSZip === 'undefined') { alert('JSZip not loaded'); return; }
  const zip = new JSZip();
  for (const [name, content] of Object.entries(filesObj)) {
    if (content) zip.file(name, content);
  }
  const blob = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'terraform.zip'; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function iacPushToGitHub(btn, pathPrefix, cacheKey, label) {
  const filesObj = _iacFilesCache[cacheKey];
  if (!filesObj) { alert('IaC files not found in cache'); return; }
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '⟳ Pushing…';
  try {
    const r = await api.post('/api/github/push-iac', { path: pathPrefix, files: filesObj, label });
    btn.textContent = `✓ Pushed ${r.pushed} files`;
    btn.style.color = '#4ade80';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.color = ''; }, 3500);
  } catch(e) {
    btn.textContent = 'Push failed';
    btn.style.color = '#f87171';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; btn.style.color = ''; }, 3000);
  }
}

async function generatePatternIaC(patternId) {
  const panel = document.getElementById('pattern-iac-panel');
  if (panel) panel.innerHTML = `<div class="iac-panel"><div class="iac-generating"><span class="iac-spin"></span> Claude is generating Terraform IaC for pattern ${patternId}… this takes 20–30 seconds</div></div>`;
  try {
    const r = await api.post(`/api/iac/pattern/${patternId}`, {});
    const iac = r.iac || r;
    if (panel) panel.innerHTML = renderIaCPanel(iac, 'pattern', patternId, patternId);
  } catch(e) {
    if (panel) panel.innerHTML = `<div class="iac-panel"><div class="alert alert-danger" style="margin:0">IaC generation failed: ${e.error||e.message||'Unknown error'}</div></div>`;
  }
}

async function generateIntakeIaC(intakeId, refId) {
  const btn = document.getElementById('iac-btn');
  const panel = document.getElementById('iac-panel');
  if (panel) panel.innerHTML = `<div class="iac-panel"><div class="iac-generating"><span class="iac-spin"></span> Claude is generating Terraform IaC for ${refId}… this takes 20–30 seconds</div></div>`;
  if (btn) { btn.disabled = true; btn.textContent = '⟳ Generating…'; }
  try {
    const r = await api.post(`/api/iac/intake/${intakeId}`, {});
    const iac = r.iac || r;
    if (panel) panel.innerHTML = renderIaCPanel(iac, 'intake', intakeId, refId);
    const ir = S.intakes.find(i => i.id === intakeId);
    if (ir) ir.iacCode = iac;
    if (btn) { btn.textContent = '⬡ Regenerate IaC'; btn.disabled = false; }
  } catch(e) {
    if (panel) panel.innerHTML = `<div class="iac-panel"><div class="alert alert-danger" style="margin:0">IaC generation failed: ${e.error||e.message||'Unknown error'}</div></div>`;
    if (btn) { btn.textContent = '⬡ Generate IaC'; btn.disabled = false; }
  }
}

async function generateSolutionIaC(solutionId, refId) {
  const panel = document.getElementById('solution-iac-panel');
  if (panel) panel.innerHTML = `<div class="iac-panel"><div class="iac-generating"><span class="iac-spin"></span> Claude is generating Terraform IaC for ${refId}… this takes 20–30 seconds</div></div>`;
  try {
    const r = await api.post(`/api/iac/solution/${solutionId}`, {});
    const iac = r.iac || r;
    if (panel) panel.innerHTML = renderIaCPanel(iac, 'solution', solutionId, refId);
    if (S.currentSolution && S.currentSolution.id === solutionId) S.currentSolution.iacCode = iac;
  } catch(e) {
    if (panel) panel.innerHTML = `<div class="iac-panel"><div class="alert alert-danger" style="margin:0">IaC generation failed: ${e.error||e.message||'Unknown error'}</div></div>`;
  }
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function opts(arr,sel){return arr.map(o=>`<option value="${o}" ${o===sel?'selected':''}>${o}</option>`).join('');}
function fmtDate(d){if(!d)return'–';try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function statusBadge(s){const m={Draft:'draft',Submitted:'submitted','Under Review':'under-review',Approved:'approved','Approved with Conditions':'approved',Rejected:'rejected',Deferred:'deferred',Withdrawn:'withdrawn','In Review':'in-review','Needs Changes':'needs-changes'};return`<span class="badge badge-${m[s]||'draft'}">${s}</span>`;}

function tierBadge(tier,score){return`<span class="badge badge-${tier.toLowerCase()}">${tier} (${score})</span>`;}
function critBadge(c){const m={Critical:'badge-critical',High:'badge-high',Medium:'badge-medium',Low:'badge-low'};return`<span class="badge ${m[c]||''}">${c||'–'}</span>`;}
function levelBadge(lvl){if(!lvl)return'';const m={Conceptual:'badge-conceptual',Logical:'badge-logical',Component:'badge-component'};return`<span class="badge ${m[lvl]||''}" style="font-size:.63rem">${lvl}</span>`;}
function solutionStatusBadge(s){const m={Draft:'draft',Approved:'approved',Published:'endorsed','In Review':'in-review','Needs Changes':'needs-changes',Rejected:'rejected'};return`<span class="badge badge-${m[s]||'draft'}">${s}</span>`;}

init();
