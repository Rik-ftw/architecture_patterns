<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EA Admin Portal — McCain</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a0a2e;--surface:#2a1045;--surface2:#3a1a5e;--surface3:#4a2478;
  --border:#4a2478;--accent:#FFD400;--accent-light:#ffe033;--text:#dde4f0;
  --muted:#9b87c0;--navy:#2a1045;--risk-low:#2ecc71;--risk-medium:#f39c12;
  --risk-high:#e67e22;--risk-critical:#e74c3c;--success:#2ecc71;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
/* ─── Login ─────────────────────────────────────────────────────────────────── */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:9999}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2.2rem 2.5rem;width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:.7rem;margin-bottom:1.5rem}
.login-mark{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;color:#1a0a2e}
.login-box h1{font-size:1.1rem;font-weight:700}
.login-box .sub{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;margin-top:.15rem}
.login-box label{display:block;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.login-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.55rem .8rem;color:var(--text);font-size:.88rem;margin-bottom:1rem;transition:border-color .15s}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:#1a0a2e;font-weight:700;font-size:.9rem;border:none;border-radius:7px;padding:.65rem;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.login-error{font-size:.78rem;color:var(--risk-critical);margin-top:.5rem;display:none}
/* ─── Layout ─────────────────────────────────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}
header{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);padding:.7rem 1.5rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:.6rem}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.82rem;color:#1a0a2e}
header h1{font-size:1rem;font-weight:700}
.admin-badge{background:rgba(231,76,60,.15);color:var(--risk-critical);border:1px solid rgba(231,76,60,.3);border-radius:5px;padding:.18rem .55rem;font-size:.68rem;font-weight:700;letter-spacing:.05em;margin-left:.3rem}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.75rem}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:.28rem .7rem;font-size:.75rem;cursor:pointer}
.btn-logout:hover{color:var(--text);border-color:var(--accent)}
.layout{display:flex;height:calc(100vh - 50px)}
/* ─── Nav ─────────────────────────────────────────────────────────────────────── */
nav{width:210px;min-width:190px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:.6rem 0;flex-shrink:0}
.nav-section{font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.7rem 1rem .25rem;font-weight:700}
nav button{display:flex;width:100%;text-align:left;background:none;border:none;color:var(--muted);padding:.42rem 1rem;cursor:pointer;font-size:.8rem;transition:background .12s,color .12s;border-left:3px solid transparent;align-items:center;gap:.5rem}
nav button:hover{background:var(--surface2);color:var(--text)}
nav button.active{background:rgba(255,212,0,.1);border-left-color:var(--accent);color:var(--accent)}
.nav-icon{font-size:.85rem;width:16px;text-align:center}
main{flex:1;overflow-y:auto;padding:1.5rem 2rem}
/* ─── Common ─────────────────────────────────────────────────────────────────── */
.page-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem}
.page-title h2{font-size:1.1rem;font-weight:700}
.page-title .sub{font-size:.78rem;color:var(--muted);margin-top:.1rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.8rem;margin-bottom:1.4rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--accent)}
.stat-val{font-size:1.7rem;font-weight:800;line-height:1;color:var(--accent)}
.stat-label{font-size:.67rem;color:var(--muted);margin-top:.25rem;text-transform:uppercase;letter-spacing:.04em}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.1rem;margin-bottom:.7rem}
.card-hdr{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.5rem}
.card-hdr h3{font-size:.88rem;font-weight:700}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:.48rem .85rem;background:var(--surface2);color:var(--muted);font-size:.67rem;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
td{padding:.5rem .85rem;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,212,0,.03)}
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.38rem .85rem;border-radius:7px;font-size:.78rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-primary{background:var(--accent);color:#1a0a2e}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:#5c1a1a;color:#e74c3c;border:1px solid rgba(231,76,60,.3)}
.btn-success{background:#0a3020;color:#2ecc71;border:1px solid rgba(46,204,113,.3)}
.btn-sm{padding:.22rem .55rem;font-size:.72rem}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:var(--text);border-color:var(--accent)}
.badge{display:inline-flex;align-items:center;font-size:.65rem;padding:.14rem .45rem;border-radius:999px;font-weight:700}
.badge-active{background:rgba(46,204,113,.15);color:var(--success);border:1px solid rgba(46,204,113,.3)}
.badge-inactive{background:rgba(74,85,104,.2);color:var(--muted);border:1px solid var(--border)}
.badge-critical{background:rgba(231,76,60,.15);color:var(--risk-critical);border:1px solid rgba(231,76,60,.25)}
.badge-high{background:rgba(230,126,34,.15);color:var(--risk-high);border:1px solid rgba(230,126,34,.25)}
.badge-medium{background:rgba(243,156,18,.15);color:var(--risk-medium);border:1px solid rgba(243,156,18,.25)}
.badge-low{background:rgba(46,204,113,.15);color:var(--success);border:1px solid rgba(46,204,113,.25)}
.form-group{margin-bottom:.9rem}
.form-group label{display:block;font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:.28rem;text-transform:uppercase;letter-spacing:.04em}
.form-control{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:.48rem .75rem;color:var(--text);font-size:.83rem;transition:border-color .15s}
.form-control:focus{outline:none;border-color:var(--accent)}
textarea.form-control{resize:vertical;min-height:110px;font-family:monospace;font-size:.78rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.alert{padding:.6rem .85rem;border-radius:8px;font-size:.78rem;margin-bottom:.8rem}
.alert-success{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.25);color:var(--success)}
.alert-error{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);color:var(--risk-critical)}
.alert-info{background:rgba(41,128,185,.1);border:1px solid rgba(41,128,185,.25);color:#5dade2}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:.85rem}
.section-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.55rem}
/* ─── Modal ─────────────────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto}
.modal-lg{max-width:820px}
.modal-hdr{padding:1rem 1.3rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-size:.92rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.2rem 1.3rem}
.modal-footer{padding:.85rem 1.3rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end}
/* ─── Policy ─────────────────────────────────────────────────────────────────── */
.policy-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem;margin-bottom:.75rem;transition:border-color .18s}
.policy-card:hover{border-color:var(--accent)}
.policy-card-hdr{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:.6rem}
.policy-icon{font-size:1.2rem;flex-shrink:0;margin-top:.1rem}
.policy-title{font-size:.9rem;font-weight:700;margin-bottom:.15rem}
.policy-meta{font-size:.72rem;color:var(--muted)}
.policy-actions{margin-left:auto;display:flex;gap:.35rem;flex-shrink:0}
.rules-table{width:100%;border-collapse:collapse;font-size:.76rem;margin-top:.6rem}
.rules-table th{text-align:left;padding:.3rem .55rem;background:var(--surface2);color:var(--muted);font-size:.63rem;text-transform:uppercase}
.rules-table td{padding:.3rem .55rem;border-bottom:1px solid rgba(74,36,120,.4)}
.rules-table tr:last-child td{border-bottom:none}
.sev-Critical{color:var(--risk-critical);font-weight:700}
.sev-High{color:var(--risk-high);font-weight:600}
.sev-Medium{color:var(--risk-medium)}
.sev-Low{color:var(--success)}
/* ─── Risk ─────────────────────────────────────────────────────────────────── */
.threshold-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.threshold-item{background:var(--surface2);border-radius:8px;padding:.65rem .8rem;display:flex;align-items:center;gap:.5rem}
.threshold-label{font-size:.75rem;flex:1;line-height:1.35}
.threshold-val{font-size:.9rem;font-weight:700;color:var(--accent);width:48px;text-align:center;flex-shrink:0}
.threshold-input{width:70px;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.3rem .4rem;color:var(--text);font-size:.82rem;text-align:center}
.threshold-input:focus{outline:none;border-color:var(--accent)}
/* ─── Tabs ─────────────────────────────────────────────────────────────────── */
.tabs{display:flex;gap:.1rem;margin-bottom:.9rem;border-bottom:1px solid var(--border)}
.tab{padding:.4rem .85rem;cursor:pointer;font-size:.78rem;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* ─── Prompts ─────────────────────────────────────────────────────────────── */
.prompt-box{background:var(--surface2);border-radius:8px;padding:.8rem 1rem;margin-bottom:.7rem}
.prompt-key{font-family:monospace;font-size:.72rem;color:var(--accent);margin-bottom:.3rem}
.prompt-desc{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.prompt-text{font-family:monospace;font-size:.74rem;line-height:1.5;color:var(--text);max-height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;border:1px solid var(--border);border-radius:5px;padding:.5rem .7rem;background:var(--surface)}
/* ─── Vendor badges ────────────────────────────────────────────────────────── */
.vcrit{color:var(--risk-critical)}.vhigh{color:var(--risk-high)}.vmed{color:var(--risk-medium)}.vlow{color:var(--success)}
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-mark">EA</div>
      <div>
        <div style="font-weight:800;font-size:1rem">McCain EA Platform</div>
        <div style="font-size:.7rem;color:var(--muted)">Admin Portal</div>
      </div>
    </div>
    <div class="sub">Enter your admin token to access the configuration portal.</div>
    <label>Admin Token</label>
    <input type="password" id="token-input" placeholder="Enter admin token…" autocomplete="off"/>
    <button class="login-btn" onclick="doLogin()">Sign In to Admin Portal</button>
    <div class="login-error" id="login-error">Invalid token. Please try again.</div>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none;flex-direction:column">
  <header>
    <div class="logo">
      <div class="logo-mark">EA</div>
      <h1>McCain EA Platform</h1>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="header-right">
      <span style="font-size:.75rem;color:var(--muted)">Admin Portal</span>
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>
  </header>
  <div class="layout">
    <nav>
      <div class="nav-section">Overview</div>
      <button onclick="showPage('dashboard')" id="nav-dashboard" class="active"><span class="nav-icon">◈</span> Dashboard</button>
      <div class="nav-section">AI Configuration</div>
      <button onclick="showPage('prompts')" id="nav-prompts"><span class="nav-icon">✦</span> AI Prompts</button>
      <button onclick="showPage('apikeys')" id="nav-apikeys"><span class="nav-icon">⚿</span> API Keys</button>
      <div class="nav-section">Platform Config</div>
      <button onclick="showPage('policies')" id="nav-policies"><span class="nav-icon">⚖</span> Policies & Rules</button>
      <button onclick="showPage('risk')" id="nav-risk"><span class="nav-icon">⊗</span> Risk Engine</button>
      <button onclick="showPage('syscfg')" id="nav-syscfg"><span class="nav-icon">⚙</span> System Config</button>
      <div class="nav-section">Registry</div>
      <button onclick="showPage('vendors')" id="nav-vendors"><span class="nav-icon">◎</span> Vendor Registry</button>
      <button onclick="showPage('teams')" id="nav-teams"><span class="nav-icon">◉</span> Support Teams</button>
    </nav>
    <main id="main-content"></main>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <div class="modal-hdr">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
let ADMIN_TOKEN = '';
let currentPage = 'dashboard';

// ─── Auth ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const t = document.getElementById('token-input').value.trim();
  if (!t) return;
  try {
    const r = await apiFetch('/api/admin/stats', { headers: { 'X-Admin-Token': t } });
    if (r.error) throw new Error(r.error);
    ADMIN_TOKEN = t;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    showPage('dashboard');
  } catch {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function doLogout() {
  ADMIN_TOKEN = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('token-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// ─── API ─────────────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (ADMIN_TOKEN && !headers['X-Admin-Token']) headers['X-Admin-Token'] = ADMIN_TOKEN;
  const r = await fetch(url, { ...opts, headers });
  return r.json();
}

// ─── Nav ─────────────────────────────────────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + page);
  if (nb) nb.classList.add('active');
  const pages = { dashboard: renderDashboard, prompts: renderPrompts, apikeys: renderApiKeys, policies: renderPolicies, risk: renderRisk, syscfg: renderSysConfig, vendors: renderVendors, teams: renderTeams };
  if (pages[page]) pages[page]();
}

function setContent(html) { document.getElementById('main-content').innerHTML = html; }

function showAlert(id, msg, type = 'success') {
  const el = document.getElementById(id);
  if (el) { el.className = 'alert alert-' + type; el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 3500); }
}

// ─── Modal ───────────────────────────────────────────────────────────────────
function openModal(title, body, footer = '', large = false) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  const box = document.getElementById('modal-box');
  box.className = large ? 'modal modal-lg' : 'modal';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.remove('open'); }

// ─── Dashboard ───────────────────────────────────────────────────────────────
async function renderDashboard() {
  setContent(`<div class="page-title"><div><h2>Admin Dashboard</h2><div class="sub">Platform configuration overview</div></div></div>
    <div class="stats-grid" id="dash-stats"><div class="stat-card"><div class="stat-val">…</div><div class="stat-label">Loading</div></div></div>
    <div class="card"><div class="card-hdr"><h3>Quick Actions</h3></div>
      <div style="display:flex;flex-wrap:wrap;gap:.6rem;margin-top:.3rem">
        <button class="btn btn-secondary" onclick="showPage('policies')">⚖ Manage Policies</button>
        <button class="btn btn-secondary" onclick="showPage('risk')">⊗ Tune Risk Engine</button>
        <button class="btn btn-secondary" onclick="showPage('vendors')">◎ Vendor Registry</button>
        <button class="btn btn-secondary" onclick="showPage('prompts')">✦ Edit AI Prompts</button>
        <button class="btn btn-secondary" onclick="showPage('teams')">◉ Support Teams</button>
      </div>
    </div>
    <div class="alert alert-info" style="margin-top:.5rem">All configuration changes take effect within 60 seconds as the in-memory cache refreshes. AI prompts and risk thresholds are applied live on the next assessment request.</div>`);
  const stats = await apiFetch('/api/admin/stats');
  document.getElementById('dash-stats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${stats.intakes || 0}</div><div class="stat-label">Intake Requests</div></div>
    <div class="stat-card"><div class="stat-val">${(stats.vendors||{}).active || 0}</div><div class="stat-label">Active Vendors</div></div>
    <div class="stat-card"><div class="stat-val">${(stats.policies||{}).active || 0}</div><div class="stat-label">Active Policies</div></div>
    <div class="stat-card"><div class="stat-val">${(stats.teams||{}).active || 0}</div><div class="stat-label">Support Teams</div></div>
    <div class="stat-card"><div class="stat-val">${stats.riskParams || 0}</div><div class="stat-label">Risk Parameters</div></div>
    <div class="stat-card"><div class="stat-val">${stats.configKeys || 0}</div><div class="stat-label">Config Keys</div></div>`;
}

// ─── Prompts ─────────────────────────────────────────────────────────────────
async function renderPrompts() {
  setContent(`<div class="page-title"><div><h2>AI Prompts</h2><div class="sub">Manage prompts used by the AI review engine</div></div></div>
    <div class="alert alert-info" style="margin-bottom:1rem">The DEFAULT keyword means the built-in prompt is used. Enter custom text to override it.</div>
    <div id="alert-prompts"></div>
    <div id="prompts-list"><div class="empty">Loading…</div></div>`);
  const prompts = await apiFetch('/api/admin/prompts');
  const labels = { document_extraction: 'Document Extraction', architecture_review: 'Architecture Review', quick_assess: 'Quick Assessment', diagram_generation: 'Diagram Generation' };
  document.getElementById('prompts-list').innerHTML = prompts.map(p => `
    <div class="card" style="margin-bottom:.7rem">
      <div class="card-hdr">
        <div><div class="section-label">${labels[p.prompt_key] || p.prompt_key}</div>
        <div style="font-size:.72rem;color:var(--muted)">${p.description || ''} &nbsp;·&nbsp; Version ${p.version}</div></div>
        <button class="btn btn-secondary btn-sm" onclick="editPrompt('${p.prompt_key}')">Edit</button>
      </div>
      <div class="prompt-key">${p.prompt_key}</div>
      <div class="prompt-text">${esc(p.prompt_text === 'DEFAULT' ? '(Using built-in default prompt)' : p.prompt_text)}</div>
    </div>`).join('');
}

async function editPrompt(key) {
  const p = await apiFetch(`/api/admin/prompts/${key}`);
  openModal('Edit AI Prompt — ' + key,
    `<div class="form-group"><label>Prompt Key</label><input class="form-control" value="${esc(key)}" disabled/></div>
     <div class="form-group"><label>Description</label><input class="form-control" id="ep-desc" value="${esc(p.description || '')}"/></div>
     <div class="form-group"><label>Prompt Text (use DEFAULT to reset to built-in)</label><textarea class="form-control" id="ep-text" style="min-height:240px">${esc(p.prompt_text === 'DEFAULT' ? '' : p.prompt_text)}</textarea></div>`,
    `<button class="btn btn-secondary" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="savePrompt('${key}')">Save Prompt</button>`, true);
}

async function savePrompt(key) {
  const text = document.getElementById('ep-text').value.trim() || 'DEFAULT';
  const desc = document.getElementById('ep-desc').value.trim();

function renderPolicyList() {
  if (!allPolicies.length) { document.getElementById('policies-list').innerHTML = '<div class="empty">No policies configured.</div>'; return; }
  const cats = [...new Set(allPolicies.map(p => p.category))].sort();
  let html = '';
  for (const cat of cats) {
    const catPolicies = allPolicies.filter(p => p.category === cat);
    html += `<div class="section-label" style="margin-bottom:.4rem;margin-top:.8rem">${esc(cat)}</div>`;
    for (const p of catPolicies) {
      const rules = Array.isArray(p.rules) ? p.rules : (typeof p.rules === 'string' ? JSON.parse(p.rules || '[]') : []);
      const critCount = rules.filter(r => r.severity === 'Critical').length;
      const highCount = rules.filter(r => r.severity === 'High').length;
      html += `<div class="policy-card">
        <div class="policy-card-hdr">
          <div class="policy-icon">⚖</div>
          <div style="flex:1">
            <div class="policy-title">${esc(p.name)} ${p.active ? '' : '<span class="badge badge-inactive">Inactive</span>'}</div>
            <div class="policy-meta">${esc(p.source || '')}${p.version ? ' v' + p.version : ''} &nbsp;·&nbsp; ${rules.length} controls
              ${critCount ? ` &nbsp;·&nbsp; <span class="sev-Critical">${critCount} Critical</span>` : ''}
              ${highCount ? ` &nbsp;·&nbsp; <span class="sev-High">${highCount} High</span>` : ''}
              ${p.url ? ` &nbsp;·&nbsp; <a href="${esc(p.url)}" target="_blank" style="color:var(--accent);font-size:.7rem">↗ Reference</a>` : ''}
            </div>
            ${p.description ? `<div style="font-size:.76rem;color:var(--muted);margin-top:.3rem;line-height:1.45">${esc(p.description)}</div>` : ''}
          </div>
          <div class="policy-actions">
            <button class="btn btn-ghost btn-sm" onclick="viewPolicyRules(${p.id})">Rules</button>
            <button class="btn btn-secondary btn-sm" onclick="editPolicy(${p.id})">Edit</button>
            <button class="btn btn-ghost btn-sm" onclick="togglePolicy(${p.id})">${p.active ? 'Deactivate' : 'Activate'}</button>
          </div>
        </div>
      </div>`;
    }
  }
  document.getElementById('policies-list').innerHTML = html;
}

function viewPolicyRules(id) {
  const p = allPolicies.find(x => x.id === id);

  const rules = Array.isArray(p.rules) ? p.rules : (typeof p.rules === 'string' ? JSON.parse(p.rules || '[]') : []);
  const domains = [...new Set(rules.map(r => r.domain))].sort();
  let html = `<div style="font-size:.78rem;color:var(--muted);margin-bottom:.8rem">${esc(p.description || '')}</div>`;
  for (const domain of domains) {

    html += `<div class="section-label" style="margin:.6rem 0 .3rem">${esc(domain)}</div>
      <table class="rules-table"><thead><tr><th>ID</th><th>Control</th><th>Severity</th></tr></thead><tbody>

let riskParams = [];
async function renderRisk() {
  setContent(`<div class="page-title"><div><h2>Risk Engine Settings</h2><div class="sub">Tune scoring weights and tier thresholds for the automated risk assessment</div></div>
    <button class="btn btn-primary" onclick="saveRiskSettings()">Save All Changes</button></div>
    <div id="alert-risk"></div>
    <div id="risk-params-content"><div class="empty">Loading…</div></div>`);
  riskParams = await apiFetch('/api/admin/risk-thresholds');
  renderRiskParams();
}

const riskGroups = {
  'Tier Thresholds': ['tier_low_max','tier_medium_max','tier_high_max'],
  'Data Classification Scores': ['data_class_public','data_class_internal','data_class_confidential','data_class_restricted'],
  'Data Risk Scores': ['sensitive_data_per_type','sensitive_data_max','external_data_sharing','no_encryption_at_rest','no_encryption_in_transit'],
  'Vendor Risk Scores': ['new_vendor_per_vendor','new_vendor_max','critical_vendor_per_vendor','critical_vendor_max','high_vendor_per_vendor','high_vendor_max','saas_vendor_per_vendor','saas_vendor_max','high_vendor_count_threshold','high_vendor_count_penalty'],
  'Security Risk Scores': ['no_auth_score','non_standard_auth_score','no_mfa_score','no_waf_public_score','no_zero_trust_score','no_monitoring_score','ot_compliance_score','restricted_public_score'],
  'Complexity Risk Scores': ['no_patterns_score','endorsed_pattern_bonus','endorsed_pattern_max_bonus','dev_pattern_per_pattern','integration_high_threshold','integration_high_score','integration_medium_threshold','integration_medium_score','legacy_dependency_score','pattern_deviation_score','aggressive_timeline_score']
};

function renderRiskParams() {
  let html = '';
  for (const [group, keys] of Object.entries(riskGroups)) {
    const groupParams = keys.map(k => riskParams.find(p => p.parameter === k)).filter(Boolean);
    if (!groupParams.length) continue;
    html += `<div class="card" style="margin-bottom:.8rem"><div class="section-label">${group}</div>
      <div class="threshold-grid">`;
    for (const p of groupParams) {
      html += `<div class="threshold-item">
        <div class="threshold-label">${esc(p.description || p.parameter)}</div>
        <input type="number" class="threshold-input" id="rp-${p.parameter}" value="${p.value}" step="1"/>
      </div>`;
    }
    html += `</div></div>`;
  }
  document.getElementById('risk-params-content').innerHTML = html || '<div class="empty">No risk parameters found.</div>';
}

async function saveRiskSettings() {
  const updates = riskParams.map(p => {
    const el = document.getElementById('rp-' + p.parameter);
    return { parameter: p.parameter, value: el ? el.value : p.value, description: p.description };
  });
  await apiFetch('/api/admin/risk-thresholds', { method: 'PUT', body: JSON.stringify(updates) });
  showAlert('alert-risk', 'Risk engine settings saved. Changes apply within 60 seconds.');
}

  const data = vendorFormData();
  if (!data.vendor_company || !data.product_service) { alert('Company and product are required.'); return; }
  await apiFetch('/api/admin/vendors', { method: 'POST', body: JSON.stringify(data) });
  closeModalDirect();
  allVendors = await apiFetch('/api/admin/vendors');
  renderVendorList();
}

async function editVendor(id) {
  const v = allVendors.find(x => x.id === id);
  openModal('Edit Vendor — ' + v.vendor_company, vendorForm(v),
    `<button class="btn btn-secondary" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="saveVendorEdit(${id})">Save Changes</button>`, true);
}

async function saveVendorEdit(id) {
  const data = vendorFormData();
  await apiFetch(`/api/admin/vendors/${id}`, { method: 'PUT', body: JSON.stringify(data) });
  closeModalDirect();
  allVendors = await apiFetch('/api/admin/vendors');
  renderVendorList();
}

// ─── Support Teams ────────────────────────────────────────────────────────────
let allTeams = [];
async function renderTeams() {
  setContent(`<div class="page-title"><div><h2>Support Teams</h2><div class="sub">Manage teams that can submit and review architecture requests</div></div>
    <button class="btn btn-primary" onclick="openAddTeam()">+ Add Team</button></div>
    <div id="alert-teams"></div>
    <div id="teams-list"><div class="empty">Loading…</div></div>`);
  allTeams = await apiFetch('/api/admin/support-teams');
  renderTeamList();
}

function renderTeamList() {
  if (!allTeams.length) { document.getElementById('teams-list').innerHTML = '<div class="empty">No teams configured.</div>'; return; }
  document.getElementById('teams-list').innerHTML = `
    <div class="table-wrap"><table><thead><tr><th>Team</th><th>Email</th><th>Slack</th><th>Description</th><th>Status</th><th></th></tr></thead><tbody>
    ${allTeams.map(t => `<tr>
      <td style="font-weight:600">${esc(t.name)}</td>
      <td style="font-size:.76rem">${esc(t.contact_email||'')}</td>
      <td style="font-size:.76rem;color:var(--muted)">${esc(t.contact_slack||'')}</td>
      <td style="font-size:.74rem;color:var(--muted)">${esc(t.description||'')}</td>
      <td><span class="badge ${t.active?'badge-active':'badge-inactive'}">${t.active?'Active':'Inactive'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="editTeam(${t.id})">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleTeam(${t.id})">${t.active?'Deactivate':'Activate'}</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTeam(${t.id})">✕</button>
      </td></tr>`).join('')}
    </tbody></table></div>`;
}

async function toggleTeam(id) {
  await apiFetch(`/api/admin/support-teams/${id}/toggle`, { method: 'PATCH' });
  allTeams = await apiFetch('/api/admin/support-teams');
  renderTeamList();
}

async function deleteTeam(id) {
  if (!confirm('Delete this team?')) return;
  await apiFetch(`/api/admin/support-teams/${id}`, { method: 'DELETE' });
  allTeams = await apiFetch('/api/admin/support-teams');
  renderTeamList();
}

function teamForm(t = {}) {
  return `<div class="form-group"><label>Team Name</label><input class="form-control" id="tf-name" value="${esc(t.name||'')}"/></div>
    <div class="form-row">
    <div class="form-group"><label>Contact Email</label><input class="form-control" id="tf-email" value="${esc(t.contact_email||'')}"/></div>
    <div class="form-group"><label>Slack Channel</label><input class="form-control" id="tf-slack" value="${esc(t.contact_slack||'')}"/></div></div>
    <div class="form-group"><label>Description</label><textarea class="form-control" id="tf-desc" style="min-height:70px">${esc(t.description||'')}</textarea></div>`;
}

function openAddTeam() {
  openModal('Add Support Team', teamForm(),
    `<button class="btn btn-secondary" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="saveNewTeam()">Add Team</button>`);
}

async function saveNewTeam() {
  const data = { name: document.getElementById('tf-name').value.trim(), contact_email: document.getElementById('tf-email').value.trim(),
    contact_slack: document.getElementById('tf-slack').value.trim(), description: document.getElementById('tf-desc').value.trim() };
  if (!data.name) { alert('Team name is required.'); return; }
  await apiFetch('/api/admin/support-teams', { method: 'POST', body: JSON.stringify(data) });
  closeModalDirect();
  allTeams = await apiFetch('/api/admin/support-teams');
  renderTeamList();
}

async function editTeam(id) {
  const t = allTeams.find(x => x.id === id);
  openModal('Edit Team — ' + t.name, teamForm(t),
    `<button class="btn btn-secondary" onclick="closeModalDirect()">Cancel</button>
     <button class="btn btn-primary" onclick="saveTeamEdit(${id})">Save Changes</button>`);
}

async function saveTeamEdit(id) {
  const data = { name: document.getElementById('tf-name').value.trim(), contact_email: document.getElementById('tf-email').value.trim(),
    contact_slack: document.getElementById('tf-slack').value.trim(), description: document.getElementById('tf-desc').value.trim() };
  await apiFetch(`/api/admin/support-teams/${id}`, { method: 'PUT', body: JSON.stringify(data) });
  closeModalDirect();
  allTeams = await apiFetch('/api/admin/support-teams');
  renderTeamList();
}

// ─── Util ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
